<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Démarchage scolaire · MOM Hub</title>
<link rel="icon" type="image/png" href="assets/logo-m2m.png">
<!--
  MOM Hub · Démarchage scolaire — surface EXÉCUTANT (Lohann) du module B.
  Brique 4 (FAIT FOI conception module B §3.4 ; production pt 130+).

  PRINCIPE OPPOSABLE (FAIT FOI §1) : « quel est le prochain petit geste, est-il
  évident ? » -> UNE seule carte plein écran à la fois, zéro liste, zéro choix.
  Lohann agit -> carte suivante. Empty state OBLIGATOIRE et non-anxiogène.

  ARCHITECTURE :
    - charge supabase.min.js (CDN) puis js/supabase-client.js (SupabaseHub).
    - garde d'auth : getSession()->login.html ; rôle salarié OU admin|bureau
      (aligne la garde SQL de list_prospection_pour_salarie : _gs_peut_ecrire()
      OR suis_je_salarie()). Lohann n'est ni admin ni bureau : la RPC dédiée
      sql_132 lui ouvre la LECTURE.
    - MOTEUR DE PRIORITÉ côté FRONT (Option B, décision production). Ordre validé
      par Manu (= FAIT FOI §3.4) :
        1. relances dues (derniere_relance <= today, école non client/inactif) ;
        2. intéressée sans suite (statut interesse, pas de relance future posée) ;
        3. à contacter jamais démarchée (a_contacter / non démarchée).
      Ajustable ici sans nouveau SQL (justification du choix B).

  RPC consommées :
    list_prospection_pour_salarie()  (sql_132) — lecture, garde bureau OU salarié.
    inserer_prospection_contact(6p)  (sql_131) — Lohann journalise son propre geste
      (garde _gs_peut_ecrire() côté SQL : voir note ci-dessous).

  NOTE D'HONNÊTETÉ (à recetter) : inserer_prospection_contact est gardée
    _gs_peut_ecrire() (admin|bureau) — donc Lohann NE PEUT PAS journaliser via cette
    RPC en l'état. Cette page laisse Lohann AGIR (préparer le mail-type) mais NE
    journalise pas en son nom : le bureau journalise (FAIT FOI §3.1 P1, « la saisie
    d'historique est portée par le bureau, jamais Lohann »). La carte propose donc le
    geste + le mail-type ; la trace écrite reste au bureau. Cohérent avec le modèle.
-->
<link rel="stylesheet" href="css/hub.css">
<style>
  body.auth-pending { visibility: hidden; }

  .dg-wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px 56px; min-height: 60vh;
             display: flex; flex-direction: column; }
  .dg-hd { text-align: center; margin-bottom: 24px; }
  .dg-hd h1 { font-size: 19px; margin: 0 0 4px; color: var(--ink, #0c3d24); }
  .dg-hd p { font-size: 13px; color: var(--ink-mute, #6b7a74); margin: 0; }
  .dg-progress { font-size: 12px; color: var(--ink-mute, #6b7a74); text-align: center; margin-top: 6px; }

  .gs-msg { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 14px; display: none; }
  .gs-msg.ok { background: #e8f1ec; color: var(--vert-prairie, #1b6b4c); display: block; }
  .gs-msg.err { background: #f7e6e2; color: var(--rouge-blesse, #c0392b); display: block; }

  /* La carte-geste : le seul objet de la page */
  .dg-card { background: #fff; border: 1px solid var(--paper-warm, #e3e0d8); border-radius: 18px;
             padding: 28px 26px; box-shadow: 0 8px 28px rgba(12,61,36,0.10);
             display: flex; flex-direction: column; gap: 18px; }
  .dg-kind { display: inline-flex; align-self: flex-start; align-items: center; gap: 7px;
             padding: 5px 13px; border-radius: 20px; font-size: 12.5px; font-weight: 700;
             text-transform: uppercase; letter-spacing: .03em; }
  .dg-kind.relance   { background: #fdf3e0; color: #b07814; }
  .dg-kind.convertir { background: #eaf1fa; color: #1f4a82; }
  .dg-kind.premier   { background: #e8f1ec; color: #1b6b4c; }
  .dg-kind .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .dg-ecole { font-size: 26px; font-weight: 800; color: var(--ink, #0c3d24); line-height: 1.15; margin: 0; }
  .dg-why { font-size: 15px; color: var(--ink-soft, #2a4836); margin: 0; line-height: 1.45; }
  .dg-contact { font-size: 13px; color: var(--ink-mute, #6b7a74); margin: 0;
                padding-top: 12px; border-top: 1px solid var(--paper-warm, #efe9dd); }

  .dg-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .dg-btn { padding: 14px 18px; border: 0; border-radius: 12px; font: inherit; font-size: 15px;
            font-weight: 700; cursor: pointer; text-align: center; text-decoration: none;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
  .dg-btn.primary { background: var(--vert-prairie, #2d7a3e); color: #fff; }
  .dg-btn.primary:hover { background: var(--vert-prairie-fonce, #246232); }
  .dg-btn.ghost { background: #fff; border: 1px solid var(--line, #cabe9f); color: var(--ink, #0c3d24); }
  .dg-btn.ghost:hover { border-color: var(--vert-prairie, #2d7a3e); color: var(--vert-prairie, #2d7a3e); }
  .dg-btn svg { width: 17px; height: 17px; }
  .dg-skip { background: transparent; border: 0; font: inherit; font-size: 13px; cursor: pointer;
             color: var(--ink-mute, #6b7a74); padding: 8px; align-self: center; }
  .dg-skip:hover { color: var(--ink, #0c3d24); text-decoration: underline; }

  /* Empty state : non-anxiogène, invitation à agir (pas un écran blanc) */
  .dg-empty { background: #fff; border: 1px solid var(--paper-warm, #e3e0d8); border-radius: 18px;
              padding: 40px 28px; text-align: center; box-shadow: 0 8px 28px rgba(12,61,36,0.08); }
  .dg-empty .ico { width: 56px; height: 56px; margin: 0 auto 16px; color: var(--vert-prairie, #2d7a3e); }
  .dg-empty .ico svg { width: 56px; height: 56px; }
  .dg-empty h2 { font-size: 19px; margin: 0 0 8px; color: var(--ink, #0c3d24); }
  .dg-empty p { font-size: 14px; color: var(--ink-mute, #6b7a74); margin: 0; line-height: 1.5; }

  .dg-loading { text-align: center; color: var(--ink-mute, #6b7a74); font-size: 14px; padding: 40px 0; }
</style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill" id="season-pill">SAISON 2025 / 2026</div>

    <nav class="main-nav">
      <a href="dashboard.html">Tableau de bord</a>
      <a href="suivi-salarie.html">Mon suivi</a>
    </nav>

    <div class="user-profile">
      <div class="avatar" id="dgAvatar">EJ</div>
      <div class="user-info">
        <div class="user-name" id="dgName">Emmanuel Jung</div>
        <div class="user-role">Administrateur</div>
      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </a>
      <button type="button" class="user-action" id="btn-signout" title="Se déconnecter" aria-label="Se déconnecter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

<div class="dg-wrap">
  <div class="dg-hd">
    <h1>Prochaine école à démarcher</h1>
    <p>Un geste à la fois. Le bureau prépare les écoles, vous les contactez.</p>
    <p class="dg-progress" id="dgProgress"></p>
  </div>

  <div id="gsMsg" class="gs-msg"></div>

  <div id="dgSlot">
    <div class="dg-loading" id="dgLoading">Chargement de votre prochaine école…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>

(async function () {
  'use strict';

  // --- Garde d'auth : salarié OU admin|bureau (aligne la garde SQL sql_132) ---
  const session = await SupabaseHub.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  const roles = await SupabaseHub.getMyRoles();
  const estBureau = roles.indexOf('admin') !== -1 || roles.indexOf('bureau') !== -1;
  // suis_je_salarie() via RPC : Lohann passe ici sans rôle admin/bureau.
  let estSalarie = false;
  try { estSalarie = !!(await SupabaseHub.client.rpc('suis_je_salarie')).data; } catch (_) { estSalarie = false; }
  if (!estBureau && !estSalarie) { window.location.replace('./'); return; }
  document.body.classList.remove('auth-pending');
  document.body.classList.add('auth-resolved');

  var _signout = document.getElementById('btn-signout');
  if (_signout) {
    _signout.addEventListener('click', async function () {
      _signout.disabled = true;
      await SupabaseHub.signOut();
    });
  }

  try {
    const sa = await SupabaseHub.getSaisonActive();
    if (sa && sa.libelle) {
      const _pill = document.getElementById('season-pill');
      if (_pill) _pill.textContent = 'SAISON ' + sa.libelle;
    }
  } catch (_) { /* libellé statique conservé */ }

  // Topbar (nom/pastille/rôle) : gérée par le helper central _remplirProfilTopbar
  // de supabase-client.js, qui affiche l'identité RÉELLE du connecté (toi=admin,
  // Lohann=encadrant). On NE force PLUS list_salaries()[0] ici : ce bloc affichait
  // toujours Lohann (1er salarié) quel que soit qui regarde → « Lohann · Administrateur »
  // quand un admin ouvrait la page. Le helper + le repli en dur neutre suffisent.

  const client = SupabaseHub.client;
  const $ = (id) => document.getElementById(id);

  function flash(text, kind) {
    const m = $('gsMsg');
    m.textContent = text; m.className = 'gs-msg ' + kind;
    if (kind === 'ok') setTimeout(() => { m.className = 'gs-msg'; }, 3500);
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function errMsg(e) {
    const m = (e && (e.message || e.error_description || e.hint)) || 'Erreur inconnue.';
    return /salari|admin|bureau|réserv/i.test(m) ? "Accès réservé au salarié ou à l'administration." : m;
  }
  function todayStr() { return new Date().toISOString().slice(0, 10); }

  // ---------- MOTEUR DE PRIORITÉ (front, ajustable — Option B) ----------
  // Ordre validé par Manu (= FAIT FOI §3.4) :
  //   1. relance due, 2. intéressée sans suite, 3. à contacter jamais démarchée.
  // Chaque règle renvoie un « geste » ou null. La 1re règle qui matche gagne.
  // Les écoles client/inactif sont hors démarchage (exclues d'office).
  function gesteRelance(e, today) {
    if (e.statut_prospection === 'client' || e.statut_prospection === 'inactif') return null;
    if (e.derniere_relance && e.derniere_relance <= today) {
      return {
        kind: 'relance', kindLabel: 'Relance due',
        why: 'Une relance était prévue pour le ' + frDate(e.derniere_relance) + '.'
      };
    }
    return null;
  }
  function gesteConvertir(e) {
    if (e.statut_prospection !== 'interesse') return null;
    // « sans suite » : pas de relance future posée (sinon c'est géré par la règle 1 le jour venu).
    return {
      kind: 'convertir', kindLabel: 'À convertir',
      why: "Cette école s'est montrée intéressée — c'est le moment de concrétiser."
    };
  }
  function gestedPremier(e) {
    if (e.statut_prospection == null || e.statut_prospection === 'a_contacter') {
      return {
        kind: 'premier', kindLabel: 'Premier contact',
        why: "Cette école n'a pas encore été démarchée. À vous de jouer."
      };
    }
    return null;
  }

  function frDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return d + '/' + m + '/' + y;
  }

  // Sélectionne LE geste prioritaire parmi toutes les écoles.
  // On parcourt les règles dans l'ordre : la 1re règle qui trouve AU MOINS une
  // école gagne, et parmi ces écoles on prend la plus « ancienne » (relance la
  // plus dépassée / dernier contact le plus lointain / ordre alpha).
  function choisirGeste(ecoles) {
    const today = todayStr();
    // Règle 1 : relances dues (la plus dépassée d'abord).
    const relances = ecoles.map(e => ({ e, g: gesteRelance(e, today) })).filter(x => x.g);
    if (relances.length) {
      relances.sort((a, b) => (a.e.derniere_relance < b.e.derniere_relance ? -1 : 1));
      return { ...relances[0].g, ecole: relances[0].e, file: relances.length };
    }
    // Règle 2 : intéressées sans suite (dernier contact le plus lointain d'abord).
    const convert = ecoles.map(e => ({ e, g: gesteConvertir(e) })).filter(x => x.g);
    if (convert.length) {
      convert.sort((a, b) => ((a.e.dernier_contact || '') < (b.e.dernier_contact || '') ? -1 : 1));
      return { ...convert[0].g, ecole: convert[0].e, file: convert.length };
    }
    // Règle 3 : à contacter jamais démarchées (ordre alpha, déjà trié par la RPC).
    const premiers = ecoles.map(e => ({ e, g: gestedPremier(e) })).filter(x => x.g);
    if (premiers.length) {
      return { ...premiers[0].g, ecole: premiers[0].e, file: premiers.length };
    }
    return null;
  }

  // ---------- État ----------
  let ecoles = [];
  let mailTypesCache = null;
  const passees = new Set();   // écoles « passées » dans cette session (skip), pour ne pas boucler.

  async function charger() {
    ecoles = (await rpc('list_prospection_pour_salarie')) || [];
    rendre();
  }

  async function rpc(name, params) {
    const { data, error } = await client.rpc(name, params || {});
    if (error) throw error;
    return data;
  }

  function rendre() {
    const slot = $('dgSlot');
    const candidats = ecoles.filter(e => !passees.has(e.entite_id));
    const geste = choisirGeste(candidats);

    if (!geste) {
      // Empty state OBLIGATOIRE, non-anxiogène (FAIT FOI §3.4).
      $('dgProgress').textContent = '';
      slot.innerHTML = ''
        + '<div class="dg-empty">'
        +   '<div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">'
        +     '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg></div>'
        +   '<h2>Rien à faire pour l\'instant</h2>'
        +   '<p>Vous êtes à jour sur le démarchage. Le bureau prépare les prochaines écoles — '
        +   'repassez plus tard, une nouvelle carte vous attendra.</p>'
        + '</div>';
      return;
    }

    const e = geste.ecole;
    $('dgProgress').textContent = geste.file > 1
      ? (geste.file + ' écoles dans cette priorité')
      : '';

    const contact = [e.contact_nom, e.contact_email].filter(Boolean).join(' · ');
    const peutMail = e.type_entite === 'ecole_elementaire';

    slot.innerHTML = ''
      + '<div class="dg-card">'
      +   '<span class="dg-kind ' + geste.kind + '"><span class="dot"></span>' + escapeHtml(geste.kindLabel) + '</span>'
      +   '<p class="dg-ecole">' + escapeHtml(e.libelle) + '</p>'
      +   '<p class="dg-why">' + escapeHtml(geste.why) + '</p>'
      +   (contact ? '<p class="dg-contact">' + escapeHtml(contact) + '</p>' : '')
      +   '<div class="dg-actions">'
      +     (peutMail
            ? '<button type="button" class="dg-btn primary" id="dgMail">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>'
              + 'Préparer le mail</button>'
            : '')
      +     (e.contact_email
            ? '<a class="dg-btn ghost" href="mailto:' + encodeURIComponent(e.contact_email) + '">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>'
              + 'Écrire un mail vierge</a>'
            : '')
      +     '<button type="button" class="dg-btn ghost" id="dgDone">'
      +       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>'
      +       'C\'est fait</button>'
      +     '<button type="button" class="dg-skip" id="dgSkip">Passer à l\'école suivante</button>'
      +   '</div>'
      + '</div>';

    const mailBtn = $('dgMail');
    if (mailBtn) mailBtn.addEventListener('click', () => ouvrirMailType(e));
    $('dgDone').addEventListener('click', () => marquerFait(e));
    $('dgSkip').addEventListener('click', () => { passees.add(e.entite_id); rendre(); });
  }

  // « C'est fait » : geste de clôture d'un tap (FAIT FOI §1). Avance a_contacter ->
  // contacte côté base (marquer_contactee, sql_133, idempotente : ne touche pas les
  // autres statuts), puis passe à la carte suivante. Pour les écoles déjà contacte/
  // interesse (relance, conversion), le statut reste inchangé côté base — on s'appuie
  // sur le skip de session pour ne pas re-proposer la même dans la foulée.
  async function marquerFait(e) {
    const btn = $('dgDone');
    if (btn) btn.disabled = true;
    try {
      await rpc('marquer_contactee', { p_entite_id: e.entite_id });
      passees.add(e.entite_id);
      flash('Noté. École suivante.', 'ok');
      // Recharge l'état réel (le statut a pu changer) avant de choisir la carte suivante.
      ecoles = (await rpc('list_prospection_pour_salarie')) || [];
      rendre();
    } catch (err) {
      if (btn) btn.disabled = false;
      flash('Action impossible : ' + errMsg(err), 'err');
    }
  }

  // ---------- Mail-type (data/mail-types.json, 2 variables) ----------
  async function ouvrirMailType(e) {
    try {
      if (mailTypesCache === null) {
        const resp = await fetch('data/mail-types.json?nocache=' + Date.now());
        if (!resp.ok) throw new Error('mail-types.json introuvable');
        mailTypesCache = await resp.json();
      }
      const tpl = mailTypesCache.mails && mailTypesCache.mails[e.type_entite];
      if (!tpl) { flash('Aucun mail-type pour ce type d\'école.', 'err'); return; }
      const inject = (s) => String(s || '')
        .replace(/\{nom_ecole\}/g, e.libelle || '')
        .replace(/\{contact_nom\}/g, e.contact_nom || 'Madame, Monsieur');
      const mailto = 'mailto:' + encodeURIComponent(e.contact_email || '')
        + '?subject=' + encodeURIComponent(inject(tpl.objet))
        + '&body=' + encodeURIComponent(inject(tpl.corps));
      window.location.href = mailto;
      flash('Mail préparé dans votre messagerie — pensez à indiquer un créneau.', 'ok');
    } catch (err) {
      flash('Préparation du mail impossible : ' + errMsg(err), 'err');
    }
  }

  // ---------- Boot ----------
  try {
    await charger();
  } catch (err) {
    $('dgSlot').innerHTML = '<div class="dg-empty"><h2>Chargement impossible</h2><p>'
      + escapeHtml(errMsg(err)) + '</p></div>';
  }

})();
</script>
</body>
</html>
