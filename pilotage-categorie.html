<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilotage de saison · MOM Hub</title>
  <style>
    :root {
      --vert: #2D7D46; --vert-fonce: #1f5a32; --gris: #5b6470;
      --gris-clair: #eef1f4; --bord: #d8dee5; --attente: #8a93a0;
      --fond: #f7f9fb; --carte: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--fond); color: #1c232b;
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      line-height: 1.5; padding: 1.5rem 1rem 4rem;
    }
    .ss-wrap { max-width: 920px; margin: 0 auto; }
    .ss-pilot-head { border-bottom: 3px solid var(--vert); padding-bottom: .75rem; margin-bottom: 1.25rem; }
    .ss-pilot-head h1 { margin: 0; font-size: 1.9rem; color: var(--vert-fonce); }
    .ss-sub { margin: .25rem 0 0; color: var(--gris); font-size: .95rem; }
    .ss-bloc {
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 1.25rem;
    }
    .ss-bloc h2 { margin: 0 0 .75rem; font-size: 1.1rem; color: var(--vert-fonce); }
    .ss-attente { color: var(--attente); font-style: italic; margin: .5rem 0 0; }
    .ss-note { color: var(--gris); font-size: .85rem; margin: .6rem 0 0; }
    .ss-load { color: var(--gris); }
    .ss-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: .6rem; }
    .ss-kpi { background: var(--gris-clair); border-radius: 8px; padding: .6rem .7rem; text-align: center; }
    .ss-kpi__v { display: block; font-size: 1.3rem; font-weight: 700; color: var(--vert-fonce); }
    .ss-kpi__l { display: block; font-size: .75rem; color: var(--gris); text-transform: uppercase; letter-spacing: .03em; margin-top: .15rem; }
    .ss-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    .ss-table th, .ss-table td { text-align: left; padding: .5rem .55rem; border-bottom: 1px solid var(--bord); vertical-align: top; }
    .ss-table th { color: var(--gris); font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .02em; }
    .ss-table tbody tr:hover { background: var(--gris-clair); }
    .ss-num { text-align: right; }
    .ss-table th.ss-num { text-align: right; }
    /* Ventilation par équipe (pt 63) */
    .ss-cat-eq { padding: .15rem 0; }
    .ss-cat-eq + .ss-cat-eq { border-top: 1px dashed var(--bord); margin-top: .35rem; padding-top: .35rem; }
    .ss-cat-eq__nom { font-weight: 600; color: var(--vert-fonce); }
    .ss-cat-eq__m { color: var(--gris); font-size: .85rem; }
    .ss-cat-eq__r { color: var(--gris); font-size: .85rem; }
    .ss-cat-eq__p { color: #1c232b; font-size: .85rem; margin-top: .1rem; }
    .ss-cat-dep { color: var(--vert); cursor: help; }
    /* Sélecteur transverse (pt 64) */
    .ss-pilot-selecteur {
      margin-bottom: 1.25rem; padding: .75rem 1rem;
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    }
    .ss-pilot-selecteur label { color: var(--gris); font-size: .9rem; font-weight: 600; }
    .ss-pilot-selecteur select {
      font-size: .95rem; padding: .35rem .6rem; border: 1px solid var(--bord);
      border-radius: 6px; background: #fff; color: #1c232b; min-width: 160px;
    }
    footer { max-width: 920px; margin: 2rem auto 0; color: var(--attente); font-size: .8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="ss-wrap">
    <main id="ss-pilotage"><p class="ss-load">Initialisation…</p></main>
  </div>
  <footer>MOM Hub · pilotage de saison — Mutzig Ovalie Molsheim</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/stats-saison.js"></script>
  <script>
    (function () {
      'use strict';
      var mount = document.getElementById('ss-pilotage');

      if (!window.StatsSaison || !window.SupabaseHub) {
        mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2><p>Module stats-saison indisponible.</p></section>';
        return;
      }

      var M14_ID = '312ebb88-25e8-40c5-8a37-9dd2e3927e2e';

      // pt 63/64 — D-PILOT-CAT-1 + cas transverse. La catégorie vient de
      // mes_categories_autorisees() (RPC B5) qui renvoie soit :
      //   - referent mono-catégorie : [{categorie_id:<uuid>, est_transverse:false}]
      //     → pilotage DIRECT, pas de sélecteur ;
      //   - compte transverse (admin/bureau) : [{categorie_id:null, est_transverse:true}]
      //     → SÉLECTEUR de catégories (toutes actives), pré-réglé sur M14 ;
      //   - aucun droit : [] → message « indéterminé ».
      // Override ?categorie=<uuid> = court-circuit (debug / lien direct).
      var params = new URLSearchParams(window.location.search);
      var override = params.get('categorie');

      function escapeHtmlLocal(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function messageIndetermine() {
        mount.innerHTML = '<section class="ss-bloc"><h2>Catégorie indéterminée</h2>' +
          '<p>Aucune catégorie n\'a pu être déterminée pour votre compte. ' +
          'Le pilotage de saison est réservé au référent d\'une catégorie.</p></section>';
      }

      // Rendu transverse : barre de sélection + zone de pilotage rafraîchie au choix.
      function rendreAvecSelecteur(categories, catParDefaut) {
        var options = categories.map(function (c) {
          var sel = (c.id === catParDefaut) ? ' selected' : '';
          var lib = c.libelle_court || c.code || c.id;
          return '<option value="' + escapeHtmlLocal(c.id) + '"' + sel + '>' +
                 escapeHtmlLocal(lib) + '</option>';
        }).join('');

        mount.innerHTML =
          '<div class="ss-pilot-selecteur">' +
            '<label for="ss-cat-select">Catégorie pilotée :</label> ' +
            '<select id="ss-cat-select">' + options + '</select>' +
          '</div>' +
          '<div id="ss-pilot-zone"><p class="ss-load">Chargement…</p></div>';

        var zone = document.getElementById('ss-pilot-zone');
        var sel = document.getElementById('ss-cat-select');

        function peindre(catId) {
          zone.innerHTML = '<p class="ss-load">Chargement du pilotage de saison…</p>';
          StatsSaison.renderPilotageCategorie(catId, zone);
        }
        sel.addEventListener('change', function () { peindre(this.value); });
        peindre(catParDefaut);
      }

      // Cas override : court-circuit direct.
      if (override) {
        StatsSaison.renderPilotageCategorie(override, mount);
        return;
      }

      Promise.resolve(SupabaseHub.mesCategoriesAutorisees())
        .then(function (rows) {
          if (!Array.isArray(rows) || rows.length === 0) {
            messageIndetermine();
            return;
          }
          var r = rows[0];

          // Referent mono-catégorie : id résolu → pilotage direct.
          var catId = r.categorie_id || r.id || r.categorie || null;
          if (catId && !r.est_transverse) {
            return StatsSaison.renderPilotageCategorie(catId, mount);
          }

          // Compte transverse : sélecteur de toutes les catégories, pré-réglé M14.
          if (r.est_transverse) {
            return Promise.resolve(SupabaseHub.client.rpc('list_categories'))
              .then(function (res) {
                var payload = (res && res.data) ? res.data : null;
                // list_categories renvoie {success,error,data:[...]} ; selon le
                // client, res peut être déjà l'enveloppe ou {data:<enveloppe>}.
                var liste = null;
                if (Array.isArray(payload)) liste = payload;                       // res = enveloppe
                else if (payload && Array.isArray(payload.data)) liste = payload.data; // res.data = enveloppe
                else if (res && Array.isArray(res)) liste = res;
                if (!liste || liste.length === 0) {
                  // Pas de liste → repli honnête sur M14 direct.
                  return StatsSaison.renderPilotageCategorie(M14_ID, mount);
                }
                liste.sort(function (a, b) {
                  return (a.ordre_tri || 0) - (b.ordre_tri || 0);
                });
                var defaut = liste.some(function (c) { return c.id === M14_ID; }) ? M14_ID : liste[0].id;
                rendreAvecSelecteur(liste, defaut);
              })
              .catch(function () {
                // RPC liste KO → repli M14 direct (dégradation honnête).
                StatsSaison.renderPilotageCategorie(M14_ID, mount);
              });
          }

          // Ni id ni transverse → indéterminé.
          messageIndetermine();
        })
        .catch(function (e) {
          if (typeof console !== 'undefined') console.error('pilotage-categorie boot', e);
          messageIndetermine();
        });
    })();
  </script>
</body>
</html>
