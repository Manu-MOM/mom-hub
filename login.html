<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion · MOM Hub</title>
<link rel="icon" type="image/jpeg" href="assets/logo-m2m.jpg">
  <meta name="description" content="Connexion au MOM Hub par lien magique." />

  <link rel="stylesheet" href="css/hub.css">

  <style>
    /* Styles spécifiques à login.html (le commun est dans css/hub.css) */

    /* Titre de la carte de connexion (h2 dans .card) */
    .login-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.5px;
      color: var(--vert-prairie);
      text-align: center;
      margin: 0 0 6px;
      text-transform: uppercase;
    }
    .login-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink-mute);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 28px;
    }

    /* Champ email */
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .form-row label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .form-row input {
      padding: 11px 12px;
      font-family: inherit;
      font-size: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-row input:focus {
      outline: none;
      border-color: var(--vert-prairie);
      box-shadow: 0 0 0 3px rgba(45, 122, 62, 0.12);
    }
    .form-row input:disabled {
      background: var(--paper-warm);
      cursor: not-allowed;
    }

    /* Ligne de renvoi (masquée 60 s après envoi initial) */
    .resend-row {
      margin-top: 14px;
      font-size: 13px;
      color: var(--ink-mute);
      text-align: center;
      display: none;
    }
    .resend-row.is-visible { display: block; }
    .resend-link {
      background: none;
      border: none;
      color: var(--vert-prairie);
      font-weight: 600;
      cursor: pointer;
      padding: 0 0 0 4px;
      font-size: 13px;
      font-family: inherit;
    }
    .resend-link:hover:not(:disabled) { text-decoration: underline; }
    .resend-link:disabled {
      color: var(--ink-mute);
      cursor: not-allowed;
    }

    /* Carte de login : largeur contrainte + padding plus généreux que .card par défaut */
    .card--login {
      width: 100%;
      max-width: 420px;
      padding: 36px 32px 32px;
    }
  </style>
</head>

<body>

  <!-- Topbar Hub minimaliste (juste le brand) -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <img src="assets/logo-m2m.jpg" alt="MOM Rugby">
      </div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>
  </header>

  <main class="page-centered">
    <section class="card card--login" role="region" aria-labelledby="login-title">
      <h2 id="login-title" class="login-title">Connexion</h2>
      <p class="login-subtitle">par lien magique</p>

      <form id="login-form" novalidate>
        <div class="form-row">
          <label for="email">Adresse email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            placeholder="ton.email@exemple.fr"
          />
        </div>

        <button type="submit" id="submit-btn" class="btn">
          Recevoir le lien de connexion
        </button>
      </form>

      <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

      <div id="resend-row" class="resend-row">
        Pas reçu&nbsp;?
        <button type="button" id="resend-btn" class="resend-link">Renvoyer le lien</button>
      </div>

      <p class="footer">
        <span class="footer-club">Mutzig Ovalie Molsheim</span><br />
        MOM Hub · accès réservé
      </p>
    </section>
  </main>

  <!-- Bibliothèque officielle Supabase JS (UMD via CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- Wrapper MOM Hub -->
  <script src="js/supabase-client.js"></script>

  <script>
    (function () {
      'use strict';

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const submitBtn = document.getElementById('submit-btn');
      const feedback = document.getElementById('feedback');
      const resendRow = document.getElementById('resend-row');
      const resendBtn = document.getElementById('resend-btn');

      let resendTimer = null;
      const RESEND_DELAY_MS = 60 * 1000; // 60 secondes

      // ----------------------------------------------------------------
      // Helpers UI
      // ----------------------------------------------------------------
      function showFeedback(kind, text) {
        feedback.className = 'feedback is-visible feedback--' + kind;
        feedback.textContent = text;
      }

      function hideFeedback() {
        feedback.className = 'feedback';
        feedback.textContent = '';
      }

      function lockForm() {
        emailInput.disabled = true;
        submitBtn.disabled = true;
      }

      function unlockForm() {
        emailInput.disabled = false;
        submitBtn.disabled = false;
      }

      function scheduleResend() {
        resendRow.classList.remove('is-visible');
        if (resendTimer) clearTimeout(resendTimer);
        resendTimer = setTimeout(function () {
          resendRow.classList.add('is-visible');
        }, RESEND_DELAY_MS);
      }

      // ----------------------------------------------------------------
      // Si déjà loggué : rediriger vers le portail
      // ----------------------------------------------------------------
      async function redirectIfAlreadyLoggedIn() {
        if (typeof SupabaseHub === 'undefined') return;
        try {
          const session = await SupabaseHub.getSession();
          if (session) {
            // Déjà loggué : on redirige vers la racine du Hub
            window.location.replace('./');
          }
        } catch (err) {
          console.warn('MOM Hub login: getSession() a échoué, on reste sur login.', err);
        }
      }

      // ----------------------------------------------------------------
      // Soumission du formulaire
      // ----------------------------------------------------------------
      async function handleSubmit(event) {
        event.preventDefault();

        if (typeof SupabaseHub === 'undefined') {
          showFeedback('error', 'Erreur technique : client Supabase non chargé. Recharge la page.');
          return;
        }

        const email = (emailInput.value || '').trim();
        if (!email || !email.includes('@')) {
          showFeedback('error', 'Merci de saisir une adresse email valide.');
          emailInput.focus();
          return;
        }

        hideFeedback();
        lockForm();
        showFeedback('info', 'Envoi du lien en cours…');

        const result = await SupabaseHub.requestMagicLink(email);

        if (result.ok) {
          showFeedback(
            'success',
            'Si cette adresse a un compte ou peut en créer un, ' +
            'tu vas recevoir un lien de connexion dans quelques secondes. ' +
            'Pense à vérifier le dossier spams.'
          );
          scheduleResend();
        } else {
          showFeedback('error', 'Impossible d\'envoyer le lien : ' + (result.error || 'erreur inconnue'));
          unlockForm();
        }
      }

      // ----------------------------------------------------------------
      // Renvoi
      // ----------------------------------------------------------------
      function handleResend() {
        resendRow.classList.remove('is-visible');
        unlockForm();
        emailInput.focus();
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      }

      // ----------------------------------------------------------------
      // Init
      // ----------------------------------------------------------------
      form.addEventListener('submit', handleSubmit);
      resendBtn.addEventListener('click', handleResend);
      redirectIfAlreadyLoggedIn();
    })();
  </script>
</body>
</html>
