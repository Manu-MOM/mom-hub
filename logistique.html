<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistique · MOM Hub</title>
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <meta name="description" content="Réservation des infrastructures, minibus et matériel — MOM Hub." />

  <link rel="stylesheet" href="css/hub.css">

  <style>
    body.auth-pending { visibility: hidden; }

    .logi-layout { max-width: 1180px; margin: 0 auto; padding: 28px 22px 60px; }

    .logi-back {
      display: inline-block; margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      letter-spacing: 0.06em; color: var(--ink-mute); text-decoration: none;
    }
    .logi-back:hover { color: var(--vert-prairie); }

    .logi-head { margin-bottom: 22px; }
    .logi-title {
      font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 500;
      color: var(--ink); letter-spacing: 0.3px; margin: 0 0 4px;
    }
    .logi-subtitle {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.12em; color: var(--ink-mute); text-transform: uppercase;
    }

    .logi-section { margin-bottom: 30px; }
    .logi-section__title {
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft);
      margin: 0 0 12px; display: flex; align-items: center; gap: 8px;
    }
    /* Grille ressources */
    .logi-ressources { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .logi-res-card {
      display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
      background: #fff; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 16px; cursor: pointer; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .logi-res-card:hover { border-color: var(--vert-prairie); }
    .logi-res-card.is-selected {
      border-color: var(--vert-prairie); box-shadow: 0 0 0 2px var(--vert-light);
    }
    .logi-res-card__label {
      font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500;
      color: var(--ink);
    }
    .logi-res-card__tag {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--bleu-base);
    }

    /* Formulaire */
    .logi-form-fields { opacity: 0.5; pointer-events: none; transition: opacity 0.2s; }
    .logi-form-fields.is-active { opacity: 1; pointer-events: auto; }
    .logi-field { margin-bottom: 14px; }
    .logi-field label {
      display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute);
      margin-bottom: 4px;
    }
    .logi-field input, .logi-field select, .logi-field textarea {
      width: 100%; box-sizing: border-box; font-family: inherit; font-size: 14px;
      padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px;
      background: #fff; color: var(--ink);
    }
    .logi-row2 { display: flex; gap: 12px; }
    .logi-row2 > * { flex: 1; }

    /* Récurrence */
    .logi-recur-line { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .logi-recur-box { display: none; padding: 14px; border: 1px dashed var(--line);
      border-radius: 8px; margin-top: 6px; }
    .logi-recur-box.is-open { display: block; }
    .logi-days { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .logi-day {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      border: 1px solid var(--line); background: #fff; color: var(--ink-soft);
      border-radius: 6px; padding: 6px 10px; cursor: pointer;
    }
    .logi-day.is-on { background: var(--vert-prairie); color: #fff; border-color: var(--vert-prairie); }

    .logi-submit {
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 500;
      letter-spacing: 0.04em; background: var(--vert-prairie); color: #fff;
      border: none; border-radius: 8px; padding: 11px 22px; cursor: pointer;
      margin-top: 6px;
    }
    .logi-submit:disabled { opacity: 0.5; cursor: default; }

    /* Agenda — lignes */
    .logi-agenda-row {
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
      background: #fff; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 8px;
    }
    .logi-agenda-date {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.08em; color: var(--ink-mute);
    }
    .logi-agenda-res {
      font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--ink); flex: 1;
    }
    .logi-agenda-creneau { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); }
    .logi-agenda-motif {
      font-size: 12px; color: var(--ink-mute); font-style: italic;
      flex-basis: 100%;
    }

    .logi-empty {
      text-align: center; padding: 30px 20px; color: var(--ink-mute); font-size: 14px;
    }

    /* Toast */
    .logi-toast {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 8px;
      font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
    }
    .logi-toast.is-show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .logi-toast.is-err { background: var(--rouge-alerte, #b23); }

    /* ========================================================== */
    /* CALENDRIER D'OCCUPATION (v1) — panneau latéral + détail jour */
    /* Conception-Calendrier-Logistique-v1.md (D-Forme : mini-cal   */
    /* latéral + détail du jour sélectionné à côté).                */
    /* ========================================================== */

    /* Layout 2 colonnes : sections existantes à gauche, calendrier  */
    /* à droite. Les sections existantes ne changent pas — elles     */
    /* sont seulement enveloppées par .logi-cols / .logi-col-main.   */
    .logi-cols {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 32px;
      align-items: start;
    }
    .logi-col-main { min-width: 0; }
    .logi-col-side { min-width: 0; }

    .logi-cal {
      position: sticky; top: 18px;
      background: #fff; border: 1px solid var(--line); border-radius: 12px;
      padding: 16px 16px 18px;
    }
    .logi-cal__head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .logi-cal__title {
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink);
    }
    .logi-cal__nav { display: flex; align-items: center; gap: 6px; }
    .logi-cal__nav button {
      width: 26px; height: 26px; border: 1px solid var(--line); border-radius: 7px;
      background: #fff; color: var(--ink-soft); cursor: pointer; font-size: 14px;
      line-height: 1; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .logi-cal__nav button:hover:not(:disabled) {
      border-color: var(--vert-prairie); color: var(--vert-prairie);
    }
    .logi-cal__nav button:disabled { opacity: 0.35; cursor: default; }

    .logi-cal__grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    .logi-cal__wday {
      text-align: center; font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--ink-mute); padding: 2px 0 4px;
    }
    .logi-cal__day {
      position: relative; aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft);
      border: 1px solid transparent; border-radius: 7px; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .logi-cal__day:hover { background: var(--paper, #f6f4ef); }
    .logi-cal__day--empty { cursor: default; }
    .logi-cal__day--today { font-weight: 700; color: var(--ink); }
    .logi-cal__day--has::after {
      content: ''; position: absolute; bottom: 4px; left: 50%;
      transform: translateX(-50%);
      width: 5px; height: 5px; border-radius: 50%; background: var(--vert-prairie);
    }
    .logi-cal__day--selected {
      background: var(--vert-prairie); color: #fff; border-color: var(--vert-prairie);
    }
    .logi-cal__day--selected.logi-cal__day--has::after { background: #fff; }

    .logi-cal__detail {
      margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
    }
    .logi-cal__detail-title {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute);
      margin-bottom: 10px;
    }
    .logi-cal__detail-row {
      display: flex; flex-direction: column; gap: 2px;
      padding: 8px 0; border-bottom: 1px solid var(--line);
    }
    .logi-cal__detail-row:last-child { border-bottom: none; }
    .logi-cal__detail-line1 {
      display: flex; align-items: baseline; gap: 8px;
    }
    .logi-cal__detail-creneau {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--vert-prairie);
      white-space: nowrap;
    }
    .logi-cal__detail-res {
      font-family: 'Oswald', sans-serif; font-size: 14px; color: var(--ink); flex: 1;
    }
    .logi-cal__detail-motif {
      font-size: 11px; color: var(--ink-mute); padding-left: 2px;
    }
    .logi-cal__detail-empty {
      font-size: 12px; color: var(--ink-mute); font-style: italic; padding: 6px 0;
    }

    /* Responsive : sous 860px, le calendrier repasse sous les       */
    /* sections (empilement) et perd le sticky.                      */
    @media (max-width: 860px) {
      .logi-cols { grid-template-columns: 1fr; }
      .logi-cal { position: static; }
    }
  </style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill">SAISON …</div>

    <!-- HUB-NAV-LOGISTIQUE v2 (BLOC A/2) — nav thématique dupliquée à
         l'IDENTIQUE sur logistique.html / logistique-agenda.html /
         logistique-validation.html / bus.html (avenant FAIT FOI gelé
         06/07/2026). REMPLACE la main-nav locale de la page. Liens filtrés
         par rôle : data-nav-show="staff" = admin|bureau|salarié,
         data-nav-show="admin bureau" = admin|bureau. Naissent masqués
         (fail-safe), révélés par le BLOC B après </header>. Navigation
         PURE : aucun contenu vivant (N6). -->
    <nav class="main-nav hub-nav" aria-label="Navigation logistique">
      <a href="./">Accueil</a>
      <a href="dashboard.html" data-nav-show="staff" hidden aria-hidden="true">Tableau de bord</a>

    </nav>

    <div class="user-profile">
      <!-- PROFIL-TOPBAR-ROLE-STATIQUE (soldée par PORTAIL-MULTI-PERIMETRE
           Lot 3, 03/07/2026) : identité EN DUR neutralisée — le helper
           central _remplirProfilTopbar() (supabase-client v1.54→v1.58)
           remplit prénom, fonction et initiales pour tout connecté ; la

      <div class="avatar">·</div>

      </a>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- HUB-NAV-LOGISTIQUE v2 (BLOC B/2) — style + comportement de la nav
       thématique du BLOC A (topbar). Dupliqué à l'IDENTIQUE sur les 4 pages
       du thème (avenant FAIT FOI gelé 06/07/2026). css/hub.css NON touché :
       les surcharges (visibilité mobile de la main-nav, masquée <1000px par
       le fichier commun) sont locales et scopées .hub-nav. -->
  <style>
    .main-nav.hub-nav {
      gap: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .main-nav.hub-nav::-webkit-scrollbar { display: none; }
    .main-nav.hub-nav a.active { cursor: default; }
    @media (max-width: 1000px) {
      /* hub.css masque .main-nav <1000px : la nav thématique y échappe et
         devient une rangée pleine largeur défilable sous la marque. */
      .topbar { height: auto; padding-top: 6px; padding-bottom: 8px; }
      .main-nav.hub-nav {
        display: flex;
        grid-column: 1 / -1; /* topbar en grid entre 768 et 1000px */
        flex-basis: 100%;    /* topbar en flex-wrap sous 768px */
        order: 9;
        justify-content: flex-start;
        padding: 4px 0 2px;
      }
    }
  </style>
  <script>
    // HUB-NAV-LOGISTIQUE v2 — page courante + révélation des liens filtrés.
    (function () {
      var nav = document.querySelector('.main-nav.hub-nav');
      if (!nav) return;

      // Clé d'une URL = fichier + filtre ?type= éventuel. Le guichet sans
      // ?type= vaut 'site' (défaut D6 de logistique-browser.js).
      function cle(href) {
        var u = new URL(href, window.location.href);
        var f = u.pathname.split('/').pop() || 'index.html';
        var t = u.searchParams.get('type');
        if (f === 'logistique.html') { t = t || 'site'; }
        return f + (t ? '?type=' + t : '');
      }

      // Page courante : lien marqué .active (style hub.css existant),
      // href retiré = non-cliquable, patron des main-nav historiques.
      var courante = cle(window.location.href);
      nav.querySelectorAll('a[href]').forEach(function (a) {
        if (cle(a.getAttribute('href')) === courante) {
          a.classList.add('active');
          a.removeAttribute('href');
          a.setAttribute('aria-current', 'page');
        }
      });

      // Révélation fail-safe des liens filtrés. Attend DOMContentLoaded :
      // supabase-client.js est chargé en fin de body, APRÈS ce bloc.
      // Échec silencieux = liens masqués (patron data-show du dashboard).
      document.addEventListener('DOMContentLoaded', async function () {
        try {
          if (typeof SupabaseHub === 'undefined') { return; }
          var session = await SupabaseHub.getSession();
          if (!session) { return; }
          var droits = await Promise.all([
            SupabaseHub.isAdmin(),
            SupabaseHub.hasRole('bureau'),
            SupabaseHub.suisJeSalarie()
          ]);
          var bureau = droits[0] || droits[1];
          var staff = bureau || droits[2];
          nav.querySelectorAll('[data-nav-show]').forEach(function (el) {
            var ok = (el.getAttribute('data-nav-show') === 'staff') ? staff : bureau;
            if (ok) { el.hidden = false; el.removeAttribute('aria-hidden'); }
          });
        } catch (e) { /* honnête : les liens filtrés restent masqués */ }
      });
    })();
  </script>

  <main class="logi-layout">
    <a href="./" class="logi-back" title="Retour à l'accueil">← Retour à l'accueil</a>

      </div><!-- /.logi-col-main -->

      <!-- COLONNE LATÉRALE — Calendrier d'occupation (v1) -->
      <!-- Vue unifiée TOUTES ressources (D-Périmètre), identique    -->
      <!-- sur les 3 pages. Saison entière (D-Temporel), approved     -->
      <!-- seulement (D-Occupation), récurrences projetées via        -->
      <!-- getOccurrences (D-Récurrences).                            -->
      <aside class="logi-col-side">
        <div class="logi-cal" id="logi-cal">
          <div class="logi-cal__head">
            <div class="logi-cal__title" id="logi-cal-title">Calendrier</div>
            <div class="logi-cal__nav">
              <button type="button" id="logi-cal-prev" title="Mois précédent">‹</button>
