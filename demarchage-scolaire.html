<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Démarchage scolaire · MOM Hub</title>
<link rel="icon" type="image/png" href="assets/logo-m2m.png">
<!--
  MOM Hub · Démarchage scolaire — surface EXÉCUTANT (Lohann) du module B.
  Brique 4 — RÉÉCRITE le 05/07/2026 (arbitrage Manu « B », après maquettes
  A / B / hybride).

  PRINCIPE OPPOSABLE RÉÉCRIT (remplace le §1 « une carte, zéro liste ») :
    « La liste complète, chaque action à un tap. » Lohann voit toutes les
    écoles démarchables, cherche, filtre (statut + zone), et agit depuis la
    ligne : appeler, mail-type, marquer fait. Le MOTEUR DE PRIORITÉ de la
    version carte survit en ORDRE DE TRI (relance due > à convertir >
    premier contact) puis proximité de zone, et en BADGES par ligne.
    L'ancienne version carte (« un geste à la fois ») reste dans l'historique
    git si le terrain redemande le mode focalisé.

  ARCHITECTURE (inchangée) :
    - charge supabase.min.js (CDN) puis js/supabase-client.js (SupabaseHub).
    - garde d'auth : getSession()->login.html ; salarié OU admin|bureau.
    - RPC consommées :
        list_prospection_pour_salarie()            (sql_132 + sql_164 : +telephone,
          commune, zone, lieu_pratique) — lecture, garde bureau OU salarié ;
        list_prospection_contacts_internes(p_id)   (sql_161 + garde élargie
          sql_164) — enseignants, chargés au dépliage d'une ligne ;
        marquer_contactee(p_entite_id)             (sql_133, idempotente) —
          geste de clôture « C'est fait » ;
        inserer_prospection_contact : TOUJOURS PAS appelée ici — la
          journalisation reste portée par le bureau (FAIT FOI §3.1 maintenu,
          point 3 non rouvert).

  DÉTAILS D'UNE LIGNE (tap sur la ligne) : lieu de pratique envisagé,
  contact principal, contacts internes (lazy), mail vierge.
  Filtres : statut (À traiter par défaut / Relances dues / Intéressées /
  Toutes — clientes et en sommeil ne sortent que sous « Toutes ») ;
  zone (Toutes / Molsheim / Proche secteur / Obernai nord / Obernai sud).
  Recherche accent-insensible sur libellé, commune, zone.
-->
<link rel="stylesheet" href="css/hub.css">
<style>
  body.auth-pending { visibility: hidden; }

  .dg-wrap { max-width: 720px; margin: 0 auto; padding: 28px 20px 56px; }
  .dg-hd { text-align: center; margin-bottom: 18px; }
  .dg-hd h1 { font-size: 19px; margin: 0 0 4px; color: var(--ink, #0c3d24); }
  .dg-hd p { font-size: 13px; color: var(--ink-mute, #6b7a74); margin: 0; }

  .gs-msg { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-bottom: 14px; display: none; }
  .gs-msg.ok { background: #e8f1ec; color: var(--vert-prairie, #1b6b4c); display: block; }
  .gs-msg.err { background: #f7e6e2; color: var(--rouge-blesse, #c0392b); display: block; }

  .dg-search { width: 100%; box-sizing: border-box; padding: 10px 12px; margin: 0 0 10px;
               border: 1px solid var(--paper-warm, #e3e0d8); border-radius: 10px; font: inherit; }
  .dg-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 8px; }
  .dg-chip { border: 1px solid var(--paper-warm, #e3e0d8); background: #fff; border-radius: 999px;
             padding: 5px 12px; font: inherit; font-size: 12px; cursor: pointer;
             color: var(--ink-mute, #6b7a74); }
  .dg-chip.on { background: var(--vert-prairie, #2d7a3e); border-color: var(--vert-prairie, #2d7a3e);
                color: #fff; font-weight: 600; }
  .dg-count { font-size: 12px; color: var(--ink-mute, #6b7a74); margin: 8px 0 6px; }

  .dg-row { border-bottom: 1px solid var(--paper-warm, #e3e0d8); padding: 10px 2px; }
  .dg-row-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .dg-row-main { min-width: 0; cursor: pointer; flex: 1; }
  .dg-nom { font-size: 14px; font-weight: 600; margin: 0; color: var(--ink, #0c3d24); }
  .dg-meta { font-size: 12px; color: var(--ink-mute, #6b7a74); margin: 2px 0 0; }
  .dg-acts { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .dg-icbtn { border: 1px solid var(--paper-warm, #e3e0d8); background: #fff; border-radius: 8px;
              padding: 6px 9px; cursor: pointer; color: var(--ink, #0c3d24);
              display: inline-flex; align-items: center; text-decoration: none; }
  .dg-icbtn svg { width: 16px; height: 16px; }
  .dg-icbtn:disabled { opacity: .45; cursor: default; }

  .dg-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
              padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .dg-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .dg-badge.relance   { background: #fdf1dc; color: #8a5a12; }
  .dg-badge.convertir { background: #e3edf8; color: #1f4a82; }
  .dg-badge.premier   { background: #e8f1ec; color: #1b6b4c; }
  .dg-badge.client    { background: #eef3ef; color: #2d7a3e; }
  .dg-badge.inactif   { background: #f1efe8; color: #6b7a74; }

  .dg-detail { margin-top: 10px; padding: 10px 12px; background: #fbfaf6;
               border: 1px solid var(--paper-warm, #e3e0d8); border-radius: 10px; font-size: 13px; }
  .dg-detail p { margin: 0 0 6px; }
  .dg-detail .titre { font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
                      color: var(--ink-mute, #6b7a74); margin: 8px 0 4px; }
  .dg-lieu { padding: 7px 10px; background: #eef3ef; border-radius: 8px; color: var(--ink, #0c3d24); }
  .dg-iclasse { display: inline-block; background: #eef3ef; border-radius: 6px; padding: 0 7px;
                font-weight: 600; margin-right: 6px; }
  .dg-lien { color: var(--bleu-base, #1f4a82); text-decoration: underline; cursor: pointer;
             background: transparent; border: 0; font: inherit; font-size: 13px; padding: 0; }

  .dg-empty { text-align: center; padding: 40px 16px; color: var(--ink-mute, #6b7a74); }
  .dg-loading { text-align: center; padding: 40px 16px; color: var(--ink-mute, #6b7a74); }
</style>
</head>
<body class="auth-pending">

<header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill" id="season-pill">SAISON …</div>

    <nav class="main-nav">
      <a href="dashboard.html">Tableau de bord</a>
      <a href="suivi-salarie.html">Mon suivi</a>
    </nav>

    <div class="user-profile">
      <div class="avatar" id="dgAvatar">EJ</div>
      <div class="user-info">
        <div class="user-name" id="dgName">Emmanuel Jung</div>
        <div class="user-role">Administrateur</div>
      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </a>
      <button type="button" class="user-action" id="btn-signout" title="Se déconnecter" aria-label="Se déconnecter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

<div class="dg-wrap">
  <div class="dg-hd">
    <h1>Écoles à démarcher</h1>
    <p>La liste complète — appelez, écrivez, notez : chaque action à un tap.</p>
  </div>

  <div id="gsMsg" class="gs-msg"></div>

  <input type="search" class="dg-search" id="dgSearch"
         placeholder="Rechercher (nom, commune, zone…)" autocomplete="off">

  <div class="dg-chips" id="dgStatuts"></div>
  <div class="dg-chips" id="dgZones"></div>

  <p class="dg-count" id="dgCount"></p>

  <div id="dgListe">
    <div class="dg-loading">Chargement des écoles…</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/season-pill.js"></script>
<script>

(async function () {
  'use strict';

  // --- Garde d'auth : salarié OU admin|bureau (inchangée) ---
  const session = await SupabaseHub.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  const roles = await SupabaseHub.getMyRoles();
  const estBureau = roles.indexOf('admin') !== -1 || roles.indexOf('bureau') !== -1;
  let estSalarie = false;
  try { estSalarie = !!(await SupabaseHub.client.rpc('suis_je_salarie')).data; } catch (_) { estSalarie = false; }
  if (!estBureau && !estSalarie) { window.location.replace('./'); return; }
  document.body.classList.remove('auth-pending');
  document.body.classList.add('auth-resolved');

  var _signout = document.getElementById('btn-signout');
  if (_signout) {
    _signout.addEventListener('click', async function () {
      _signout.disabled = true;
      await SupabaseHub.signOut();
    });
  }

  try {
    const sa = await SupabaseHub.getSaisonActive();
    if (sa && sa.libelle) {
      const _pill = document.getElementById('season-pill');
      if (_pill) _pill.textContent = 'SAISON ' + sa.libelle;
    }
  } catch (_) { /* libellé statique conservé */ }

  const client = SupabaseHub.client;
  const $ = (id) => document.getElementById(id);

  function flash(text, kind) {
    const m = $('gsMsg');
    m.textContent = text; m.className = 'gs-msg ' + kind;
    if (kind === 'ok') setTimeout(() => { m.className = 'gs-msg'; }, 3500);
    if (kind === 'err') { window.scrollTo({ top: 0, behavior: 'smooth' }); }
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
  function errMsg(e) {
    const m = (e && (e.message || e.error_description || e.hint)) || 'Erreur inconnue.';
    return /salari|admin|bureau|réserv/i.test(m) ? "Accès réservé au salarié ou à l'administration." : m;
  }
  async function rpc(name, params) {
    const { data, error } = await client.rpc(name, params || {});
    if (error) throw error;
    return data;
  }
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function normaliser(s) {
    return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  }

  // ---------- Priorité (héritée de la version carte : tri + badges) ----------
  // 0 = relance due, 1 = à convertir, 2 = premier contact, 3 = cliente, 4 = en sommeil.
  function prioRang(e, today) {
    if (e.statut_prospection === 'inactif') return 4;
    if (e.statut_prospection === 'client') return 3;
    if (e.derniere_relance && e.derniere_relance <= today) return 0;
    if (e.statut_prospection === 'interesse') return 1;
    return 2;
  }
  const PRIO_BADGE = {
    0: ['relance', 'Relance due'],
    1: ['convertir', 'À convertir'],
    2: ['premier', 'Premier contact'],
    3: ['client', 'Cliente'],
    4: ['inactif', 'En sommeil']
  };

  // Proximité : plus le rang est bas, plus l'école est proche du club.
  const ZONE_RANG = {
    'Circ. Molsheim': 0,
    'Proche secteur (Eurométropole S-O)': 1,
    'Circ. Obernai (nord)': 2,
    'Circ. Obernai (sud)': 3
  };
  function zoneRang(z) {
    return (z != null && ZONE_RANG[z] !== undefined) ? ZONE_RANG[z] : 9;
  }

  // ---------- Filtres ----------
  const STATUT_CHIPS = [
    ['a_traiter', 'À traiter'],
    ['relance', 'Relances dues'],
    ['interesse', 'Intéressées'],
    ['toutes', 'Toutes']
  ];
  const ZONES_CHIPS = [
    [null, 'Toutes zones'],
    ['Circ. Molsheim', 'Molsheim'],
    ['Proche secteur (Eurométropole S-O)', 'Proche secteur'],
    ['Circ. Obernai (nord)', 'Obernai nord'],
    ['Circ. Obernai (sud)', 'Obernai sud']
  ];

  // ---------- État ----------
  let ecoles = [];
  let mailTypesCache = null;
  let filtreStatut = 'a_traiter';
  let zoneCourante = null;
  let recherche = '';
  let ligneOuverte = null;               // entite_id de la ligne dépliée.
  const internesCache = new Map();       // entite_id -> rows (lazy, par session).

  function passeFiltre(e, today) {
    if (zoneCourante != null && e.zone !== zoneCourante) return false;
    if (recherche) {
      const hay = normaliser([e.libelle, e.commune, e.zone].filter(Boolean).join(' '));
      if (hay.indexOf(recherche) === -1) return false;
    }
    const rang = prioRang(e, today);
    if (filtreStatut === 'toutes') return true;
    if (filtreStatut === 'relance') return rang === 0;
    if (filtreStatut === 'interesse') return rang === 1;
    // « À traiter » = tout ce qui appelle un geste : relance, conversion, premier contact.
    return rang <= 2;
  }

  // ---------- Rendu ----------
  function renderChips() {
    $('dgStatuts').innerHTML = STATUT_CHIPS.map(([val, lbl]) =>
      '<button type="button" class="dg-chip' + ((val === filtreStatut) ? ' on' : '')
      + '" data-statut="' + val + '">' + escapeHtml(lbl) + '</button>').join('');
    $('dgZones').innerHTML = ZONES_CHIPS.map(([val, lbl]) =>
      '<button type="button" class="dg-chip' + ((val === zoneCourante) ? ' on' : '')
      + '" data-zone="' + (val == null ? '' : escapeHtml(val)) + '">' + escapeHtml(lbl) + '</button>').join('');
  }

  function rendre() {
    renderChips();
    const today = todayStr();
    const visibles = ecoles.filter(e => passeFiltre(e, today));
    visibles.sort((a, b) => {
      const pa = prioRang(a, today), pb = prioRang(b, today);
      if (pa !== pb) return pa - pb;
      const za = zoneRang(a.zone), zb = zoneRang(b.zone);
      if (za !== zb) return za - zb;
      return String(a.libelle || '').localeCompare(String(b.libelle || ''), 'fr');
    });

    $('dgCount').textContent = visibles.length
      ? (visibles.length + (visibles.length > 1 ? ' écoles' : ' école') + ' · triées par priorité puis proximité')
      : '';

    const box = $('dgListe');
    if (!visibles.length) {
      box.innerHTML = '<div class="dg-empty"><h2 style="font-size:16px;margin:0 0 6px;">Rien à afficher ici</h2>'
        + '<p style="margin:0;">Changez de filtre ou de zone — ou tout est à jour, et c\'est une bonne nouvelle.</p></div>';
      return;
    }

    box.innerHTML = visibles.map(e => {
      const today2 = today;
      const [cls, lbl] = PRIO_BADGE[prioRang(e, today2)];
      const meta = [e.commune, e.telephone, e.contact_nom].filter(Boolean).join(' · ');
      const tel = e.telephone ? String(e.telephone).split('/')[0].replace(/[^+0-9]/g, '') : '';
      const peutMail = e.type_entite === 'ecole_elementaire' && e.contact_email;
      return ''
        + '<div class="dg-row" data-id="' + e.entite_id + '">'
        +   '<div class="dg-row-top">'
        +     '<div class="dg-row-main" data-open="' + e.entite_id + '">'
        +       '<p class="dg-nom">' + escapeHtml(e.libelle) + '</p>'
        +       (meta ? '<p class="dg-meta">' + escapeHtml(meta) + '</p>' : '')
        +     '</div>'
        +     '<div class="dg-acts">'
        +       '<span class="dg-badge ' + cls + '"><span class="dot"></span>' + escapeHtml(lbl) + '</span>'
        +       (tel
              ? '<a class="dg-icbtn" href="tel:' + tel + '" title="Appeler" aria-label="Appeler">'
                + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>'
              : '')
        +       (peutMail
              ? '<button type="button" class="dg-icbtn" data-mail="' + e.entite_id + '" title="Préparer le mail-type" aria-label="Préparer le mail-type">'
                + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg></button>'
              : '')
        +       '<button type="button" class="dg-icbtn" data-fait="' + e.entite_id + '" title="C\'est fait" aria-label="C\'est fait">'
        +         '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg></button>'
        +     '</div>'
        +   '</div>'
        +   (ligneOuverte === e.entite_id ? renderDetail(e) : '')
        + '</div>';
    }).join('');

    if (ligneOuverte) chargerInternes(ligneOuverte);
  }

  function renderDetail(e) {
    const mailVierge = e.contact_email
      ? '<a class="dg-lien" href="mailto:' + encodeURIComponent(e.contact_email) + '">Écrire un mail vierge</a>'
      : '';
    return ''
      + '<div class="dg-detail">'
      +   (e.lieu_pratique
          ? '<p class="dg-lieu">Lieu de pratique envisagé : ' + escapeHtml(e.lieu_pratique) + '</p>'
          : '<p style="color:var(--ink-mute,#6b7a74)">Lieu de pratique envisagé : à collecter au premier contact.</p>')
      +   (e.contact_email
          ? '<p>' + escapeHtml([e.contact_nom, e.contact_email].filter(Boolean).join(' · ')) + (mailVierge ? ' — ' + mailVierge : '') + '</p>'
          : '')
      +   '<p class="titre">Contacts internes</p>'
      +   '<div id="dgInternes-' + e.entite_id + '"><span style="color:var(--ink-mute,#6b7a74)">Chargement…</span></div>'
      + '</div>';
  }

  async function chargerInternes(entiteId) {
    const box = document.getElementById('dgInternes-' + entiteId);
    if (!box) return;
    try {
      let rows = internesCache.get(entiteId);
      if (!rows) {
        rows = (await rpc('list_prospection_contacts_internes', { p_entite_id: entiteId })) || [];
        internesCache.set(entiteId, rows);
      }
      if (!rows.length) {
        box.innerHTML = '<span style="color:var(--ink-mute,#6b7a74)">Aucun contact interne pour l\'instant.</span>';
        return;
      }
      box.innerHTML = rows.map(r => {
        const nom = [r.prenom, r.nom].filter(Boolean).join(' ');
        const coord = [r.telephone, r.email].filter(Boolean).join(' · ');
        return '<p style="margin:0 0 4px;">'
          + (r.classe ? '<span class="dg-iclasse">' + escapeHtml(r.classe) + '</span>' : '')
          + escapeHtml(nom) + (coord ? ' — ' + escapeHtml(coord) : '') + '</p>';
      }).join('');
    } catch (err) {
      box.innerHTML = '<span style="color:var(--ink-mute,#6b7a74)">Lecture impossible : '
        + escapeHtml(errMsg(err)) + '</span>';
    }
  }

  // ---------- Actions ----------
  async function marquerFait(entiteId, btn) {
    if (btn) btn.disabled = true;
    try {
      await rpc('marquer_contactee', { p_entite_id: entiteId });
      flash('Noté.', 'ok');
      ecoles = (await rpc('list_prospection_pour_salarie')) || [];
      rendre();
    } catch (err) {
      if (btn) btn.disabled = false;
      flash('Action impossible : ' + errMsg(err), 'err');
    }
  }

  async function ouvrirMailType(e) {
    try {
      if (mailTypesCache === null) {
        const resp = await fetch('data/mail-types.json?nocache=' + Date.now());
        if (!resp.ok) throw new Error('mail-types.json introuvable');
        mailTypesCache = await resp.json();
      }
      const tpl = mailTypesCache.mails && mailTypesCache.mails[e.type_entite];
      if (!tpl) { flash('Aucun mail-type pour ce type d\'école.', 'err'); return; }
      const inject = (s) => String(s || '')
        .replace(/\{nom_ecole\}/g, e.libelle || '')
        .replace(/\{contact_nom\}/g, e.contact_nom || 'Madame, Monsieur');
      const mailto = 'mailto:' + encodeURIComponent(e.contact_email || '')
        + '?subject=' + encodeURIComponent(inject(tpl.objet))
        + '&body=' + encodeURIComponent(inject(tpl.corps));
      window.location.href = mailto;
      flash('Mail préparé dans votre messagerie — pensez à indiquer un créneau.', 'ok');
    } catch (err) {
      flash('Préparation du mail impossible : ' + errMsg(err), 'err');
    }
  }

  // ---------- Écouteurs ----------
  $('dgSearch').addEventListener('input', function () {
    recherche = normaliser(this.value.trim());
    rendre();
  });
  $('dgStatuts').addEventListener('click', function (ev) {
    const b = ev.target.closest('.dg-chip');
    if (!b) return;
    filtreStatut = b.dataset.statut;
    rendre();
  });
  $('dgZones').addEventListener('click', function (ev) {
    const b = ev.target.closest('.dg-chip');
    if (!b) return;
    zoneCourante = b.dataset.zone === '' ? null : b.dataset.zone;
    rendre();
  });
  $('dgListe').addEventListener('click', function (ev) {
    const mail = ev.target.closest('[data-mail]');
    if (mail) {
      const e = ecoles.find(x => x.entite_id === mail.dataset.mail);
      if (e) ouvrirMailType(e);
      return;
    }
    const fait = ev.target.closest('[data-fait]');
    if (fait) { marquerFait(fait.dataset.fait, fait); return; }
    const open = ev.target.closest('[data-open]');
    if (open) {
      ligneOuverte = (ligneOuverte === open.dataset.open) ? null : open.dataset.open;
      rendre();
    }
  });

  // ---------- Boot ----------
  try {
    ecoles = (await rpc('list_prospection_pour_salarie')) || [];
    rendre();
  } catch (err) {
    $('dgListe').innerHTML = '<div class="dg-empty"><h2 style="font-size:16px;margin:0 0 6px;">Chargement impossible</h2><p style="margin:0;">'
      + escapeHtml(errMsg(err)) + '</p></div>';
  }

})();
</script>
