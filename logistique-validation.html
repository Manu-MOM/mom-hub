<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validation logistique · MOM Hub</title>
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <meta name="description" content="Poste de validation des réservations logistiques et demandes de bus — MOM Hub." />

  <link rel="stylesheet" href="css/hub.css">
  <!-- Module partagé AGENDA-HUB-PATRON (pt 147, CSS corrigé pt 148 md5 85b567b9…). -->
  <link rel="stylesheet" href="css/hub-agenda.css">

  <style>
    /* ==========================================================
       REFONTE-PARCOURS-LOGISTIQUE (FAIT FOI 777551e9…, phase B) —
       POSTE DE VALIDATION TRI-SOURCE (arbitrages 5.1b/5.2/5.3,
       disposition 2A validée en maquette : file à gauche, agenda
       à droite pour l'arbitrage EN CONTEXTE de conflit).
       Forme R4 tranchée au DS-1 phase B : tuile du dashboard →
       cette page dédiée (le dashboard reste un hub de tuiles,
       largeur 960px incompatible avec la 2A).
       Garde de page = bureau|admin (ergonomie) ; la VÉRITÉ reste
       les RPC valider_* gardées bureau|admin (§1.4 — rien à
       toucher côté SQL).
       ========================================================== */
    body.auth-pending { visibility: hidden; }

    .lgv-layout { max-width: 1500px; margin: 0 auto; padding: 28px 22px 60px; }

    .lgv-back {
      display: inline-block; margin-bottom: 16px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      letter-spacing: 0.06em; color: var(--ink-mute); text-decoration: none;
    }
    .lgv-back:hover { color: var(--vert-prairie); }

    .lgv-head { margin-bottom: 18px; }
    .lgv-title {
      font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 500;
      color: var(--ink); letter-spacing: 0.3px; margin: 0 0 4px;
    }
    .lgv-subtitle {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.12em; color: var(--ink-mute); text-transform: uppercase;
    }

    /* Disposition 2A : file (gauche) / agenda (droite) */
    .lgv-cols {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 30px;
      align-items: start;
    }
    .lgv-col-file { min-width: 0; }
    .lgv-col-agenda { min-width: 0; }
    @media (max-width: 1020px) {
      .lgv-cols { grid-template-columns: 1fr; }
    }

    .lgv-section { margin-bottom: 28px; }
    .lgv-section__title {
      font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft);
      margin: 0 0 12px; display: flex; align-items: center; gap: 8px;
    }
    .lgv-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
      background: var(--vert-prairie); color: #fff; border-radius: 10px;
      padding: 1px 7px; min-width: 16px; text-align: center;
    }
    .lgv-badge:empty { display: none; }

    /* File tri-source : une carte par demande en attente */
    .lgv-card {
      background: #fff; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .lgv-card__top {
      display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .lgv-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--line); border-radius: 8px; padding: 2px 7px;
      color: var(--ink-mute);
    }
    .lgv-tag--recur { color: #4a3577; border-color: #cfc3ee; }
    .lgv-tag--bus   { color: #333e4a; border-color: #c4ccd4; }
    .lgv-card__res {
      font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--ink); flex: 1;
    }
    .lgv-card__meta {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.06em; color: var(--ink-mute); margin-bottom: 2px;
    }
    .lgv-card__motif { font-size: 12px; color: var(--ink-mute); font-style: italic; }
    .lgv-card__actions { display: flex; gap: 8px; margin-top: 9px; }
    .lgv-btn-ok, .lgv-btn-no, .lgv-btn-toggle {
      font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 500;
      border-radius: 6px; padding: 7px 14px; cursor: pointer; border: 1px solid var(--line);
    }
    .lgv-btn-ok { background: var(--vert-prairie); color: #fff; border-color: var(--vert-prairie); }
    .lgv-btn-no { background: #fff; color: var(--rouge-alerte, #b23); }
    .lgv-btn-ok:disabled, .lgv-btn-no:disabled, .lgv-btn-toggle:disabled { opacity: 0.5; cursor: default; }
    .lgv-btn-toggle { background: #fff; color: var(--ink-soft); }
    .lgv-card.is-suspended { opacity: 0.55; }

    /* ----------------------------------------------------------
       Modale d'édition (cycle de vie B3) — CSS de PAGE, aucune
       dépendance aux classes ag-* du module (indépendance tracée).
       z-index 80 : au-dessus de la modale de détail du module (60).
       ---------------------------------------------------------- */
    .lgv-edit-overlay {
      position: fixed; inset: 0; background: rgba(20, 24, 28, 0.45);
      display: none; align-items: center; justify-content: center;
      z-index: 80; padding: 16px;
    }
    .lgv-edit-overlay.is-open { display: flex; }
    .lgv-edit-modal {
      background: #fff; border-radius: 12px; max-width: 480px; width: 100%;
      max-height: 90vh; overflow: auto; padding: 20px;
    }
    .lgv-edit-modal h3 { margin: 0 0 14px; font-family: 'Oswald', sans-serif; }
    .lgv-edit-field { margin-bottom: 12px; }
    .lgv-edit-field label {
      display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute);
      margin-bottom: 4px;
    }
    .lgv-edit-field input, .lgv-edit-field select {
      width: 100%; box-sizing: border-box; padding: 8px 10px;
      border: 1px solid var(--line); border-radius: 6px;
      font-size: 14px; font-family: inherit; background: #fff;
    }
    .lgv-edit-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .lgv-edit-days { display: flex; gap: 6px; flex-wrap: wrap; }
    .lgv-edit-day {
      font-family: 'Oswald', sans-serif; font-size: 12px; padding: 6px 10px;
      border: 1px solid var(--line); border-radius: 6px; background: #fff; cursor: pointer;
    }
    .lgv-edit-day.is-on {
      background: var(--vert-prairie); color: #fff; border-color: var(--vert-prairie);
    }
    .lgv-edit-exclues { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .lgv-edit-exclues-vide { font-size: 12px; color: #888; }
    .lgv-edit-exclue {
      font-size: 12px; padding: 4px 8px; border: 1px solid var(--line);
      border-radius: 6px; background: #f6f6f6; display: inline-flex;
      align-items: center; gap: 6px;
    }
    .lgv-edit-exclue button {
      border: none; background: none; cursor: pointer; padding: 0;
      line-height: 1; font-weight: bold; color: var(--rouge-alerte, #b23);
    }
    .lgv-edit-exclure-row { display: flex; gap: 8px; align-items: center; }
    .lgv-edit-exclure-row input { flex: 1; }
    .lgv-edit-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap;
    }
    .lgv-btn-annule {
      background: #fff; color: var(--rouge-alerte, #b23);
      font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 500;
      border: 1px solid var(--line); border-radius: 6px; padding: 7px 14px;
      cursor: pointer; margin-right: auto;
    }
    .lgv-btn-annule:disabled { opacity: 0.5; cursor: default; }

    .lgv-empty {
      text-align: center; padding: 24px 16px; color: var(--ink-mute); font-size: 13.5px;
      background: #fff; border: 1px dashed var(--line); border-radius: 10px;
    }

    /* ----------------------------------------------------------
       PALETTE PAR RESSOURCE (arbitrage 5.4 — 7 entrées, IDENTIQUE
       à logistique-agenda.html : duplication de page assumée et
       tracée, patron G5).
       ---------------------------------------------------------- */
    .ag-ev.t-site-mom-brenckle,   .ag-chip.t-site-mom-brenckle   { background:#e7f3ea; color:#1d5c33; border-left-color:#2d7d46; }
    .ag-sw.t-site-mom-brenckle   { background:#2d7d46; }
    .ag-ev.t-site-mom-holtzplatz, .ag-chip.t-site-mom-holtzplatz { background:#eaf1fa; color:#1f4a6b; border-left-color:#2f6fb0; }
    .ag-sw.t-site-mom-holtzplatz { background:#2f6fb0; }
    .ag-ev.t-site-mom-clubhouse,  .ag-chip.t-site-mom-clubhouse  { background:#faeee8; color:#7a3d20; border-left-color:#c0622f; }
    .ag-sw.t-site-mom-clubhouse  { background:#c0622f; }
    .ag-ev.t-minibus-1,           .ag-chip.t-minibus-1           { background:#f1ecfa; color:#4a3577; border-left-color:#6d4fc2; }
    .ag-sw.t-minibus-1           { background:#6d4fc2; }
    .ag-ev.t-minibus-2,           .ag-chip.t-minibus-2           { background:#faf3e2; color:#7a5a12; border-left-color:#d9a222; }
    .ag-sw.t-minibus-2           { background:#d9a222; }
    .ag-ev.t-veo,                 .ag-chip.t-veo                 { background:#fae9f0; color:#82345a; border-left-color:#c7508a; }
    .ag-sw.t-veo                 { background:#c7508a; }
    .ag-ev.t-bus,                 .ag-chip.t-bus                 { background:#eceff2; color:#333e4a; border-left-color:#52616f; }
    .ag-sw.t-bus                 { background:#52616f; }
    /* Repères informatifs (AGENDA-VACANCES-FERIES) : rendus en ÉTIQUETTES
       (ajustement recette 07/07/2026) — fond quasi transparent, liseré
       pointillé, italique compact : ne se lisent plus comme des créneaux.
       Scopé à t-ferie/t-vacances : les puces métier (bus...) inchangées. */
    .ag-ev.t-ferie,               .ag-chip.t-ferie               { background:rgba(201,138,138,.08); color:#8a4a4a; border:1px dashed #c98a8a; font-size:10px; font-style:italic; line-height:1.2; padding:1px 6px; }
    .ag-sw.t-ferie               { background:#c98a8a; }
    .ag-ev.t-vacances,            .ag-chip.t-vacances            { background:rgba(201,194,178,.12); color:#7a746a; border:1px dashed #c9c2b2; font-size:10px; font-style:italic; line-height:1.2; padding:1px 6px; }
    .ag-sw.t-vacances            { background:#c9c2b2; }

    /* Pending : hachuré + bordure pointillée (badge ⏳ via etatMark) */
    .ag-ev.pending, .ag-chip.pending {
      border-left-style: dashed;
      outline: 1px dashed rgba(60, 60, 60, 0.45);
      outline-offset: -1px;
      background-image: repeating-linear-gradient(
        45deg, rgba(255, 255, 255, 0.55) 0 5px, transparent 5px 10px);
    }

    /* Toast */
    .lgv-toast {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 8px;
      font-size: 14px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
      z-index: 70;
    }
    .lgv-toast.is-show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .lgv-toast.is-err { background: var(--rouge-alerte, #b23); }
  </style>

  <script>
    /* ========================================================================
       POSTE DE VALIDATION TRI-SOURCE
       (REFONTE-PARCOURS-LOGISTIQUE phase B, FAIT FOI 777551e9…)

       - File (gauche) : ponctuelles pending + règles récurrentes pending +
         demandes de bus pending, Approuver/Refuser via les wrappers existants
         validerReservation / validerRecurrence / validerBus (RPC gardées
         bureau|admin, §1.4 — AUCUN SQL). Refus : motif facultatif au prompt
         (patron du guichet, repris à l'identique).
       - Règles récurrentes : gestion Suspendre/Réactiver (setRecurrenceActive)
         DÉMÉNAGÉE du guichet (retrait §5.5) — le poste reprend l'intégralité
         de la fonction.
       - Agenda (droite) : MÊME adaptateur tri-source que
         logistique-agenda.html (jumeau — duplication de page assumée et
         tracée, patron G5) ; l'action injectée dans la modale de détail =
         « Approuver » sur un item pending (arbitrage en contexte 2A) ; le
         refus passe par la file (une seule action par modale, contrat module).
       - Après chaque décision : file + règles rechargées ET agenda.refresh().
       ======================================================================== */
    (async function () {
      'use strict';

      function el(id) { return document.getElementById(id); }
      function pad2(n) { return (n < 10 ? '0' : '') + n; }
      function isoOf(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }
      var JOURS_LBL = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim']; // 0=Lun..6=Dim
      var MOIS_LONG = ['janvier','février','mars','avril','mai','juin','juillet',
                       'août','septembre','octobre','novembre','décembre'];
      function formatDateLong(iso) {
        if (!iso) return '';
        var d = new Date(iso + 'T00:00:00');
        if (isNaN(d.getTime())) return '';
        return d.getDate() + ' ' + MOIS_LONG[d.getMonth()] + ' ' + d.getFullYear();
      }

      function showToast(msg, ok) {
        var t = el('lgv-toast');
        if (!t) { alert(msg); return; }
        t.textContent = msg;
        t.className = 'lgv-toast is-show ' + (ok === false ? 'is-err' : 'is-ok');
        setTimeout(function () { t.className = 'lgv-toast'; }, 3200);
      }

      // ------------------------------------------------------------------
      // Garde de page : bureau|admin (ergonomie — la vérité reste les RPC).
      // ------------------------------------------------------------------
      var session = await SupabaseHub.getSession();
      if (!session) { window.location.replace('login.html'); return; }
      var roles = await Promise.all([
        SupabaseHub.isAdmin(),
        SupabaseHub.hasRole('bureau')
      ]);
      if (!roles[0] && !roles[1]) { window.location.replace('./'); return; }
      document.body.classList.remove('auth-pending');
      document.body.classList.add('auth-resolved');

      var signoutBtn = el('btn-signout');
      if (signoutBtn) {
        signoutBtn.addEventListener('click', async function () {
          signoutBtn.disabled = true;
          await SupabaseHub.signOut();
        });
      }
      if (SupabaseHub.onAuthChange) {
        SupabaseHub.onAuthChange(function (event) {
          if (event === 'SIGNED_OUT') window.location.replace('login.html');
        });
      }

      // ------------------------------------------------------------------
      // Référentiels (jumeau de logistique-agenda.html)
      // ------------------------------------------------------------------
      var ressById = {};
      var catById = {};
      var persById = {};   // MULTI (M6) : personne_id -> nom (détail)

      async function chargerReferentiels() {
        var r1 = await SupabaseHub.client
          .from('ressources_logistiques')
          .select('id, code, type, sous_type, libelle, actif')
          .order('libelle', { ascending: true });
        if (r1.error) throw r1.error;
        (r1.data || []).forEach(function (r) { ressById[r.id] = r; });
        var r2 = await SupabaseHub.client
          .from('categories')
          .select('id, code, libelle_court, libelle_long')
          .order('ordre_tri', { ascending: true });
        if (r2.error) throw r2.error;
        (r2.data || []).forEach(function (c) {
          catById[c.id] = c.libelle_court || c.code || c.libelle_long || c.id;
        });
        // MULTI (M6/M7) : noms des responsables pour l'affichage au détail.
        // Voie éprouvée listStaffDisponibles(null) = tous les staffs actifs
        // (RPC) ; un id absent (fonction terminée) s'affiche '—' — tracé.
        try {
          var staff = await SupabaseHub.listStaffDisponibles(null);
          (staff || []).forEach(function (p) {
            if (p && p.personne_id) {
              persById[p.personne_id] = ((p.nom || '') + ' ' + (p.prenom || '')).trim();
            }
          });
        } catch (e) { /* fail-soft : détail sans noms */ }
      }

      function typeCodeOf(ressourceId) {
        var r = ressById[ressourceId];
        return (r && r.code) ? r.code : 'autre';
      }
      function ressLbl(ressourceId) {
        var r = ressById[ressourceId];
        return r ? r.libelle : '—';
      }
      function catLbl(categorieId) {
        if (!categorieId) return 'Bureau / Autre';
        return catById[categorieId] || '—';
      }
      // MULTI (M7) : concaténation « M16 + M18 » dans l'ordre du tableau ;
      // fallback scalaire pour les lignes d'avant chantier ; vide =
      // Bureau / Autre (M3). catLbl (mono) conservé — additif.
      function catsLbl(row) {
        var ids = (row && Array.isArray(row.categorie_ids) && row.categorie_ids.length)
          ? row.categorie_ids
          : (row && row.categorie_id ? [row.categorie_id] : []);
        if (!ids.length) return 'Bureau / Autre';
        return ids.map(function (id) { return catById[id] || '—'; }).join(' + ');
      }
      // MULTI (M6) : responsables — 1er = officiel, suivants indicatifs.
      function respsLbl(row) {
        var ids = (row && Array.isArray(row.responsables_personne_ids)
            && row.responsables_personne_ids.length)
          ? row.responsables_personne_ids
          : (row && row.responsable_personne_id ? [row.responsable_personne_id] : []);
        if (!ids.length) return null;
        return ids.map(function (id, i) {
          var nom = persById[id] || '—';
          return i === 0 ? nom : nom + ' (indicatif)';
        }).join(' · ');
      }
      function dureeEntre(hd, hf) {
        if (!hd || !hf) return null;
        var a = parseInt(String(hd).slice(0, 2), 10) * 60 + parseInt(String(hd).slice(3, 5), 10);
        var b = parseInt(String(hf).slice(0, 2), 10) * 60 + parseInt(String(hf).slice(3, 5), 10);
        if (isNaN(a) || isNaN(b) || b <= a) return null;
        return b - a;
      }
      function freqLbl(f) {
        return f === 'weekly' ? 'Hebdomadaire'
             : f === 'biweekly' ? 'Une semaine sur deux'
             : f === 'monthly' ? 'Mensuelle' : (f || '—');
      }
      function statutLbl(s) {
        return s === 'pending' ? 'En attente ⏳'
             : s === 'approved' ? 'Approuvée'
             : s === 'rejected' ? 'Refusée' : (s || '—');
      }
      function creneauLbl(r) {
        return (r.heure_debut ? String(r.heure_debut).slice(0, 5) : '—') + '–'
             + (r.heure_fin ? String(r.heure_fin).slice(0, 5) : '—');
      }
      function joursLbl(jours) {
        return (jours || []).map(function (j) { return JOURS_LBL[j]; }).join(' ');
      }

      // ------------------------------------------------------------------
      // Projection fenêtrée des règles récurrentes (jumeau exact de
      // logistique-agenda.html ; sémantique IDENTIQUE au getOccurrences du
      // guichet). Cycle de vie (sql_151, FAIT FOI b59b44d9) : la colonne
      // date_debut EXISTE désormais (l'inversion pt 149 est résolue) —
      // borne basse (NULL = pas de borne) ; biweekly ancré sur la semaine
      // calendaire de date_debut (repli parité vs 1er janvier si NULL) ;
      // monthly = 1re occurrence du mois >= date_debut (mois en ENTIER).
      // ------------------------------------------------------------------
      // Lundi de la semaine calendaire d'une date — ancre biweekly (A2).
      function mondayOf(dt) {
        var d = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
        var dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
        d.setDate(d.getDate() - dow);
        return d;
      }

      function occurrencesFenetre(rule, debutISO, finISO) {
        var out = [];
        var jours = rule.jours || [];
        var exclues = rule.dates_exclues || []; // sql_155 (E6)
        if (!jours.length || !rule.date_fin) return out;
        var lo = debutISO;
        var hi = (rule.date_fin < finISO) ? rule.date_fin : finISO;
        if (lo > hi) return out;
        // Cycle de vie (sql_151) : borne basse date_debut, NULL = pas de borne.
        var depuis = rule.date_debut ? new Date(rule.date_debut + 'T00:00:00') : null;
        var cur = new Date(parseInt(lo.slice(0, 4), 10), parseInt(lo.slice(5, 7), 10) - 1, 1);
        var last = new Date(parseInt(hi.slice(0, 4), 10), parseInt(hi.slice(5, 7), 10) - 1, 1);
        while (cur <= last) {
          var yr = cur.getFullYear(), mo = cur.getMonth();
          var dim = new Date(yr, mo + 1, 0).getDate();
          var monthlyDone = false;
          for (var d = 1; d <= dim; d++) {
            var dt = new Date(yr, mo, d);
            var iso = isoOf(dt);
            if (iso > rule.date_fin) continue;
            var dow = dt.getDay() === 0 ? 6 : dt.getDay() - 1;
            if (jours.indexOf(dow) === -1) continue;
            // A3 : AUCUNE occurrence avant date_debut (en amont du
            // marqueur monthly : la 1re projetée = la 1re >= date_debut).
            if (depuis && iso < rule.date_debut) continue;
            if (rule.freq === 'biweekly') {
              var wk;
              if (depuis) {
                // A2 : semaine 0 = semaine calendaire de date_debut,
                // puis 1/2. Math.round absorbe les décalages DST.
                wk = Math.round((mondayOf(dt) - mondayOf(depuis)) / 604800000);
              } else {
                // Repli sans borne : parité vs 1er janvier (historique).
                wk = Math.floor((dt - new Date(yr, 0, 1)) / 604800000);
              }
              if (wk % 2 !== 0) continue;
            }
            if (rule.freq === 'monthly') {
              if (monthlyDone) continue;
              monthlyDone = true;
            }
            // E6 (sql_155) : saut de la date exclue APRÈS la pose du
            // marqueur monthly (occurrence consommée, jamais reportée).
            if (exclues.indexOf(iso) !== -1) continue;
            if (iso >= debutISO && iso <= finISO) out.push(iso);
          }
          cur.setMonth(cur.getMonth() + 1);
        }
        return out;
      }

      // ------------------------------------------------------------------
      // Repères fériés/vacances (AGENDA-VACANCES-FERIES, FAIT FOI 07/07/2026)
      // JSON statique de saison, chargé UNE fois au boot. FAIL-SOFT intégral :
      // fichier absent/invalide -> repères simplement absents, agenda intact.
      // Mécanique JUMELLE de logistique-agenda.html.
      // ------------------------------------------------------------------
      var reperesData = { feries: [], vacances: [] };

      async function chargerReperes() {
        try {
          var r = await fetch('data/vacances-feries-2026-2027.json');
          if (!r.ok) return;
          var d = await r.json();
          if (d && Array.isArray(d.feries) && Array.isArray(d.vacances)) reperesData = d;
        } catch (e) {
          console.warn('Repères vacances/fériés indisponibles', e);
        }
      }

      // Itère chaque jour ISO de [debISO, finISO] (fins INCLUSIVES, anti-UTC).
      function chaqueJourISO(debISO, finISO, cb) {
        var p = debISO.split('-'), q = finISO.split('-');
        var d = new Date(+p[0], +p[1] - 1, +p[2]);
        var fin = new Date(+q[0], +q[1] - 1, +q[2]);
        while (d <= fin) {
          cb(isoOf(d));
          d.setDate(d.getDate() + 1);
        }
      }

      // Items untimed de repère bornés à la fenêtre. etat 'repere' : hors
      // pending|approved, donc AUCUNE action de modale (approbation/édition)
      // ne s'active dessus — informatif pur.
      function reperesFenetre(debutISO, finISO) {
        var out = [];
        (reperesData.feries || []).forEach(function (f) {
          if (!f || !f.date || f.date < debutISO || f.date > finISO) return;
          out.push({
            id: 'fer-' + f.date, date: f.date, heure: null, duree_min: null,
            type: 'ferie', libelle: 'Férié — ' + (f.libelle || ''),
            etat: 'repere', meta: { src: 'repere', repere: f }
          });
        });
        (reperesData.vacances || []).forEach(function (v, idx) {
          if (!v || !v.debut || !v.fin) return;
          var deb = v.debut > debutISO ? v.debut : debutISO;
          var fin = v.fin < finISO ? v.fin : finISO;
          if (deb > fin) return;
          chaqueJourISO(deb, fin, function (iso) {
            out.push({
              id: 'vac-' + idx + '-' + iso, date: iso, heure: null, duree_min: null,
              type: 'vacances', libelle: v.libelle || 'Vacances',
              etat: 'repere', meta: { src: 'repere', repere: v }
            });
          });
        });
        return out;
      }

      // ------------------------------------------------------------------
      // fetchWindow — tri-source, IDENTIQUE à la consultation (les pending
      // sont projetés, règles pending incluses AVANT approbation).
      // ------------------------------------------------------------------
      async function fetchWindow(debutISO, finISO) {
        var items = [];

        var p = await SupabaseHub.client
          .from('reservations_logistiques').select('*')
          .gte('date', debutISO).lte('date', finISO)
          .in('statut', ['pending', 'approved']);
        if (p.error) throw p.error;
        (p.data || []).forEach(function (r) {
          items.push({
            id: 'p-' + r.id,
            date: r.date,
            heure: r.heure_debut ? String(r.heure_debut).slice(0, 5) : null,
            duree_min: dureeEntre(r.heure_debut, r.heure_fin),
            type: typeCodeOf(r.ressource_id),
            libelle: (r.motif || ressLbl(r.ressource_id)) + ' · ' + catsLbl(r),
            etat: r.statut,
            meta: { src: 'ponctuelle', row: r }
          });
        });

        var q = await SupabaseHub.client
          .from('reservations_recurrentes').select('*')
          .in('statut', ['pending', 'approved'])
          .eq('active', true)
          .gte('date_fin', debutISO);
        if (q.error) throw q.error;
        (q.data || []).forEach(function (rule) {
          occurrencesFenetre(rule, debutISO, finISO).forEach(function (iso) {
            items.push({
              id: 'r-' + rule.id + '-' + iso,
              date: iso,
              heure: rule.heure_debut ? String(rule.heure_debut).slice(0, 5) : null,
              duree_min: dureeEntre(rule.heure_debut, rule.heure_fin),
              type: typeCodeOf(rule.ressource_id),
              libelle: '↻ ' + (rule.motif || ressLbl(rule.ressource_id)) + ' · ' + catsLbl(rule),
              etat: rule.statut,
              meta: { src: 'recurrence', row: rule }
            });
          });
        });

        var b = await SupabaseHub.client
          .from('demandes_bus').select('*')
          .gte('date', debutISO).lte('date', finISO)
          .in('statut', ['pending', 'approved']);
        if (b.error) throw b.error;
        (b.data || []).forEach(function (d) {
          items.push({
            id: 'b-' + d.id,
            date: d.date,
            heure: null,
            duree_min: null,
            type: 'bus',
            libelle: 'Bus · ' + (d.destination || '—') + ' · ' + catsLbl(d),
            etat: d.statut,
            meta: { src: 'bus', row: d }
          });
        });

        // 4) Repères fériés/vacances (informatifs, fail-soft)
        reperesFenetre(debutISO, finISO).forEach(function (it) { items.push(it); });

        return items;
      }

      function detailTitre(it) {
        if (it.meta.src === 'repere') return it.libelle;
        if (it.meta.src === 'bus') return 'Bus · ' + (it.meta.row.destination || '—');
        return ressLbl(it.meta.row.ressource_id);
      }
      function detailRows(it) {
        if (it.meta.src === 'repere') {
          var rp = it.meta.repere || {};
          var rrows = [{ lbl: 'Nature', val: it.type === 'ferie' ? 'Jour férié (Alsace-Moselle)' : 'Vacances scolaires (zone B — académie de Strasbourg)' }];
          if (rp.debut && rp.fin) rrows.push({ lbl: 'Période', val: rp.debut + ' → ' + rp.fin });
          else rrows.push({ lbl: 'Date', val: it.date });
          rrows.push({ lbl: 'Info', val: 'Repère informatif — les réservations restent possibles.' });
          return rrows;
        }
        var r = it.meta.row;
        var rows = [];
        if (it.meta.src === 'bus') {
          rows.push({ lbl: 'Destination', val: r.destination || '—' });
          rows.push({ lbl: 'Date', val: it.date });
          if (r.heure_arrivee_souhaitee) rows.push({ lbl: 'Arrivée souhaitée', val: String(r.heure_arrivee_souhaitee).slice(0, 5) });
          rows.push({ lbl: 'Catégories', val: catsLbl(r) });
          if (respsLbl(r)) rows.push({ lbl: 'Responsables', val: respsLbl(r) });
          if (r.total_bus != null) rows.push({ lbl: 'Passagers', val: String(r.total_bus) });
          rows.push({ lbl: 'Statut', val: statutLbl(r.statut) });
          return rows;
        }
        rows.push({ lbl: 'Ressource', val: ressLbl(r.ressource_id) });
        rows.push({ lbl: 'Date', val: it.date });
        rows.push({
          lbl: 'Créneau',
          val: creneauLbl(r) + (it.duree_min ? ' · ' + HubAgenda.dureeLabel(it.duree_min) : '')
        });
        rows.push({ lbl: 'Catégories', val: catsLbl(r) });
        if (respsLbl(r)) rows.push({ lbl: 'Responsables', val: respsLbl(r) });
        if (r.motif) rows.push({ lbl: 'Motif', val: r.motif });
        if (it.meta.src === 'recurrence') {
          rows.push({
            lbl: 'Règle',
            val: freqLbl(r.freq) + ' · ' + joursLbl(r.jours) + ' · jusqu\'au ' + (r.date_fin || '—')
          });
        }
        rows.push({ lbl: 'Statut', val: statutLbl(r.statut) });
        return rows;
      }

      // ------------------------------------------------------------------
      // Décisions (Approuver/Refuser) — un seul aiguillage par source
      // ------------------------------------------------------------------
      async function decider(src, id, decision, motif) {
        if (src === 'ponctuelle') return SupabaseHub.validerReservation(id, decision, motif);
        if (src === 'recurrence') return SupabaseHub.validerRecurrence(id, decision, motif);
        if (src === 'bus')        return SupabaseHub.validerBus(id, decision, motif);
        return { ok: false, error: 'source inconnue' };
      }

      // ------------------------------------------------------------------
      // File tri-source (gauche)
      // ------------------------------------------------------------------
      function carteFile(src, tag, tagClass, titre, meta, motif, id) {
        var card = document.createElement('div');
        card.className = 'lgv-card';
        card.innerHTML =
          '<div class="lgv-card__top">' +
            '<span class="lgv-tag' + (tagClass ? ' ' + tagClass : '') + '">' + escapeHtml(tag) + '</span>' +
            '<span class="lgv-card__res">' + escapeHtml(titre) + '</span>' +
          '</div>' +
          '<div class="lgv-card__meta">' + escapeHtml(meta) + '</div>' +
          (motif ? '<div class="lgv-card__motif">' + escapeHtml(motif) + '</div>' : '');
        var actions = document.createElement('div');
        actions.className = 'lgv-card__actions';
        var ok = document.createElement('button');
        ok.type = 'button'; ok.className = 'lgv-btn-ok'; ok.textContent = 'Approuver';
        ok.addEventListener('click', async function () {
          ok.disabled = true;
          var res = await decider(src, id, 'approved', null);
          if (res.ok) { showToast('Demande approuvée', true); await refreshTout(); }
          else { showToast('Échec : ' + (res.error || ''), false); ok.disabled = false; }
        });
        var no = document.createElement('button');
        no.type = 'button'; no.className = 'lgv-btn-no'; no.textContent = 'Refuser';
        no.addEventListener('click', async function () {
          var motifRefus = window.prompt('Motif du refus (facultatif) :') || null;
          no.disabled = true;
          var res = await decider(src, id, 'rejected', motifRefus);
          if (res.ok) { showToast('Demande refusée', true); await refreshTout(); }
          else { showToast('Échec : ' + (res.error || ''), false); no.disabled = false; }
        });
        var ed = document.createElement('button');
        ed.type = 'button'; ed.className = 'lgv-btn-toggle'; ed.textContent = 'Modifier';
        ed.addEventListener('click', function () { ouvrirEdition(src, id); });
        actions.appendChild(ok); actions.appendChild(no); actions.appendChild(ed);
        card.appendChild(actions);
        return card;
      }

      async function refreshFile() {
        var host = el('lgv-file');
        if (!host) return;

        var pp = await SupabaseHub.client
          .from('reservations_logistiques').select('*')
          .eq('statut', 'pending')
          .order('date', { ascending: true }).order('heure_debut', { ascending: true });
        var pr = await SupabaseHub.client
          .from('reservations_recurrentes').select('*')
          .eq('statut', 'pending')
          .order('created_at', { ascending: true });
        var pb = await SupabaseHub.listDemandesBus({ statut: 'pending' });

        var ponct = (pp.error ? [] : (pp.data || []));
        var recur = (pr.error ? [] : (pr.data || []));
        var bus = pb || [];
        var total = ponct.length + recur.length + bus.length;

        var badge = el('lgv-badge');
        if (badge) badge.textContent = total ? String(total) : '';

        host.innerHTML = '';
        if (total === 0) {
          host.innerHTML = '<div class="lgv-empty">Aucune demande en attente.</div>';
          return;
        }
        ponct.forEach(function (r) {
          host.appendChild(carteFile(
            'ponctuelle', 'Ponctuelle', '',
            ressLbl(r.ressource_id),
            formatDateLong(r.date) + ' · ' + creneauLbl(r) + ' · ' + catsLbl(r),
            r.motif, r.id));
        });
        recur.forEach(function (r) {
          host.appendChild(carteFile(
            'recurrence', 'Récurrente', 'lgv-tag--recur',
            ressLbl(r.ressource_id),
            freqLbl(r.freq) + ' · ' + joursLbl(r.jours) + ' · ' + creneauLbl(r) +
              ' · jusqu\'au ' + formatDateLong(r.date_fin) + ' · ' + catsLbl(r),
            r.motif, r.id));
        });
        bus.forEach(function (d) {
          host.appendChild(carteFile(
            'bus', 'Bus', 'lgv-tag--bus',
            d.destination || '—',
            formatDateLong(d.date) + ' · ' + (d.total_bus || 0) + ' pax · ' + catsLbl(d),
            d.notes, d.id));
        });
      }

      // ------------------------------------------------------------------
      // Règles récurrentes — Suspendre/Réactiver (déménagé du guichet §5.5)
      // ------------------------------------------------------------------
      async function refreshRegles() {
        var host = el('lgv-regles');
        if (!host) return;
        var all = await SupabaseHub.listRecurrences({});
        host.innerHTML = '';
        if (!all || all.length === 0) {
          host.innerHTML = '<div class="lgv-empty">Aucune règle récurrente.</div>';
          return;
        }
        all.forEach(function (r) {
          var card = document.createElement('div');
          card.className = 'lgv-card' + (r.active ? '' : ' is-suspended');
          card.innerHTML =
            '<div class="lgv-card__top">' +
              '<span class="lgv-tag lgv-tag--recur">' + escapeHtml(statutLbl(r.statut)) + '</span>' +
              '<span class="lgv-card__res">' + escapeHtml(ressLbl(r.ressource_id)) + '</span>' +
            '</div>' +
            '<div class="lgv-card__meta">' +
              escapeHtml(freqLbl(r.freq) + ' · ' + joursLbl(r.jours) + ' · ' + creneauLbl(r) +
                ' · jusqu\'au ' + formatDateLong(r.date_fin)) +
            '</div>' +
            (r.motif ? '<div class="lgv-card__motif">' + escapeHtml(r.motif) + '</div>' : '');
          var actions = document.createElement('div');
          actions.className = 'lgv-card__actions';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'lgv-btn-toggle';
          btn.textContent = r.active ? 'Suspendre' : 'Réactiver';
          btn.addEventListener('click', async function () {
            btn.disabled = true;
            var res = await SupabaseHub.setRecurrenceActive(r.id, !r.active);
            if (res.ok) { showToast('Règle mise à jour', true); await refreshTout(); }
            else { showToast('Échec : ' + (res.error || ''), false); btn.disabled = false; }
          });
          var edt = document.createElement('button');
          edt.type = 'button';
          edt.className = 'lgv-btn-toggle';
          edt.textContent = 'Modifier';
          edt.addEventListener('click', function () {
            ouvrirEdition('recurrence', r.id);
          });
          actions.appendChild(btn);
          actions.appendChild(edt);
          card.appendChild(actions);
          host.appendChild(card);
        });
      }

      // ------------------------------------------------------------------
      // Édition & annulation (cycle de vie B1-B7, FAIT FOI b59b44d9).
      // La ligne est RECHARGÉE INTÉGRALEMENT avant ouverture (patron
      // pt 141) et TOUS les champs sont ré-émis (B7 — UPDATE dur côté
      // SQL). Toute modification repasse la demande en 'pending' (B2).
      // « Annuler la demande » (B5) vit ICI, dans la surface d'édition :
      // un seul emplacement, qui couvre pending ET approved, et évite la
      // confusion Refuser (décision bureau) / Annuler (retrait).
      // Le bus s'édite sur SON formulaire : bus.html?edit=<id> (B4).
      // ------------------------------------------------------------------
      var editCtx = null;   // { src, row } — ligne rechargée avant ouverture
      var editJours = [];
      var editCats = [];    // MULTI (M5/T4) : uuid[] catégories, ordre de coche

      function peuplerSelectsEdition() {
        var sr = el('lgv-edit-ressource');
        if (sr) {
          sr.innerHTML = '';
          Object.keys(ressById).forEach(function (id) {
            var o = document.createElement('option');
            o.value = id; o.textContent = ressById[id].libelle || id;
            sr.appendChild(o);
          });
        }
        var sc = el('lgv-edit-categorie');
        if (sc) {
          // MULTI (M5) : le peuplement est délégué à renderEditCats(),
          // appelé à chaque ouverture (les coches dépendent de la ligne).
          sc.innerHTML = '';
        }
      }

      // MULTI (M5/T4) : cases catégories de la modale — toutes les
      // catégories du référentiel (surface bureau|admin), ordre de coche
      // = ordre du tableau, aucune coche = Bureau / Autre (M3).
      function renderEditCats() {
        var host = el('lgv-edit-categorie');
        if (!host) return;
        host.innerHTML = '';
        Object.keys(catById).forEach(function (id) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'lgv-edit-day' + (editCats.indexOf(id) !== -1 ? ' is-on' : '');
          b.textContent = catById[id];
          b.addEventListener('click', function () {
            var pos = editCats.indexOf(id);
            if (pos === -1) { editCats.push(id); b.classList.add('is-on'); }
            else { editCats.splice(pos, 1); b.classList.remove('is-on'); }
          });
          host.appendChild(b);
        });
      }

      function renderEditJours() {
        var host = el('lgv-edit-jours');
        if (!host) return;
        host.innerHTML = '';
        JOURS_LBL.forEach(function (lbl, idx) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'lgv-edit-day' + (editJours.indexOf(idx) !== -1 ? ' is-on' : '');
          b.textContent = lbl;
          b.addEventListener('click', function () {
            var pos = editJours.indexOf(idx);
            if (pos === -1) { editJours.push(idx); b.classList.add('is-on'); }
            else { editJours.splice(pos, 1); b.classList.remove('is-on'); }
          });
          host.appendChild(b);
        });
      }

      // ------------------------------------------------------------------
      // Occurrences exclues (sql_155, E4/E5) — RPC dédiées : la règle ne
      // repasse PAS en pending (E3, dérogation tracée à B2). La RPC
      // renvoie la ligne à jour → editCtx.row rafraîchi sans re-fetch
      // (esprit B7) ; les agendas sont rafraîchis en direct.
      // ------------------------------------------------------------------
      function renderEditExclues() {
        var host = el('lgv-edit-exclues');
        if (!host) return;
        host.innerHTML = '';
        var dates = ((editCtx && editCtx.row && editCtx.row.dates_exclues) || [])
          .slice().sort();
        if (dates.length === 0) {
          host.innerHTML = '<span class="lgv-edit-exclues-vide">Aucune date exclue.</span>';
          return;
        }
        dates.forEach(function (d) {
          var chip = document.createElement('span');
          chip.className = 'lgv-edit-exclue';
          chip.title = formatDateLong(d);
          chip.appendChild(document.createTextNode(formatDateLong(d)));
          var x = document.createElement('button');
          x.type = 'button';
          x.textContent = '\u2715';
          x.title = 'Réinclure cette date';
          x.addEventListener('click', function () { reinclureDate(d); });
          chip.appendChild(x);
          host.appendChild(chip);
        });
      }

      async function exclureDate() {
        if (!editCtx || editCtx.src !== 'recurrence') return;
        var inp = el('lgv-edit-exclure-date');
        var d = inp ? inp.value : '';
        if (!d) { showToast('Choisis une date à exclure', false); return; }
        var btn = el('lgv-edit-exclure-btn');
        if (btn) btn.disabled = true;
        var res = await SupabaseHub.exclureOccurrence(editCtx.row.id, d);
        if (btn) btn.disabled = false;
        if (!res.ok) { showToast('Échec : ' + (res.error || ''), false); return; }
        if (res.data) editCtx.row = res.data;
        if (inp) inp.value = '';
        renderEditExclues();
        showToast('Occurrence exclue — le créneau redevient libre', true);
        await refreshTout();
      }

      async function reinclureDate(d) {
        if (!editCtx || editCtx.src !== 'recurrence') return;
        var res = await SupabaseHub.reinclureOccurrence(editCtx.row.id, d);
        if (!res.ok) { showToast('Échec : ' + (res.error || ''), false); return; }
        if (res.data) editCtx.row = res.data;
        renderEditExclues();
        showToast('Occurrence réincluse', true);
        await refreshTout();
      }

      async function rechargerLigne(src, id) {
        var table = (src === 'recurrence')
          ? 'reservations_recurrentes' : 'reservations_logistiques';
        var q = await SupabaseHub.client
          .from(table).select('*').eq('id', id).single();
        return q.error ? null : q.data;
      }

      async function ouvrirEdition(src, id) {
        if (src === 'bus') {
          window.location.href = 'bus.html?edit=' + encodeURIComponent(id);
          return;
        }
        var row = await rechargerLigne(src, id);
        if (!row) { showToast('Impossible de recharger la demande.', false); return; }
        if (row.statut === 'cancelled') {
          showToast('Demande annulée : non modifiable (re-créer).', false); return;
        }
        editCtx = { src: src, row: row };
        var isRecur = (src === 'recurrence');
        el('lgv-edit-titre').textContent = isRecur
          ? 'Modifier la règle récurrente' : 'Modifier la réservation';
        el('lgv-edit-ressource').value = row.ressource_id || '';
        // MULTI : coches depuis categorie_ids, fallback scalaire (lignes
        // d'avant chantier), ordre du tableau conservé (T4).
        editCats = (Array.isArray(row.categorie_ids) && row.categorie_ids.length)
          ? row.categorie_ids.slice()
          : (row.categorie_id ? [row.categorie_id] : []);
        renderEditCats();
        el('lgv-edit-hdebut').value = row.heure_debut ? String(row.heure_debut).slice(0, 5) : '';
        el('lgv-edit-hfin').value = row.heure_fin ? String(row.heure_fin).slice(0, 5) : '';
        el('lgv-edit-motif').value = row.motif || '';
        el('lgv-edit-f-date').style.display = isRecur ? 'none' : '';
        el('lgv-edit-recur').style.display = isRecur ? '' : 'none';
        if (isRecur) {
          el('lgv-edit-freq').value = row.freq || 'weekly';
          editJours = (row.jours || []).slice();
          renderEditJours();
          el('lgv-edit-debut').value = row.date_debut || '';
          el('lgv-edit-fin').value = row.date_fin || '';
          renderEditExclues();
          var exd = el('lgv-edit-exclure-date');
          if (exd) {
            exd.value = '';
            exd.min = row.date_debut || '';
            exd.max = row.date_fin || '';
          }
        } else {
          el('lgv-edit-date').value = row.date || '';
        }
        el('lgv-edit-overlay').classList.add('is-open');
      }

      function fermerEdition() {
        editCtx = null;
        el('lgv-edit-overlay').classList.remove('is-open');
      }

      async function enregistrerEdition() {
        if (!editCtx) return;
        var btn = el('lgv-edit-enregistrer');
        var hd = el('lgv-edit-hdebut').value || null;
        var hf = el('lgv-edit-hfin').value || null;
        if (!hd || !hf) { showToast('Renseigne le créneau', false); return; }
        var res;
        if (btn) btn.disabled = true;
        if (editCtx.src === 'recurrence') {
          if (editJours.length === 0) {
            showToast('Choisis au moins un jour', false);
            if (btn) btn.disabled = false; return;
          }
          if (!el('lgv-edit-fin').value) {
            showToast('Renseigne une date de fin', false);
            if (btn) btn.disabled = false; return;
          }
          res = await SupabaseHub.modifierRecurrence(editCtx.row.id, {
            ressource_id: el('lgv-edit-ressource').value,
            categorie_id: editCats[0] || null,
            categorie_ids: editCats.slice(),
            freq: el('lgv-edit-freq').value || 'weekly',
            jours: editJours.slice(),
            heure_debut: hd,
            heure_fin: hf,
            date_debut: el('lgv-edit-debut').value || null,
            date_fin: el('lgv-edit-fin').value,
            motif: el('lgv-edit-motif').value || null
          });
        } else {
          if (!el('lgv-edit-date').value) {
            showToast('Renseigne une date', false);
            if (btn) btn.disabled = false; return;
          }
          res = await SupabaseHub.modifierReservation(editCtx.row.id, {
            ressource_id: el('lgv-edit-ressource').value,
            categorie_id: editCats[0] || null,
            categorie_ids: editCats.slice(),
            date: el('lgv-edit-date').value,
            heure_debut: hd,
            heure_fin: hf,
            motif: el('lgv-edit-motif').value || null
          });
        }
        if (btn) btn.disabled = false;
        if (!res.ok) { showToast('Échec : ' + (res.error || ''), false); return; }
        showToast('Demande modifiée — repassée en attente de validation', true);
        fermerEdition();
        await refreshTout();
      }

      async function annulerDemande() {
        if (!editCtx) return;
        if (!window.confirm('Annuler définitivement cette demande ? Elle disparaîtra des agendas (trace conservée).')) return;
        var btn = el('lgv-edit-annuler-demande');
        if (btn) btn.disabled = true;
        var res = (editCtx.src === 'recurrence')
          ? await SupabaseHub.annulerRecurrence(editCtx.row.id)
          : await SupabaseHub.annulerReservation(editCtx.row.id);
        if (btn) btn.disabled = false;
        if (!res.ok) { showToast('Échec : ' + (res.error || ''), false); return; }
        showToast('Demande annulée', true);
        fermerEdition();
        await refreshTout();
      }

      (function wireEdition() {
        var f = el('lgv-edit-fermer');
        if (f) f.addEventListener('click', fermerEdition);
        var s = el('lgv-edit-enregistrer');
        if (s) s.addEventListener('click', enregistrerEdition);
        var a = el('lgv-edit-annuler-demande');
        if (a) a.addEventListener('click', annulerDemande);
        var ex = el('lgv-edit-exclure-btn');
        if (ex) ex.addEventListener('click', exclureDate);
        var ov = el('lgv-edit-overlay');
        if (ov) ov.addEventListener('click', function (e) {
          if (e.target === ov) fermerEdition();
        });
      })();

      // ------------------------------------------------------------------
      // Boot
      // ------------------------------------------------------------------
      try {
        await chargerReferentiels();
        peuplerSelectsEdition();
      } catch (e) {
        console.error('Validation logistique : référentiels', e);
        showToast('Impossible de charger les ressources.', false);
      }

      await chargerReperes(); // fail-soft interne : ne jette jamais

      var ORDRE_LEGENDE = [
        { code: 'site-mom-brenckle',   repli: 'Stade Brencklé' },
        { code: 'site-mom-holtzplatz', repli: 'Stade Holtzplatz' },
        { code: 'site-mom-clubhouse',  repli: 'Clubhouse' },
        { code: 'minibus-1',           repli: 'Minibus 1' },
        { code: 'minibus-2',           repli: 'Minibus 2' },
        { code: 'veo',                 repli: 'Caméra Veo' }
      ];
      var libByCode = {};
      Object.keys(ressById).forEach(function (id) {
        libByCode[ressById[id].code] = ressById[id].libelle;
      });
      var types = ORDRE_LEGENDE.map(function (t) {
        return { code: t.code, lib: libByCode[t.code] || t.repli };
      });
      types.push({ code: 'bus', lib: 'Bus (affrété)' });
      types.push({ code: 'ferie', lib: 'Férié' });
      types.push({ code: 'vacances', lib: 'Vacances scolaires' });

      var agenda = HubAgenda.create(el('agRoot'), {
        titre: 'Agenda d\'arbitrage — toutes les ressources',
        libelleVide: 'Aucune réservation cette semaine.',
        fetchWindow: fetchWindow,
        types: types,
        detail: {
          titre: detailTitre,
          rows: detailRows,
          // Arbitrage EN CONTEXTE (2A) : un item pending s'approuve depuis
          // sa modale de détail ; le refus (motif) passe par la file.
          // Cycle de vie (B3) : un item approved se MODIFIE depuis sa
          // modale — une seule action par modale, contrat module respecté
          // (l'action est déterminée PAR ITEM, module intact).
          action: function (it) {
            if (it.etat === 'pending') {
              return {
                label: 'Approuver',
                onClick: async function (item, closeDetail) {
                  var id = item.meta.row.id;
                  var res = await decider(item.meta.src, id, 'approved', null);
                  if (res.ok) {
                    closeDetail();
                    showToast('Demande approuvée', true);
                    await refreshTout();
                  } else {
                    showToast('Échec : ' + (res.error || ''), false);
                  }
                }
              };
            }
            if (it.etat === 'approved') {
              return {
                label: 'Modifier',
                onClick: async function (item, closeDetail) {
                  closeDetail();
                  await ouvrirEdition(item.meta.src, item.meta.row.id);
                }
              };
            }
            return null;
          }
        },
        capacites: { pleinEcran: true, caseAnnulees: false },
        estAnnulee: function () { return false; },
        etatMark: function (it) { return it.etat === 'pending' ? '⏳' : ''; },
        onError: function (e) {
          console.error('Validation logistique : agenda', e);
          showToast('Agenda : ' + (e && e.message ? e.message : 'erreur de chargement'), false);
        }
      });

      async function refreshTout() {
        await refreshFile();
        await refreshRegles();
        await agenda.refresh();
      }

      await refreshFile();
      await refreshRegles();
      await agenda.init();

      console.log('%c🏉 Validation logistique chargée', 'color:#2D7D46;font-weight:bold;',
        { ressources: Object.keys(ressById).length });
    })();
  </script>
<script src="js/pwa.js"></script>
</body>
