<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1f5c3d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <title>Mes compositions · MOM Hub</title>
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <meta name="description" content="Mes évènements avec compositions — MOM Hub." />

  <link rel="stylesheet" href="css/hub.css">

  <style>
    body.auth-pending { visibility: hidden; }

    .mc-layout { max-width: 1000px; margin: 0 auto; padding: 28px 22px 60px; }

    .mc-head { margin-bottom: 22px; }
    .mc-title {
      font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 500;
      color: var(--ink); letter-spacing: 0.3px; margin: 0 0 4px;
    }
    .mc-subtitle {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.12em; color: var(--ink-mute); text-transform: uppercase;
    }

    .mc-list { display: flex; flex-direction: column; gap: 10px; }

    /* pt 62 — .mc-row est désormais un CONTENEUR (zone compo + bouton
       pilotage). La zone cliquable « ouvrir la compo » porte .mc-row__open ;
       le bouton « Pilotage » porte .mc-row__pilot. */
    .mc-row {
      display: flex; align-items: stretch; gap: 0;
      background: #fff; border: 1px solid var(--line); border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .mc-row:hover { border-color: var(--vert-prairie); }
    .mc-row__open {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 16px;
      padding: 16px 20px; cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .mc-row__pilot {
      flex: 0 0 auto; display: flex; align-items: center; gap: 4px;
      padding: 0 18px; cursor: pointer;
      text-decoration: none; white-space: nowrap;
      font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--vert-prairie); background: var(--vert-light);
      border-left: 1px solid var(--line);
      transition: background 0.15s, color 0.15s;
    }
    .mc-row__pilot:hover { background: var(--vert-prairie); color: #fff; }
    .mc-row__type {
      font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--vert-prairie); background: var(--vert-light);
      padding: 4px 10px; border-radius: 4px; white-space: nowrap;
    }
    .mc-row__main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .mc-row__label {
      display: block;
      font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 500;
      color: var(--ink); letter-spacing: 0.2px;
    }
    .mc-row__meta {
      display: block;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.1em; color: var(--ink-mute); text-transform: uppercase;
    }
    .mc-row__state {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 4px; white-space: nowrap;
      background: var(--paper-warm); color: var(--ink-soft); border: 1px solid var(--line);
    }
    .mc-row__state.state-brouillon { color: var(--ink-mute); }
    .mc-row__state.state-validee   { color: var(--vert-prairie); border-color: var(--vert-prairie); }
    .mc-row__state.state-utilisee  { color: var(--bleu-base);    border-color: var(--bleu-base); }
    .mc-row__state.state-archivee  { color: var(--ink-mute); opacity: 0.6; }
    .mc-row__chev { color: var(--ink-mute); font-size: 16px; }

    .mc-empty, .mc-loading {
      text-align: center; padding: 48px 20px;
      color: var(--ink-mute); font-size: 15px;
    }
    .mc-empty__hint {
      font-size: 13px; color: var(--ink-mute); margin-top: 8px;
    }

    @media (max-width: 640px) {
      .mc-row { flex-wrap: wrap; }
      .mc-row__open { flex-basis: 100%; flex-wrap: wrap; gap: 8px 12px; }
      .mc-row__main { flex-basis: 100%; order: 3; }
      .mc-row__pilot {
        flex-basis: 100%; justify-content: center;
        border-left: none; border-top: 1px solid var(--line); padding: 12px 18px;
      }
    }
  </style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill">SAISON …</div>

    <!-- Navigation thématique « Mon équipe » : porteur VIDE, contenu injecté
         par le module partagé js/hub-nav.js (thème « equipe » ; la table des
         thèmes est l'unique source de vérité — GENERALISATION-NAV-THEMATIQUE,
         FAIT FOI gelé 07/07/2026, calé pt 160). La page décide de l'EMPLACEMENT,
         le module du CONTENU. mes-compos = DESTINATION « Compositions » (lien
         propre, marqué courant ici ; à distinguer de l'éditeur compositions.html
         qui porte le même thème en mode silencieux). Remplace la main-nav
         statique (Tableau de bord · Compositions(active) · Annuaire(mort) ·
         Configuration(mort)), retraits tracés. -->
    <nav class="main-nav hub-nav" data-hub-nav="equipe"></nav>

    <div class="icon-row">
      <button class="icon-btn" title="Recherche" aria-label="Recherche">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn has-notif" title="Notifications" aria-label="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </button>
    </div>

    <div class="user-profile">
      <!-- PROFIL-TOPBAR-ROLE-STATIQUE (soldée par PORTAIL-MULTI-PERIMETRE
           Lot 3, 03/07/2026) : identité EN DUR neutralisée — le helper
           central _remplirProfilTopbar() (supabase-client v1.54→v1.58)
           remplit prénom, fonction et initiales pour tout connecté ; la
           carte est masquée en auth-anon/auth-user (hub.css). -->
      <div class="avatar">·</div>
      <div class="user-info">
        <div class="user-name">…</div>
        <div class="user-role">…</div>
      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </a>
      <button type="button" class="user-action" id="btn-signout" title="Se déconnecter" aria-label="Se déconnecter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <script src="js/hub-nav.js"></script>

  <main class="mc-layout">
    <div class="mc-head">
      <h2 class="mc-title">Mes compositions</h2>
      <p class="mc-subtitle">Les évènements pour lesquels une feuille existe</p>
    </div>

    <div id="mc-list" class="mc-list">
      <div class="mc-loading">Chargement…</div>
    </div>

    <!-- ACCES-COMPO-LEGACY-DEEPLINK (juil. 2026, demande Manu) : section
         additive listant les compos LEGACY (evenement_equipe_id NULL),
         invisibles ci-dessus. Alimentée par listCompositionsByCategorie
         (wrapper déjà en prod), ouvre via compositions.html?compo=<id>
         (nouveau deep-link, cf. compositions-editor.js). La liste N3
         ci-dessus n'est pas touchée. -->
    <div class="mc-head" style="margin-top:36px;">
      <h2 class="mc-title">Compositions (mode classique)</h2>
      <p class="mc-subtitle">Matchs sans engagement multi-équipes</p>
    </div>
    <div id="mc-list-legacy" class="mc-list">
      <div class="mc-loading">Chargement…</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/ux-selecteur-categorie.js"></script>

  <script>
    (async function () {
      'use strict';

      const session = await SupabaseHub.getSession();
      if (!session) { window.location.replace('login.html'); return; }
      const roles = await SupabaseHub.getMyRoles();
      // [renommage porte pt 94 — alignement sur compositions.html] Garde
      // élargie : admin|bureau|encadrant. Le rôle 'coach' n'est plus utilisé ;
      // la porte voie 2 'referent' a été renommée 'encadrant'. (mes-compos.html
      // oublié à l'audit grep pt 94 — garde restée admin|coach.)
      const isAdminOrCoach = roles.indexOf('admin') !== -1 || roles.indexOf('bureau') !== -1 || roles.indexOf('encadrant') !== -1;
      // EMPTY-STATES-REFUS (doctrine pt 194 « tout visible, tout verrouillé ») :
      // la vignette « compos » du menu pointe ICI (mes-compos.html). La garde
      // éjectait vers l'accueil (replace('./')) → l'usager vivait un « ne s'ouvre
      // pas ». On révèle la page et on affiche un refus lisible dans le <main>
      // (canon DONNÉES). return avant l'init ; la RLS reste la vraie barrière.
      if (!isAdminOrCoach) {
        document.body.classList.remove('auth-pending');
        document.body.classList.add('auth-resolved');
        var _main = document.querySelector('main');
        if (_main) {
          _main.innerHTML = '<div class="access-denied" style="max-width:640px;margin:48px auto;padding:24px 28px;'
            + 'background:#fff;border:1px solid #e3e0d4;border-radius:14px;line-height:1.5;">'
            + '<h2 style="margin:0 0 8px;color:#1f4d2e;">Accès réservé</h2>'
            + '<p style="margin:0;color:#4a4a44;">Ces informations sont réservées aux encadrants d\'une catégorie.</p></div>';
        }
        return;
      }

      document.body.classList.remove('auth-pending');
      document.body.classList.add('auth-resolved');
      if (roles.indexOf('admin') !== -1) document.body.classList.add('auth-admin');

      const signoutBtn = document.getElementById('btn-signout');
      if (signoutBtn) {
        signoutBtn.addEventListener('click', async function () {
          signoutBtn.disabled = true;
          await SupabaseHub.signOut();
        });
      }
      SupabaseHub.onAuthChange(function (event) {
        if (event === 'SIGNED_OUT') window.location.replace('login.html');
      });

      const MOIS = ['janvier','février','mars','avril','mai','juin','juillet',
                    'août','septembre','octobre','novembre','décembre'];
      const JOURS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
      function formatDateLong(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return JOURS[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()] + ' ' + d.getFullYear();
      }
      function libelleType(t) {
        switch (t) {
          case 'entrainement': return 'Entraînement';
          case 'stage':        return 'Stage';
          case 'competition':  return 'Compétition';
          default:             return t || '—';
        }
      }
      function libelleEtat(e) {
        switch (e) {
          case 'brouillon': return 'Brouillon';
          case 'validee':   return 'Validée';
          case 'utilisee':  return 'Utilisée';
          case 'archivee':  return 'Archivée';
          default:          return e || '';
        }
      }
      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      const host = document.getElementById('mc-list');
      const hostLegacy = document.getElementById('mc-list-legacy');
      let legacyRows = [];

      /** ACCES-COMPO-LEGACY-DEEPLINK — charge les compos LEGACY de la
       *  catégorie active via listCompositionsByCategorie (déjà en prod,
       *  v3.68). Filtre : evenement_equipe_id absent (sinon doublon avec
       *  la liste N3 ci-dessus). PAS de filtre sur type_compo : en mode
       *  legacy chaque match a sa propre compo type_compo='match' (pas de
       *  "base" séparée comme en N3) — vérifié en base (13 compos réelles
       *  M14, toutes type_compo='match'). Un filtre 'base' seul les
       *  excluait quasi toutes (bug signalé par Manu, capture 2e recette).
       *  Repli honnête : erreur/vide → []. */
      async function chargerLegacyRows(catId) {
        if (!catId) { legacyRows = []; return; }
        try {
          const brut = await SupabaseHub.listCompositionsByCategorie(catId, { onlyActive: true });
          legacyRows = (brut || []).filter(function (c) {
            return c && !c.evenement_equipe_id && c.evenements;
          });
        } catch (e) {
          console.warn('MOM Hub: mes-compos legacy chargement', e);
          legacyRows = [];
        }
      }

      function rendreLignesLegacy() {
        if (perimetreEstVide) { hostLegacy.innerHTML = ''; return; }
        if (legacyRows.length === 0) {
          hostLegacy.innerHTML =
            '<div class="mc-empty">' +
              'Aucune composition classique pour le moment.' +
            '</div>';
          return;
        }
        hostLegacy.innerHTML = '';
        legacyRows.forEach(function (c) {
          const evt = c.evenements;
          const meta = formatDateLong(evt.date_debut);

          const row = document.createElement('div');
          row.className = 'mc-row';

          const main = document.createElement('a');
          main.className = 'mc-row__open';
          main.href = 'compositions.html?compo=' + encodeURIComponent(c.id);
          main.innerHTML =
            '<span class="mc-row__type">' + escapeHtml(libelleType(evt.type_evenement)) + '</span>' +
            '<span class="mc-row__main">' +
              '<span class="mc-row__label">' + escapeHtml(evt.libelle || 'Évènement') + '</span>' +
              '<span class="mc-row__meta">' + escapeHtml(meta) + '</span>' +
            '</span>' +
            '<span class="mc-row__state state-' + escapeHtml(c.etat || '') + '">' + escapeHtml(libelleEtat(c.etat)) + '</span>' +
            '<span class="mc-row__chev" aria-hidden="true">›</span>';
          row.appendChild(main);

          if (c.id) {
            const pilot = document.createElement('a');
            pilot.className = 'mc-row__pilot';
            pilot.href = 'pilotage.html?compo_base=' + encodeURIComponent(c.id);
            pilot.title = 'Statistiques de saison (pilotage d\'équipe)';
            pilot.innerHTML = '📊 Pilotage';
            row.appendChild(pilot);
          }

          hostLegacy.appendChild(row);
        });
      }

      let rows = [];
      try {
        rows = await SupabaseHub.listMesEvenementsAvecCompos(100);
      } catch (err) {
        console.error('MOM Hub: mes-compos chargement', err);
        rows = [];
      }

      const usable = (rows || []).filter(function (r) {
        return r && r.evenement && r.evenement_equipe_id;
      });

      // Catégorie active courante (null = toutes). Filtre client : on ne
      // recharge pas la liste au changement, on la re-rend filtrée.
      let categorieActiveId = null;
      // PERSONA-NON-STAFF (régression pt 194) : distingue « null car
      // transverse (admin/bureau, voir tout) » de « null car AUCUNE
      // catégorie rattachée (membre ordinaire, ex : Jules) ». Dans ce
      // dernier cas, on ne montre RIEN (le SELECT RLS large exposait sinon
      // toutes les compos du club — durcissement RLS tracé en dette).
      let perimetreEstVide = false;

      function lignesFiltrees() {
        if (perimetreEstVide) return []; // membre sans catégorie → aucune compo
        if (!categorieActiveId) return usable; // transverse / non résolu → tout
        return usable.filter(function (r) {
          return r && r.equipe && r.equipe.categorie_id === categorieActiveId;
        });
      }

      function rendreLignes() {
        const liste = lignesFiltrees();
        if (perimetreEstVide) {
          host.innerHTML =
            '<div class="mc-empty">' +
              'Ces informations sont réservées aux encadrants d\'une catégorie.' +
            '</div>';
          return;
        }
        if (usable.length === 0) {
          host.innerHTML =
            '<div class="mc-empty">' +
              'Aucune composition pour le moment.' +
              '<div class="mc-empty__hint">Crée une feuille depuis la fiche d\'un évènement.</div>' +
            '</div>';
          return;
        }
        if (liste.length === 0) {
          host.innerHTML =
            '<div class="mc-empty">' +
              'Aucune composition pour cette catégorie.' +
              '<div class="mc-empty__hint">Change de catégorie ou crée une feuille depuis la fiche d\'un évènement.</div>' +
            '</div>';
          return;
        }
        host.innerHTML = '';
        liste.forEach(function (r) {
          const evt = r.evenement;
          const equipe = r.equipe && r.equipe.libelle ? r.equipe.libelle : '';
          const meta = formatDateLong(evt.date_debut) + (equipe ? '  ·  ' + equipe : '');

          // pt 62 (câblage accès) — la rangée porte DEUX accès :
          //   (1) zone principale → ouvre la feuille (compositions.html, inchangé) ;
          //   (2) bouton « Pilotage » → pilotage.html?compo_base=<compo_id>.
          const row = document.createElement('div');
          row.className = 'mc-row';

          const main = document.createElement('a');
          main.className = 'mc-row__open';
          main.href = 'compositions.html?evenement_equipe=' + encodeURIComponent(r.evenement_equipe_id);
          main.innerHTML =
            '<span class="mc-row__type">' + escapeHtml(libelleType(evt.type_evenement)) + '</span>' +
            '<span class="mc-row__main">' +
              '<span class="mc-row__label">' + escapeHtml(evt.libelle || 'Évènement') + '</span>' +
              '<span class="mc-row__meta">' + escapeHtml(meta) + '</span>' +
            '</span>' +
            '<span class="mc-row__state state-' + escapeHtml(r.etat || '') + '">' + escapeHtml(libelleEtat(r.etat)) + '</span>' +
            '<span class="mc-row__chev" aria-hidden="true">›</span>';
          row.appendChild(main);

          if (r.compo_id) {
            const pilot = document.createElement('a');
            pilot.className = 'mc-row__pilot';
            pilot.href = 'pilotage.html?compo_base=' + encodeURIComponent(r.compo_id);
            pilot.title = 'Statistiques de saison (pilotage d\'équipe)';
            pilot.innerHTML = '📊 Pilotage';
            row.appendChild(pilot);
          }

          host.appendChild(row);
        });
      }

      // Sélecteur de catégorie (filtre la liste). Monté via le helper
      // partagé si dispo : périmètre + mémorisation cohérents avec les
      // autres écrans. onChange = re-filtrage client (pas de rechargement).
      try {
        if (typeof UXSelecteurCategorie !== 'undefined'
            && typeof UXSelecteurCategorie.resoudre === 'function') {
          const ctx = await UXSelecteurCategorie.resoudre();
          if (ctx && ctx.perimetre) {
            categorieActiveId = ctx.active || null;
            // PERSONA-NON-STAFF : périmètre explicitement vide (non
            // transverse, aucune catégorie) → on ne montrera rien.
            perimetreEstVide = (ctx.perimetre.vide === true)
              || (ctx.perimetre.transverse !== true
                  && Array.isArray(ctx.perimetre.categories)
                  && ctx.perimetre.categories.length === 0);
            UXSelecteurCategorie.monter({
              perimetre: ctx.perimetre,
              ancreSelector: '.mc-head',
              wrapId: 'mc-cat-selecteur-wrap',
              selectId: 'mc-cat-selecteur',
              onChange: async function (nouvelleCatId) {
                categorieActiveId = nouvelleCatId || null;
                rendreLignes();
                if (!perimetreEstVide) await chargerLegacyRows(categorieActiveId);
                rendreLignesLegacy();
              }
            });
          }
        }
      } catch (e) {
        console.warn('MOM Hub: mes-compos sélecteur catégorie indisponible', e);
      }

      rendreLignes();
      if (!perimetreEstVide) await chargerLegacyRows(categorieActiveId);
      rendreLignesLegacy();

      console.log(
        '%c🏉 Mes compositions chargé',
        'color: #2D7D46; font-weight: bold;',
        { lignes: usable.length, categorie_active: categorieActiveId }
      );
    })();
  </script>
<script src="js/season-pill.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
