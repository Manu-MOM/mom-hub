<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <title>Pilotage de saison · MOM Hub</title>
  <link rel="stylesheet" href="css/hub.css">
  <style>
    :root {
      --vert: #2D7D46; --vert-fonce: #1f5a32; --gris: #5b6470;
      --gris-clair: #eef1f4; --bord: #d8dee5; --attente: #8a93a0;
      --fond: #f7f9fb; --carte: #ffffff;
    }
    * { box-sizing: border-box; }
    /* body géré par hub.css (fond papier + texture + topbar). On ne
       redéfinit que la couleur de texte du contenu pilotage. */
    body { color: #1c232b; }
    .ss-wrap { max-width: 920px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .ss-pilot-head { border-bottom: 3px solid var(--vert); padding-bottom: .75rem; margin-bottom: 1.25rem; }
    .ss-pilot-head h1 { margin: 0; font-size: 1.9rem; color: var(--vert-fonce); }
    .ss-sub { margin: .25rem 0 0; color: var(--gris); font-size: .95rem; }
    .ss-bloc {
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 1.25rem;
    }
    .ss-bloc h2 { margin: 0 0 .75rem; font-size: 1.1rem; color: var(--vert-fonce); }
    .ss-attente { color: var(--attente); font-style: italic; margin: .5rem 0 0; }
    .ss-note { color: var(--gris); font-size: .85rem; margin: .6rem 0 0; }
    .ss-load { color: var(--gris); }
    .ss-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: .6rem; }
    .ss-kpi { background: var(--gris-clair); border-radius: 8px; padding: .6rem .7rem; text-align: center; }
    .ss-kpi__v { display: block; font-size: 1.3rem; font-weight: 700; color: var(--vert-fonce); }
    .ss-kpi__l { display: block; font-size: .75rem; color: var(--gris); text-transform: uppercase; letter-spacing: .03em; margin-top: .15rem; }
    /* Bloc Niveau équipe (pt 65) */
    .ss-eq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .ss-eq-carte { border: 1px solid var(--bord); border-radius: 10px; padding: 1rem; background: var(--carte); }
    .ss-eq-carte h3 { margin: 0 0 .75rem; font-size: 1rem; color: var(--vert-fonce); }
    .ss-eq-carte .ss-kpis { grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: .5rem; }
    .ss-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    .ss-table th, .ss-table td { text-align: left; padding: .5rem .55rem; border-bottom: 1px solid var(--bord); vertical-align: top; }
    .ss-table th { color: var(--gris); font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .02em; }
    .ss-table tbody tr:hover { background: var(--gris-clair); }
    .ss-num { text-align: right; }
    .ss-table th.ss-num { text-align: right; }
    /* Ventilation par équipe (pt 63) */
    .ss-cat-eq { padding: .15rem 0; }
    .ss-cat-eq + .ss-cat-eq { border-top: 1px dashed var(--bord); margin-top: .35rem; padding-top: .35rem; }
    .ss-cat-eq__nom { font-weight: 600; color: var(--vert-fonce); }
    .ss-cat-eq__m { color: var(--gris); font-size: .85rem; }
    .ss-cat-eq__r { color: var(--gris); font-size: .85rem; }
    .ss-cat-eq__p { color: #1c232b; font-size: .85rem; margin-top: .1rem; }
    .ss-cat-dep { color: var(--vert); cursor: help; }
    /* Sélecteur transverse (pt 64) */
    .ss-pilot-selecteur {
      margin-bottom: 1.25rem; padding: .75rem 1rem;
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
    }
    .ss-pilot-selecteur label { color: var(--gris); font-size: .9rem; font-weight: 600; }
    .ss-pilot-selecteur select {
      font-size: .95rem; padding: .35rem .6rem; border: 1px solid var(--bord);
      border-radius: 6px; background: #fff; color: #1c232b; min-width: 160px;
    }
    footer { max-width: 920px; margin: 2rem auto 0; color: var(--attente); font-size: .8rem; text-align: center; }
    /* E3 (pt 160) : CSS .hub-back-row / .hub-back-btn retiré — le bouton corps
       « Retour au portail » qu'il stylait a été supprimé (redondant avec le
       tronc « Accueil » de la barre thématique). Plus aucun consommateur. */
  </style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill" id="season-pill">SAISON …</div>

    <!-- Navigation thématique « Mon équipe » : porteur VIDE, contenu injecté
         par le module partagé js/hub-nav.js (thème « equipe » ; la table des
         thèmes est l'unique source de vérité — GENERALISATION-NAV-THEMATIQUE,
         FAIT FOI gelé 07/07/2026, calé pt 160). La page décide de l'EMPLACEMENT,
         le module du CONTENU. pilotage-categorie = DESTINATION « Statistiques »
         (lien propre, marqué courant ici). Remplace la main-nav hors-thème
         (Accueil · Évènements · Joueurs · Planification), retraits tracés. -->
    <nav class="main-nav hub-nav" data-hub-nav="equipe"></nav>

    <div class="icon-row">
      <button class="icon-btn" title="Recherche" aria-label="Recherche">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>

    <div class="user-profile">
      <div class="avatar">MOM</div>
      <div class="user-info">
        <div class="user-name">Éducateur MOM</div>
        <div class="user-role">Espace éducateurs</div>
      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </a>
      <button type="button" class="user-action" id="btn-signout" title="Se déconnecter" aria-label="Se déconnecter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <script src="js/hub-nav.js"></script>

  <!-- E3 (pt 160) : bouton corps « Retour au portail » (.hub-back-row) retiré
       — redondant avec le tronc « Accueil » de la barre thématique. -->

  <div class="ss-wrap">
    <main id="ss-pilotage"><p class="ss-load">Initialisation…</p></main>
  </div>
  <footer>MOM Hub · pilotage de saison — Mutzig Ovalie Molsheim</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
<script src="js/season-pill.js"></script>
  <script>
    /* Boot topbar — SANS garde admin (page accessible aux référents).
       Résout la session si présente, marque auth-resolved, câble la
       déconnexion et la season-pill. auth-admin n'est ajouté que pour un
       admin (hub.css masque alors les fonctions admin-only aux autres). */
    (async function () {
      'use strict';
      try {
        if (window.SupabaseHub && SupabaseHub.getMyRoles) {
          var roles = await SupabaseHub.getMyRoles();
          document.body.classList.add('auth-resolved');
          if (Array.isArray(roles) && roles.indexOf('admin') !== -1) {
            document.body.classList.add('auth-admin');
          }
        } else {
          document.body.classList.add('auth-resolved');
        }
      } catch (_) { document.body.classList.add('auth-resolved'); }

      var _so = document.getElementById('btn-signout');
      if (_so && window.SupabaseHub && SupabaseHub.signOut) {
        _so.addEventListener('click', async function () {
          _so.disabled = true;
          await SupabaseHub.signOut();
        });
      }
      try {
        var _s = await SupabaseHub.getSaisonActive();
        if (_s && _s.libelle) {
          var _p = document.getElementById('season-pill');
          if (_p) _p.textContent = String(_s.libelle).toUpperCase();
        }
      } catch (_) { /* libellé statique conservé */ }
    })();
  </script>
  <script src="js/stats-saison.js"></script>
  <script>
    (function () {
      'use strict';
      var mount = document.getElementById('ss-pilotage');

      if (!window.StatsSaison || !window.SupabaseHub) {
        mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2><p>Module stats-saison indisponible.</p></section>';
        return;
      }

      var M14_ID = '312ebb88-25e8-40c5-8a37-9dd2e3927e2e';

      // pt 63/64 + multi-cat — La catégorie pilotée vient du socle
      // resoudrePerimetreCategories() (v1.59+), qui gère :
      //   - encadrant mono-catégorie → pilotage DIRECT, pas de sélecteur ;
      //   - encadrant MULTI-catégories (N>1) → SÉLECTEUR intégré,
      //     pré-réglé sur la catégorie active mémorisée (cohérence
      //     inter-écrans) — angle mort rows[0] levé ;
      //   - compte transverse (admin/bureau) → SÉLECTEUR de toutes
      //     les catégories actives, pré-réglé sur active ;
      //   - aucun droit → message « indéterminé ».
      // Override ?categorie=<uuid> = court-circuit (debug / lien direct).
      var params = new URLSearchParams(window.location.search);
      var override = params.get('categorie');

      function escapeHtmlLocal(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function messageIndetermine() {
        mount.innerHTML = '<section class="ss-bloc"><h2>Accès réservé</h2>' +
          '<p>Ces informations sont réservées aux encadrants d\'une catégorie.</p></section>';
      }

      // Rendu transverse : barre de sélection + zone de pilotage rafraîchie au choix.
      function rendreAvecSelecteur(categories, catParDefaut) {
        var options = categories.map(function (c) {
          var sel = (c.id === catParDefaut) ? ' selected' : '';
          var lib = c.libelle_court || c.code || c.id;
          return '<option value="' + escapeHtmlLocal(c.id) + '"' + sel + '>' +
                 escapeHtmlLocal(lib) + '</option>';
        }).join('');

        mount.innerHTML =
          '<div class="ss-pilot-selecteur">' +
            '<label for="ss-cat-select">Catégorie pilotée :</label> ' +
            '<select id="ss-cat-select">' + options + '</select>' +
          '</div>' +
          '<div id="ss-pilot-zone"><p class="ss-load">Chargement…</p></div>';

        var zone = document.getElementById('ss-pilot-zone');
        var sel = document.getElementById('ss-cat-select');

        function peindre(catId) {
          zone.innerHTML = '<p class="ss-load">Chargement du pilotage de saison…</p>';
          StatsSaison.renderPilotageCategorie(catId, zone);
        }
        sel.addEventListener('change', function () {
          // Mémorise le choix → cohérence inter-écrans (clé partagée
          // mom_hub.categorie_active via le socle).
          if (typeof SupabaseHub !== 'undefined'
              && typeof SupabaseHub.memoriserCategorieActive === 'function') {
            SupabaseHub.memoriserCategorieActive(this.value);
          }
          peindre(this.value);
        });
        peindre(catParDefaut);
      }

      // Cas override : court-circuit direct.
      if (override) {
        StatsSaison.renderPilotageCategorie(override, mount);
        return;
      }

      // Résolution du périmètre via le socle (v1.59+) :
      // resoudrePerimetreCategories() dédoublonne, résout les libellés
      // et calcule la catégorie active mémorisée. Gère NATIVEMENT le
      // cas encadrant MULTI-catégories (N>1, est_transverse=false) —
      // que l'ancienne logique rows[0] ignorait (angle mort levé).
      //   - vide        → message indéterminé ;
      //   - 1 catégorie → pilotage direct, pas de sélecteur ;
      //   - > 1 cat ou transverse → sélecteur, pré-réglé sur active.
      // Repli honnête si le socle est absent/ancien : M14 direct.
      if (typeof SupabaseHub === 'undefined'
          || typeof SupabaseHub.resoudrePerimetreCategories !== 'function') {
        StatsSaison.renderPilotageCategorie(M14_ID, mount);
        return;
      }

      Promise.resolve(SupabaseHub.resoudrePerimetreCategories())
        .then(function (perimetre) {
          if (!perimetre || perimetre.vide
              || !Array.isArray(perimetre.categories)
              || perimetre.categories.length === 0) {
            messageIndetermine();
            return;
          }

          var cats = perimetre.categories;
          var active = perimetre.active || cats[0].id;

          // Mono-catégorie (encadrant d'une seule catégorie) :
          // pilotage direct, aucun sélecteur (UX inchangée).
          if (!perimetre.transverse && cats.length === 1) {
            StatsSaison.renderPilotageCategorie(cats[0].id, mount);
            return;
          }

          // Multi-catégories (encadrant N>1) OU transverse
          // (admin/bureau, toutes catégories) : sélecteur intégré,
          // pré-réglé sur la catégorie active mémorisée.
          rendreAvecSelecteur(cats, active);
        })
        .catch(function (e) {
          if (typeof console !== 'undefined') console.error('pilotage-categorie boot', e);
          // Repli honnête : M14 direct plutôt qu'un écran muet.
          StatsSaison.renderPilotageCategorie(M14_ID, mount);
        });
    })();
  </script>
</body>
</html>
