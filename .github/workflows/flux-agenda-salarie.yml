# ============================================================
# MOM Hub — Flux agenda salarié (SORTANT)
# ============================================================
# SYNC-AGENDA-SORTANTE, livrable 3/3. Conforme au FAIT FOI
# « Conception-Sync-Agenda-Sortante-v1.md » (figé le 02/07/2026,
# gate amont pt 137). Plateforme licences FFR : OVAL-E (avec A).
#
# RÔLE (D1/D2) : une fois par jour (+ déclenchement manuel pour
# la recette), génère data/lohann.ics via la RPC
# flux_seances_salarie (sql_144) et le script
# .github/scripts/generer-flux-ics.mjs, puis committe le fichier
# UNIQUEMENT si son contenu a changé (zéro bruit de commits —
# le déterminisme DTSTAMP=updated_at du script le garantit).
# GitHub Pages sert ensuite le fichier à l'URL stable :
#   https://manu-mom.github.io/mom-hub/data/lohann.ics
# à laquelle l'agenda Google de Lohann est abonné.
#
# WORKFLOW DÉDIÉ : keep-alive-supabase.yml N'EST PAS modifié.
# Cron à 04h30 UTC (T5) : distinct du keep-alive (03h00 UTC) —
# et il compte d'ailleurs comme activité Supabase supplémentaire.
#
# SECRETS REQUIS (Settings > Secrets and variables > Actions) :
#   SUPABASE_URL, SUPABASE_ANON_KEY : déjà en place (keep-alive).
#   SALARIE_ID : À AJOUTER — personne_id du salarié (Lohann).
#     (Un UUID n'est pas un secret sensible : le ranger là est
#     un choix de simplicité, même écran que les deux autres.)
#
# PERMISSION : le job pousse un commit → « contents: write »
# ci-dessous. Si le push échoue en 403, vérifier
# Settings > Actions > General > Workflow permissions =
# « Read and write permissions ».
#
# Échec de N'IMPORTE QUELLE étape (autotest, secrets, HTTP,
# génération) → run rouge, RIEN n'est commité : le flux publié
# reste sur sa dernière version saine.
#
# Auteur  : Manu (avec assistance Claude)
# Date    : 2026-07-02
# Version : 1.0
# ============================================================

name: Flux agenda salarié (sortant)

on:
  # Génération quotidienne à 04h30 UTC (T5 — distinct du keep-alive).
  # Google rafraîchit l'abonnement à sa propre cadence (qq heures à ~24 h) :
  # plus fréquent serait sans effet perceptible (FAIT FOI §7).
  schedule:
    - cron: '30 4 * * *'

  # Déclenchement manuel depuis l'onglet Actions (recette, rattrapage).
  workflow_dispatch:

# Jamais deux runs entrelacés (poussent sur la même branche).
concurrency:
  group: flux-agenda-salarie
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generer:
    name: Générer et publier data/lohann.ics
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Vérifier les secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SALARIE_ID: ${{ secrets.SALARIE_ID }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$SALARIE_ID" ]; then
            echo "❌ Secret manquant : SUPABASE_URL, SUPABASE_ANON_KEY et SALARIE_ID sont requis."
            echo "   Settings > Secrets and variables > Actions (SALARIE_ID = personne_id du salarié)."
            exit 1
          fi
          echo "✅ Secrets présents."

      - name: Autotest du générateur (pré-vol, zéro réseau)
        run: node .github/scripts/generer-flux-ics.mjs --autotest

      - name: Générer le flux .ics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SALARIE_ID: ${{ secrets.SALARIE_ID }}
          SORTIE_ICS: data/lohann.ics
        run: node .github/scripts/generer-flux-ics.mjs

      - name: Committer si (et seulement si) le contenu a changé
        run: |
          # `git status --porcelain` couvre les DEUX cas : fichier nouveau
          # (untracked) ET fichier modifié — `git diff` seul raterait le premier.
          if [ -z "$(git status --porcelain -- data/lohann.ics)" ]; then
            echo "✅ Aucun changement : pas de commit (déterminisme DTSTAMP vérifié de fait)."
            exit 0
          fi
          git config user.name  "MOM Hub — Flux agenda"
          git config user.email "actions@users.noreply.github.com"
          git add data/lohann.ics
          git commit -m "Flux agenda sortant : actualisation de data/lohann.ics (génération planifiée)"
          # Un commit humain a pu passer pendant le run : on rebase avant de pousser.
          git pull --rebase origin main
          git push origin main
          echo "✅ data/lohann.ics actualisé et poussé."
