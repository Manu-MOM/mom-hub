<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <title>Pilotage de saison · MOM Hub</title>
  <link rel="stylesheet" href="css/hub.css">
  <style>
    :root {
      --vert: #2D7D46; --vert-fonce: #1f5a32; --gris: #5b6470;
      --gris-clair: #eef1f4; --bord: #d8dee5; --attente: #8a93a0;
      --fond: #f7f9fb; --carte: #ffffff;
    }
    * { box-sizing: border-box; }
    /* body géré par hub.css (fond papier + texture + topbar). */
    body { color: #1c232b; }
    /* KIT-UX-RESPONSIVE-URGENT (suite, doctrine pt194 EMPTY-STATES-REFUS) :
       masque tout le body tant que la session n'est pas vérifiée, pour éviter
       un flash de contenu avant la redirection anonyme vers login.html.
       Pattern déjà utilisé sur ~24 autres pages (bibliotheque.html, etc.). */
    body.auth-pending { visibility: hidden; }
    .ss-wrap { max-width: 920px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
    .ss-pilot-head { border-bottom: 3px solid var(--vert); padding-bottom: .75rem; margin-bottom: 1.25rem; }
    .ss-pilot-head h1 { margin: 0; font-size: 1.9rem; color: var(--vert-fonce); }
    .ss-sub { margin: .25rem 0 0; color: var(--gris); font-size: .95rem; }
    .ss-bloc {
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 1.25rem;
    }
    .ss-bloc h2 { margin: 0 0 .75rem; font-size: 1.1rem; color: var(--vert-fonce); }
    .ss-attente { color: var(--attente); font-style: italic; margin: .5rem 0 0; }
    .ss-note { color: var(--gris); font-size: .85rem; margin: .6rem 0 0; }
    .ss-load { color: var(--gris); }
    .ss-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .6rem; }
    .ss-kpi { background: var(--gris-clair); border-radius: 8px; padding: .6rem .7rem; text-align: center; }
    .ss-kpi__v { display: block; font-size: 1.3rem; font-weight: 700; color: var(--vert-fonce); }
    .ss-kpi__l { display: block; font-size: .75rem; color: var(--gris); text-transform: uppercase; letter-spacing: .03em; margin-top: .15rem; }
    .ss-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    .ss-table th, .ss-table td { text-align: left; padding: .5rem .55rem; border-bottom: 1px solid var(--bord); }
    .ss-table th { color: var(--gris); font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .02em; }
    .ss-table tbody tr:hover { background: var(--gris-clair); }
    .ss-num { text-align: right; }
    .ss-table th.ss-num { text-align: right; }
    footer { max-width: 920px; margin: 2rem auto 0; color: var(--attente); font-size: .8rem; text-align: center; }
    /* E3 (pt 160) : CSS .hub-back-row / .hub-back-btn retiré — le bouton corps
       « Retour au portail » qu'il stylait a été supprimé (redondant avec le
       tronc « Accueil » de la barre thématique). Plus aucun consommateur. */
  </style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill" id="season-pill">SAISON …</div>

    <!-- Navigation thématique « Mon équipe » : porteur VIDE, contenu injecté
         par le module partagé js/hub-nav.js (thème « equipe » ; la table des
         thèmes est l'unique source de vérité — GENERALISATION-NAV-THEMATIQUE,
         FAIT FOI gelé 07/07/2026, calé pt 160). La page décide de l'EMPLACEMENT,
         le module du CONTENU.
         pilotage = PROFONDEUR (pilotage d'UNE compo, ?compo_base=&evenement=,
         ouvert par deep-link depuis mes-compos) → porteur SILENCIEUX
         (data-hub-nav-silent) : la barre complète du thème s'affiche pour
         naviguer/retourner, mais AUCUN lien n'est marqué courant (la page
         n'est pas une destination). Remplace la main-nav hors-thème (Accueil ·
         Évènements · Joueurs · Statistiques), retraits tracés. -->
    <nav class="main-nav hub-nav" data-hub-nav="equipe" data-hub-nav-silent></nav>

    <div class="icon-row">
      <button class="icon-btn" title="Recherche" aria-label="Recherche">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>

    <div class="user-profile">
      <div class="avatar">MOM</div>
      <div class="user-info">
        <div class="user-name">Éducateur MOM</div>
        <div class="user-role">Espace éducateurs</div>
      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      </a>
      <button type="button" class="user-action" id="btn-signout" title="Se déconnecter" aria-label="Se déconnecter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <script src="js/hub-nav.js"></script>

  <!-- E3 (pt 160) : bouton corps « Retour au portail » (.hub-back-row) retiré
       — redondant avec le tronc « Accueil » de la barre thématique. -->

  <div class="ss-wrap">
    <main id="ss-pilotage"><p class="ss-load">Initialisation…</p></main>
  </div>
  <footer>MOM Hub · pilotage M14 — Mutzig Ovalie Molsheim</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
<script src="js/season-pill.js"></script>
  <script>
    /* Boot topbar — SANS garde admin (page accessible aux référents). */
    (async function () {
      'use strict';
      // KIT-UX-RESPONSIVE-URGENT (suite) : anonyme → redirection login.html
      // au lieu du message "Accès réservé" affiché sur place (doctrine pt194
      // EMPTY-STATES-REFUS inchangée pour un connecté sans droit de catégorie,
      // qui garde le message inline plus bas — seule l'absence de session
      // change de traitement).
      if (window.SupabaseHub && SupabaseHub.getSession) {
        var _session = await SupabaseHub.getSession();
        if (!_session) { window.location.replace('login.html'); return; }
      }
      try {
        if (window.SupabaseHub && SupabaseHub.getMyRoles) {
          var roles = await SupabaseHub.getMyRoles();
          document.body.classList.add('auth-resolved');
          if (Array.isArray(roles) && roles.indexOf('admin') !== -1) {
            document.body.classList.add('auth-admin');
          }
        } else {
          document.body.classList.add('auth-resolved');
        }
      } catch (_) { document.body.classList.add('auth-resolved'); }
      document.body.classList.remove('auth-pending');

      var _so = document.getElementById('btn-signout');
      if (_so && window.SupabaseHub && SupabaseHub.signOut) {
        _so.addEventListener('click', async function () {
          _so.disabled = true;
          await SupabaseHub.signOut();
        });
      }
      try {
        var _s = await SupabaseHub.getSaisonActive();
        if (_s && _s.libelle) {
          var _p = document.getElementById('season-pill');
          if (_p) _p.textContent = String(_s.libelle).toUpperCase();
        }
      } catch (_) { /* libellé statique conservé */ }
    })();
  </script>
  <script src="js/stats-saison.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var baseId = params.get('compo_base');
      var evtEqId = params.get('evenement_equipe');
      var mount = document.getElementById('ss-pilotage');
      if (!window.StatsSaison) {
        mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2><p>Module stats-saison indisponible.</p></section>';
        return;
      }

      // Entrée directe (mes-compos) : ?compo_base=<id> → pilotage immédiat.
      if (baseId) {
        StatsSaison.renderPilotage(baseId, mount);
        return;
      }

      // Entrée depuis la fiche évènement (pt 65) : ?evenement_equipe=<id>.
      // pilotage.html n'attend qu'un compo_base → on résout l'evenement_equipe
      // vers SA compo de BASE (getCompoForEvenementEquipe renvoie un tableau ;
      // on prend la compo type_compo='base' active). Cohérent avec les autres
      // tuiles de la fiche qui passent toutes ?evenement_equipe=.
      if (evtEqId && window.SupabaseHub && typeof SupabaseHub.getCompoForEvenementEquipe === 'function') {
        mount.innerHTML = '<p class="ss-load">Chargement du pilotage…</p>';
        Promise.resolve(SupabaseHub.getCompoForEvenementEquipe(evtEqId))
          .then(function (res) {
            var arr = Array.isArray(res) ? res : (res && Array.isArray(res.data) ? res.data : []);
            var base = arr.filter(function (c) { return c && c.type_compo === 'base'; })[0] || arr[0] || null;
            if (base && base.id) {
              StatsSaison.renderPilotage(base.id, mount);
            } else {
              mount.innerHTML = '<section class="ss-bloc"><h2>Pilotage indisponible</h2>' +
                '<p>Aucune composition de base n\'a été trouvée pour cette équipe. ' +
                'Créez-la depuis les Compositions pour activer le pilotage.</p></section>';
            }
          })
          .catch(function (e) {
            if (typeof console !== 'undefined') console.error('pilotage boot (evenement_equipe)', e);
            mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2>' +
              '<p>Impossible de charger le pilotage de cette équipe.</p></section>';
          });
        return;
      }

      // Aucun paramètre exploitable : on tente quand même renderPilotage (qui
      // gère l'absence de baseId par sa propre dégradation honnête).
      StatsSaison.renderPilotage(baseId, mount);
    })();
  </script>
</body>
</html>
