<!--
  MOM Hub · Agenda salarié — surface DÉDIÉE (MISSIONS-AGENDA).
  Née du déplacement (voie 1) de la vue agenda hors de suivi-salarie.html :
  cette page est la SEULE surface de consultation calendaire des séances du
  salarié. suivi-salarie.html conserve toute la SAISIE (missions, séances,
  modales d'édition) mais n'affiche plus l'agenda (une destination = une surface,
  doctrine nav thématique).

  Garde : VOIE 3 — admin|bureau OU salarié relié (lecture seule). Un salarié
  relié consulte UNIQUEMENT son propre planning. Jeton nav/tuile = staff.

  LECTURE SEULE (FAIT FOI option a) : l'agenda affiche le planning et le détail
  au clic ; AUCUN bouton « Modifier ». Pour éditer une séance -> suivi-salarie.html.
  Le module HubAgenda ne rend pas de bouton quand detail.action est absent.

  Consomme, sans jamais les modifier, les modules INTERDIT :
    - css/hub-agenda.css + js/hub-agenda.js (AGENDA-HUB-PATRON, pt 147)
    - js/hub-nav.js (nav thématique, INTERDIT depuis v1.6 pt 163)
  La palette .t-* (10 types + divers) est FOURNIE PAR CETTE PAGE (FAIT FOI G3),
  copiée à l'identique de suivi-salarie.html.

  RPC : agenda_seances_salarie(p_salarie_id, p_date_debut, p_date_fin) — pt 145,
  déjà exposée. ZÉRO SQL pour cette page.
  Helpers SupabaseHub : client, getSession, getMyRoles, getSaisonActive,
  quiSuisJe, signOut.
-->
<link rel="stylesheet" href="css/hub.css">
<!-- CSS structurel du patron agenda (INTERDIT, consommé). La palette .t-* de la
     page reste dans le <style> ci-dessous (FAIT FOI G3). -->

<style>
  body.auth-pending { visibility: hidden; }
  .ma-wrap { max-width: 980px; margin: 0 auto; padding: 24px 24px 48px; }
  .ma-wrap h1 { font-size: 20px; margin: 0 0 4px; color: var(--ink, #0c3d24); }

  .ma-msg { margin: 0 0 16px; }

  .ma-flash.ok  { background: var(--feedback-success-bg, #e7f3ec); color: var(--feedback-success-fg, #1f5a32); }
  .ma-flash.err { background: var(--feedback-error-bg, #fdecea);   color: var(--feedback-error-fg, #8a1b14); }

  /* ----- Palette des types (FAIT FOI G3) — copie à l'identique de suivi-salarie.html.
     Convention du module : .ag-ev.t-X / .ag-chip.t-X / .ag-sw.t-X. ----- */
  .ag-ev.t-intervention_scolaire, .ag-chip.t-intervention_scolaire { background: #eaf1fa; color: #1f4a6b; border-left-color: #2f6fb0; }
  .ag-sw.t-intervention_scolaire { background: #2f6fb0; }
  .ag-ev.t-entrainement_section, .ag-chip.t-entrainement_section { background: #e7f3ec; color: #1f5a32; border-left-color: #2d7a3e; }
  .ag-sw.t-entrainement_section { background: #2d7a3e; }
  .ag-ev.t-entrainement_sr_m, .ag-chip.t-entrainement_sr_m { background: #e0f0f0; color: #125454; border-left-color: #1f8a8a; }
  .ag-sw.t-entrainement_sr_m { background: #1f8a8a; }
  .ag-ev.t-autre_entrainement_mom, .ag-chip.t-autre_entrainement_mom { background: #eef3df; color: #455f16; border-left-color: #6b8e23; }
  .ag-sw.t-autre_entrainement_mom { background: #6b8e23; }
  .ag-ev.t-reunion, .ag-chip.t-reunion { background: #efe8f8; color: #4a2d7a; border-left-color: #7a4fbf; }
  .ag-sw.t-reunion { background: #7a4fbf; }
  .ag-ev.t-suivi_competition, .ag-chip.t-suivi_competition { background: #fbf1dd; color: #83590c; border-left-color: #c08a1e; }
  .ag-sw.t-suivi_competition { background: #c08a1e; }
  .ag-ev.t-accompagnement_terrain, .ag-chip.t-accompagnement_terrain { background: #fbe7db; color: #8a4116; border-left-color: #cc6a2b; }
  .ag-sw.t-accompagnement_terrain { background: #cc6a2b; }
  .ag-ev.t-travail_personnel, .ag-chip.t-travail_personnel { background: #eaeef2; color: #333f4b; border-left-color: #556677; }
  .ag-sw.t-travail_personnel { background: #556677; }
  .ag-ev.t-stage, .ag-chip.t-stage { background: #f8e2ec; color: #7a2549; border-left-color: #b03a6e; }
  .ag-sw.t-stage { background: #b03a6e; }
  .ag-ev.t-divers, .ag-chip.t-divers { background: #eef0ef; color: #42504a; border-left-color: #6b7a74; }
  .ag-sw.t-divers { background: #6b7a74; }
  /* AGENDA-VACANCES-FERIES : repères informatifs (jours fériés + vacances scolaires),
     patron logistique. Rangée journée entière via untimedEnRangee (déjà actif). */
  .ag-ev.t-ferie, .ag-chip.t-ferie { background: #f6e9e9; color: #8a4a4a; border-left-color: #c98a8a; }
  .ag-sw.t-ferie { background: #c98a8a; }
  .ag-ev.t-vacances, .ag-chip.t-vacances { background: #f3f1ea; color: #7a746a; border-left-color: #c9c2b2; }
  .ag-sw.t-vacances { background: #c9c2b2; }
</style>
</head>
<body class="auth-pending">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo"><img src="assets/logo-m2m.png" alt="MOM Rugby"></div>
      <div class="brand-text">
        <h1>MOM Hub</h1>
        <p>Mutzig Ovalie Molsheim</p>
      </div>
    </div>

    <div class="season-pill" id="season-pill">SAISON</div>

    <nav class="main-nav hub-nav" data-hub-nav="salarie"></nav>

    <div class="icon-row">
      <button class="icon-btn" title="Recherche" aria-label="Recherche">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>

    <div class="user-profile">
      <div class="avatar">EJ</div>

      </div>
      <a href="./" class="user-action" title="Retour au portail" aria-label="Retour au portail">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>

      </button>
    </div>
  </header>

  <script src="js/hub-nav.js"></script>

  <div class="ma-wrap">
    <h1>Agenda salarié</h1>
    <p class="ma-sub">Planning des séances du salarié — toutes catégories de mission. Consultation seule ; l'édition d'une séance se fait depuis « Suivi salarié ».</p>

    <div class="ma-msg" id="maMsg"></div>

    <!-- Container du patron agenda : HubAgenda.create y génère la classe ag-root
         et tout le squelette (grille horaire, mini-mois, plein écran, légende,
         modale de détail, repli mobile). -->
    <section id="agRoot"></section>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/hub-agenda.js"></script>
<script src="js/season-pill.js"></script>
<script>
(async function () {
  'use strict';
  const client = SupabaseHub.client;
  const $ = function (id) { return document.getElementById(id); };

  // ---- Référentiel des types (ordre + libellés = suivi-salarie.html) ----
  const TYPES = [
    { code: 'intervention_scolaire',   lib: 'Intervention scolaire' },
    { code: 'entrainement_section',    lib: 'Entraînement section' },
    { code: 'entrainement_sr_m',       lib: 'Entraînement SR-M' },
    { code: 'autre_entrainement_mom',  lib: 'Autre entraînement MOM' },
    { code: 'reunion',                 lib: 'Réunion' },
    { code: 'suivi_competition',       lib: 'Suivi compétition' },
    { code: 'accompagnement_terrain',  lib: 'Accompagnement terrain' },
    { code: 'travail_personnel',       lib: 'Travail personnel' },
    { code: 'stage',                   lib: 'Stage' }
  ];
  const TYPE_DIVERS = { code: 'divers', lib: 'Divers' };
  const TYPE_BY_CODE = {};
  TYPES.concat([TYPE_DIVERS]).forEach(function (t) { TYPE_BY_CODE[t.code] = t; });

  const ETAT_LABEL = { prevue: 'Prévue', realisee: 'Réalisée', validee: 'Validée', annulee: 'Annulée' };
  const JOURS = ['lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.', 'dim.'];
  const MOIS = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];

  // ---- État ----
  let saisonActive = null;
  let monPersonneId = null;
  let salarieId = null;
  let agenda = null;

  // ---- Helpers ----
  async function rpc(name, params) {
    const { data, error } = await client.rpc(name, params);
    if (error) throw error;
    return data;
  }
  function errMsg(e) {
    if (!e) return 'erreur inconnue';
    return e.message || e.error_description || e.msg || String(e);
  }
  function flash(msg, kind) {
    const box = $('maMsg');
    if (!box) return;
    const div = document.createElement('div');
    div.className = 'ma-flash ' + (kind === 'err' ? 'err' : 'ok');
    div.textContent = msg;
    box.innerHTML = '';
    box.appendChild(div);
  }
  function parseDate(s) { const p = String(s).slice(0, 10).split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
  function agTypeLib(code) { const t = TYPE_BY_CODE[code]; return t ? t.lib : (code || '—'); }

  // ---- AGENDA-VACANCES-FERIES : repères informatifs (patron logistique) ----
  // Fériés Alsace-Moselle + vacances scolaires zone B, chargés depuis un JSON
  // statique de saison. Fail-soft : fichier absent/invalide -> repères absents,
  // agenda intact. Items etat 'repere' -> inertes (pas d'action, pas d'etatMark).
  let reperesData = { feries: [], vacances: [] };

  async function chargerReperes() {
    try {
      const r = await fetch('data/vacances-feries-2026-2027.json');
      if (!r.ok) return;
      const d = await r.json();
      if (d && Array.isArray(d.feries) && Array.isArray(d.vacances)) reperesData = d;
    } catch (e) {
      console.warn('Repères vacances/fériés indisponibles', e);
    }
  }

  // Itère chaque jour ISO de [debISO, finISO] (fins INCLUSIVES, anti-UTC).
  function chaqueJourISO(debISO, finISO, cb) {
    const d = parseDate(debISO);
    const fin = parseDate(finISO);
    while (d <= fin) {
      const iso = d.getFullYear() + '-'
        + String(d.getMonth() + 1).padStart(2, '0') + '-'
        + String(d.getDate()).padStart(2, '0');
      cb(iso);
      d.setDate(d.getDate() + 1);
    }
  }

  // Items untimed de repère bornés à la fenêtre. etat 'repere' : informatif pur.
  function reperesFenetre(debutISO, finISO) {
    const out = [];
    (reperesData.feries || []).forEach(function (f) {
      if (!f || !f.date || f.date < debutISO || f.date > finISO) return;
      out.push({
        id: 'fer-' + f.date, date: f.date, heure: null, duree_min: null,
        type: 'ferie', libelle: 'Férié — ' + (f.libelle || ''),
        etat: 'repere', meta: { src: 'repere', repere: f }
      });
    });
    (reperesData.vacances || []).forEach(function (v, idx) {
      if (!v || !v.debut || !v.fin) return;
      const deb = v.debut > debutISO ? v.debut : debutISO;
      const fin = v.fin < finISO ? v.fin : finISO;
      if (deb > fin) return;
      chaqueJourISO(deb, fin, function (iso) {
        out.push({
          id: 'vac-' + idx + '-' + iso, date: iso, heure: null, duree_min: null,
          type: 'vacances', libelle: v.libelle || 'Vacances',
          etat: 'repere', meta: { src: 'repere', repere: v }
        });
      });
    });
    return out;
  }

  // ---- Adaptateur agenda (copié de suivi-salarie.html, SANS le chemin d'édition) ----
  function agMapRow(o) {
    return {
      id: o.out_seance_id,
      date: String(o.out_date_seance).slice(0, 10),
      heure: o.out_heure_debut ? String(o.out_heure_debut).slice(0, 5) : null,
      duree_min: o.out_duree_min,
      type: o.out_type_mission,
      libelle: o.out_libelle || o.out_mission_libelle || null,
      etat: o.out_etat,
      meta: o
    };
  }
  function agDetailRows(it) {
    if (it.meta && it.meta.src === 'repere') {
      const rp = it.meta.repere || {};
      const rrows = [{ lbl: 'Nature', val: it.type === 'ferie' ? 'Jour férié (Alsace-Moselle)' : 'Vacances scolaires (zone B — académie de Strasbourg)' }];
      if (rp.debut && rp.fin) rrows.push({ lbl: 'Période', val: rp.debut + ' → ' + rp.fin });
      else rrows.push({ lbl: 'Date', val: it.date });
      rrows.push({ lbl: 'Info', val: 'Repère informatif.' });
      return rrows;
    }
    const o = it.meta;
    const d = parseDate(it.date);
    const when = JOURS[(d.getDay() + 6) % 7] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()]
      + (it.heure ? ' · ' + it.heure : '')
      + (it.duree_min != null ? ' · ' + HubAgenda.dureeLabel(it.duree_min) : '');
    return [
      { lbl: 'Type — mission', val: agTypeLib(it.type) + (o.out_mission_libelle ? ' — ' + o.out_mission_libelle : '') },
      { lbl: 'Date · horaire · durée', val: when },
      { lbl: 'Lieu', val: o.out_lieu || '—' },
      { lbl: 'État', val: ETAT_LABEL[it.etat] || it.etat }
    ];
  }
  // LECTURE SEULE (option a) : detail SANS action -> le module ne rend pas de
  // bouton « Modifier ». Aucun openEditSeance, aucune modale d'édition ici.
  function agCreate() {
    agenda = HubAgenda.create($('agRoot'), {
      titre: 'Agenda — toutes les séances',
      libelleVide: 'Aucune séance cette semaine.',
      fetchWindow: async function (debutISO, finISO) {
        const data = await rpc('agenda_seances_salarie', {
          p_salarie_id: salarieId,
          p_date_debut: debutISO,
          p_date_fin: finISO
        });
        return (data || []).map(agMapRow).concat(reperesFenetre(debutISO, finISO));
      },
      types: TYPES.concat([TYPE_DIVERS])
        .concat([{ code: 'ferie', lib: 'Férié' }, { code: 'vacances', lib: 'Vacances scolaires' }])
        .map(function (t) { return { code: t.code, lib: t.lib }; }),
      detail: { titre: function (it) { return it.libelle || agTypeLib(it.type); }, rows: agDetailRows },
      capacites: { pleinEcran: true, caseAnnulees: true },
      plageFixe: [8, 22],          // AGENDA-MODULE-V1.1 P2 : grille stable 08-22 (modèle unique)
      untimedEnRangee: true,       // AGENDA-MODULE-V1.1 R1 : séances sans heure en rangée journée entière
      estAnnulee: function (it) { return it.etat === 'annulee'; },
      etatMark: function (it) { return it.etat === 'validee' ? '✓✓' : (it.etat === 'realisee' ? '✓' : ''); },
      onError: function (e) { flash('Agenda : ' + errMsg(e), 'err'); }
    });
  }

  // ---- Garde d'accès : VOIE 3 — admin|bureau OU salarié relié + résolution du salarié ----
  // Patron suivi-salarie.html : admin|bureau voient le salarié v1 (cascade contrat ->
  // 1re mission -> monPersonneId). Un salarié relié (dont qui_suis_je() est un
  // missions.salarie_id) voit UNIQUEMENT SON propre planning (salarieId = monPersonneId).
  // Lecture seule dans tous les cas (agenda sans action). La nav MASQUE (jeton staff),
  // la garde PROTÈGE (cette fonction).
  async function resoudreAcces() {
    try { monPersonneId = await SupabaseHub.quiSuisJe(); } catch (e) { monPersonneId = null; }
    const roles = await SupabaseHub.getMyRoles();
    const peutEcrire = (roles.indexOf('admin') !== -1 || roles.indexOf('bureau') !== -1);

    if (peutEcrire) {
      let resolu = null;
      try {
        const contrats = (await rpc('list_contrats_salaries', { p_inclure_inactifs: false })) || [];
        if (contrats.length) resolu = contrats[0].personne_id || null;
      } catch (e) { resolu = null; }
      if (!resolu) {
        try {
          const all = (await rpc('list_missions', { p_saison_id: saisonActive.id, p_salarie_id: null, p_entite_id: null })) || [];
          resolu = all.length ? all[0].salarie_id : monPersonneId;
        } catch (e) { resolu = monPersonneId; }
      }
      salarieId = resolu;
      return true;
    }
    // Non-admin/bureau : autorisé SEULEMENT si compte relié dont qui_suis_je() est un
    // missions.salarie_id -> il voit son propre planning.
    if (!monPersonneId) return false;
    const mine = (await rpc('list_missions', { p_saison_id: saisonActive.id, p_salarie_id: monPersonneId, p_entite_id: null })) || [];
    if (mine.length) { salarieId = monPersonneId; return true; }
    return false;
  }

  // ---- Boot ----
  const so = $('btn-signout');
  if (so) so.addEventListener('click', async function () { try { await SupabaseHub.signOut(); } catch (e) {} window.location.replace('login.html'); });

  const session = await SupabaseHub.getSession();
  if (!session) { window.location.replace('login.html'); return; }

  saisonActive = await SupabaseHub.getSaisonActive();

  const ok = await resoudreAcces();

  document.body.classList.remove('auth-pending');

  if ($('season-pill') && saisonActive && saisonActive.libelle) {
    $('season-pill').textContent = String(saisonActive.libelle).toUpperCase();
  }

  // MISSIONS-AGENDA-REFUS (canon EMPTY-STATES-REFUS D1, pt 199, aligné sur
  // equipe-agenda.html) : avant, un compte sans accès agenda salarié était
  // éjecté vers l'accueil (garde dure, ressemblant à une panne) ; un
  // salarié non résolu affichait un flash ROUGE (« erreur »). Dans les deux
  // cas ce n'est pas une panne : la page s'ouvre proprement avec un refus
  // NEUTRE (ni err rouge, ni ok vert). RLS = la vraie barrière côté données.
  if (!ok) {
    const _box = $('maMsg');
    if (_box) {
      _box.innerHTML = '<div class="ma-flash" style="background:#f6f4ee;color:#4a4a44;">'
        + 'Cet agenda est réservé aux salariés concernés (ou aux profils admin/bureau).</div>';
    }
    return;
  }

  if (!salarieId) {
    const _box = $('maMsg');
    if (_box) {
      _box.innerHTML = '<div class="ma-flash" style="background:#f6f4ee;color:#4a4a44;">'
        + 'Aucun agenda salarié à afficher pour le moment.</div>';
    }
    return;
  }

  await chargerReperes(); // fail-soft interne : ne jette jamais
  agCreate();
  try { await agenda.init(); } catch (e) { flash('Agenda : ' + errMsg(e), 'err'); }
})();
</script>
</body>
</html>
