<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/logo-m2m.png">
  <title>Pilotage de saison · MOM Hub</title>
  <style>
    :root {
      --vert: #2D7D46; --vert-fonce: #1f5a32; --gris: #5b6470;
      --gris-clair: #eef1f4; --bord: #d8dee5; --attente: #8a93a0;
      --fond: #f7f9fb; --carte: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--fond); color: #1c232b;
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      line-height: 1.5; padding: 1.5rem 1rem 4rem;
    }
    .ss-wrap { max-width: 920px; margin: 0 auto; }
    .ss-pilot-head { border-bottom: 3px solid var(--vert); padding-bottom: .75rem; margin-bottom: 1.25rem; }
    .ss-pilot-head h1 { margin: 0; font-size: 1.9rem; color: var(--vert-fonce); }
    .ss-sub { margin: .25rem 0 0; color: var(--gris); font-size: .95rem; }
    .ss-bloc {
      background: var(--carte); border: 1px solid var(--bord); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 1.25rem;
    }
    .ss-bloc h2 { margin: 0 0 .75rem; font-size: 1.1rem; color: var(--vert-fonce); }
    .ss-attente { color: var(--attente); font-style: italic; margin: .5rem 0 0; }
    .ss-note { color: var(--gris); font-size: .85rem; margin: .6rem 0 0; }
    .ss-load { color: var(--gris); }
    .ss-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: .6rem; }
    .ss-kpi { background: var(--gris-clair); border-radius: 8px; padding: .6rem .7rem; text-align: center; }
    .ss-kpi__v { display: block; font-size: 1.3rem; font-weight: 700; color: var(--vert-fonce); }
    .ss-kpi__l { display: block; font-size: .75rem; color: var(--gris); text-transform: uppercase; letter-spacing: .03em; margin-top: .15rem; }
    .ss-table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    .ss-table th, .ss-table td { text-align: left; padding: .5rem .55rem; border-bottom: 1px solid var(--bord); }
    .ss-table th { color: var(--gris); font-weight: 600; font-size: .82rem; text-transform: uppercase; letter-spacing: .02em; }
    .ss-table tbody tr:hover { background: var(--gris-clair); }
    .ss-num { text-align: right; }
    .ss-table th.ss-num { text-align: right; }
    footer { max-width: 920px; margin: 2rem auto 0; color: var(--attente); font-size: .8rem; text-align: center; }
  </style>
</head>
<body>
  <div class="ss-wrap">
    <main id="ss-pilotage"><p class="ss-load">Initialisation…</p></main>
  </div>
  <footer>MOM Hub · pilotage M14 — Mutzig Ovalie Molsheim</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/stats-saison.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var baseId = params.get('compo_base');
      var evtEqId = params.get('evenement_equipe');
      var mount = document.getElementById('ss-pilotage');
      if (!window.StatsSaison) {
        mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2><p>Module stats-saison indisponible.</p></section>';
        return;
      }

      // Entrée directe (mes-compos) : ?compo_base=<id> → pilotage immédiat.
      if (baseId) {
        StatsSaison.renderPilotage(baseId, mount);
        return;
      }

      // Entrée depuis la fiche évènement (pt 65) : ?evenement_equipe=<id>.
      // pilotage.html n'attend qu'un compo_base → on résout l'evenement_equipe
      // vers SA compo de BASE (getCompoForEvenementEquipe renvoie un tableau ;
      // on prend la compo type_compo='base' active). Cohérent avec les autres
      // tuiles de la fiche qui passent toutes ?evenement_equipe=.
      if (evtEqId && window.SupabaseHub && typeof SupabaseHub.getCompoForEvenementEquipe === 'function') {
        mount.innerHTML = '<p class="ss-load">Chargement du pilotage…</p>';
        Promise.resolve(SupabaseHub.getCompoForEvenementEquipe(evtEqId))
          .then(function (res) {
            var arr = Array.isArray(res) ? res : (res && Array.isArray(res.data) ? res.data : []);
            var base = arr.filter(function (c) { return c && c.type_compo === 'base'; })[0] || arr[0] || null;
            if (base && base.id) {
              StatsSaison.renderPilotage(base.id, mount);
            } else {
              mount.innerHTML = '<section class="ss-bloc"><h2>Pilotage indisponible</h2>' +
                '<p>Aucune composition de base n\'a été trouvée pour cette équipe. ' +
                'Créez-la depuis les Compositions pour activer le pilotage.</p></section>';
            }
          })
          .catch(function (e) {
            if (typeof console !== 'undefined') console.error('pilotage boot (evenement_equipe)', e);
            mount.innerHTML = '<section class="ss-bloc"><h2>Erreur</h2>' +
              '<p>Impossible de charger le pilotage de cette équipe.</p></section>';
          });
        return;
      }

      // Aucun paramètre exploitable : on tente quand même renderPilotage (qui
      // gère l'absence de baseId par sa propre dégradation honnête).
      StatsSaison.renderPilotage(baseId, mount);
    })();
  </script>
</body>
</html>
