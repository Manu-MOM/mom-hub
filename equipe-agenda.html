<!--
  MOM Hub · Agenda des évènements — surface DÉDIÉE (AGENDA-EVENEMENTS).
  Vue calendaire (patron Google-agenda) des évènements du club, filtrée sur
  la/les catégorie(s) sélectionnée(s). Thème « Mon équipe ».

  PÉRIMÈTRE PAR RÔLE (FAIT FOI E2) :
    - encadrant  : ses catégories (resoudrePerimetreCategories, transverse=false),
    - admin/bureau (transverse) : toutes les catégories.
  SÉLECTEUR = CASES À COCHER MULTIPLES, groupées par pôle. L'agenda résout les
  équipes de TOUTES les catégories cochées (listEquipes par cat), interroge
  get_evenements_a_venir / _passes par ÉQUIPE, fusionne et DÉDOUBLONNE PAR id
  d'évènement (un plateau EDR à N équipes = 1 évènement-racine = 1 puce ;
  invariant assumé, conforme à la conception du Hub). Un TOURNOI est au
  contraire décomposé en hiérarchie (racine -> phases -> matchs) : on
  n'affiche QUE la RACINE (evenement_parent_id null), sinon ses N matchs
  s'empilent sur le même jour. Le détail des matchs reste dans la fiche.
  État multi LOCAL à la
  page ; le socle mono-catégorie partagé (mom_hub.categorie_active) n'est PAS
  modifié — juste lu comme défaut initial.

  LECTURE SEULE (FAIT FOI E4) : détail au clic, AUCUN bouton « Modifier ».
  L'édition d'un évènement reste sur evenements.html / la fiche évènement.

  Consomme, sans jamais les modifier, les modules INTERDIT :
    - css/hub-agenda.css + js/hub-agenda.js  (AGENDA-HUB-PATRON v1.1, pt 166)
    - js/hub-nav.js                          (nav thématique, INTERDIT)
  La palette .t-<type> (3 types d'évènement) est FOURNIE PAR CETTE PAGE (G3).

  RPC (déjà exposées, ZÉRO SQL pour cette page) :
    - get_evenements_a_venir(p_equipe_id, p_jours_a_venir)
    - get_evenements_passes(p_equipe_id, p_jours_passes, p_limit)
  Helpers SupabaseHub : client, getSession, getSaisonActive, signOut,
    resoudrePerimetreCategories, getCategories, getPoles, listEquipes,
    getEvenementsAVenir, getEvenementsPasses.
-->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script src="js/hub-agenda.js"></script>

<script>
(async function () {
  'use strict';
  const $ = function (id) { return document.getElementById(id); };

  // ---- Référentiel des types d'évènement (colonne type_evenement) ----
  const TYPES = [
    { code: 'entrainement', lib: 'Entraînement' },
    { code: 'competition',  lib: 'Compétition' },
    { code: 'stage',        lib: 'Stage' }
  ];
  const TYPE_DIVERS = { code: 'divers', lib: 'Divers' };
  const TYPE_BY_CODE = {};
  TYPES.concat([TYPE_DIVERS]).forEach(function (t) { TYPE_BY_CODE[t.code] = t; });

  const JOURS = ['lun.', 'mar.', 'mer.', 'jeu.', 'ven.', 'sam.', 'dim.'];
  const MOIS = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];

  // Marge (jours) ajoutée aux bornes RPC (get_*_a_venir/_passes prennent un
  // nombre de jours, pas des bornes exactes). On demande large puis on filtre
  // client sur [debut, fin] fournis par le module.
  const MARGE_JOURS = 7;

  // Durée d'un évènement AVEC heure : dérivée de debut_match/fin_prevue si les
  // deux sont renseignés (même jour), sinon null (aucune durée inventée -> le
  // module n'affiche pas de « 1 h » trompeur). Un évènement SANS heure (untimed,
  // rangée journée entière) n'a jamais de durée affichée.
  function dureeDe(ev, heure) {
    if (!heure) return null;                 // untimed -> pas de durée
    const dm = ev.debut_match, fp = ev.fin_prevue;
    if (dm && fp) {
      // debut_match / fin_prevue = champs TIME « HH:MM[:SS] ».
      const p = function (t) { const a = String(t).split(':'); return (+a[0]) * 60 + (+(a[1] || 0)); };
      const d = p(fp) - p(dm);
      if (d > 0 && d < 24 * 60) return d;
    }
    return null;                             // heure de début connue, durée inconnue -> rien
  }

  // ---- État ----
  let saisonActive = null;
  let perimetre = null;              // {categories, transverse, active, vide}
  let categoriesById = {};           // id -> {id, code, libelle_court, pole_id, ordre_tri, …}
  let polesById = {};                // id -> {id, libelle_court, …}
  let catsCochees = new Set();        // categorie_id sélectionnés (état LOCAL)
  let equipesParCat = {};            // categorie_id -> [equipeId, …] (cache)
  let agenda = null;

  // ---- Helpers ----
  function errMsg(e) {
    if (!e) return 'erreur inconnue';
    return e.message || e.error_description || e.msg || String(e);
  }
  function flash(msg, kind) {
    const box = $('eaMsg');
    if (!box) return;
    const div = document.createElement('div');
    div.className = 'ea-flash ' + (kind === 'err' ? 'err' : 'ok');
    div.textContent = msg;
    box.innerHTML = '';
    box.appendChild(div);
  }
  function parseDate(s) { const p = String(s).slice(0, 10).split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }

  // ---- AGENDA-VACANCES-FERIES : repères informatifs (patron logistique) ----
  // Fériés Alsace-Moselle + vacances scolaires zone B, chargés depuis un JSON
  // statique de saison. Fail-soft : fichier absent/invalide -> repères absents,
  // agenda intact. Items etat 'repere' -> inertes. GLOBAUX : affichés quelle que
  // soit la sélection de catégories (les vacances structurent le calendrier).
  let reperesData = { feries: [], vacances: [] };

  async function chargerReperes() {
    try {
      const r = await fetch('data/vacances-feries-2026-2027.json');
      if (!r.ok) return;
      const d = await r.json();
      if (d && Array.isArray(d.feries) && Array.isArray(d.vacances)) reperesData = d;
    } catch (e) {
      console.warn('Repères vacances/fériés indisponibles', e);
    }
  }

  // Itère chaque jour ISO de [debISO, finISO] (fins INCLUSIVES, anti-UTC).
  function chaqueJourISO(debISO, finISO, cb) {
    const d = parseDate(debISO);
    const fin = parseDate(finISO);
    while (d <= fin) {
      const iso = d.getFullYear() + '-'
        + String(d.getMonth() + 1).padStart(2, '0') + '-'
        + String(d.getDate()).padStart(2, '0');
      cb(iso);
      d.setDate(d.getDate() + 1);
    }
  }

  // Items untimed de repère bornés à la fenêtre. etat 'repere' : informatif pur.
  function reperesFenetre(debutISO, finISO) {
    const out = [];
    (reperesData.feries || []).forEach(function (f) {
      if (!f || !f.date || f.date < debutISO || f.date > finISO) return;
      out.push({
        id: 'fer-' + f.date, date: f.date, heure: null, duree_min: null,
        type: 'ferie', libelle: 'Férié — ' + (f.libelle || ''),
        etat: 'repere', meta: { src: 'repere', repere: f }
      });
    });
    (reperesData.vacances || []).forEach(function (v, idx) {
      if (!v || !v.debut || !v.fin) return;
      const deb = v.debut > debutISO ? v.debut : debutISO;
      const fin = v.fin < finISO ? v.fin : finISO;
      if (deb > fin) return;
      chaqueJourISO(deb, fin, function (iso) {
        out.push({
          id: 'vac-' + idx + '-' + iso, date: iso, heure: null, duree_min: null,
          type: 'vacances', libelle: v.libelle || 'Vacances',
          etat: 'repere', meta: { src: 'repere', repere: v }
        });
      });
    });
    return out;
  }
  function typeLib(code) { const t = TYPE_BY_CODE[code]; return t ? t.lib : (code || '—'); }

  // Normalise un type_evenement vers un code de palette connu (repli 'divers').
  function normType(t) {
    const c = String(t || '').toLowerCase();
    return TYPE_BY_CODE[c] ? c : 'divers';
  }

  // Heure locale « HH:MM » depuis date_debut ISO, en respectant la convention
  // du modèle évènements (minuit UTC pile = heure NON saisie -> null).
  function heureDe(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (d.getUTCHours() === 0 && d.getUTCMinutes() === 0) return null;
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }
  // Date « YYYY-MM-DD » d'un évènement : extraite DIRECTEMENT du texte ISO,
  // sans passer par new Date()/composantes locales (une date-évènement stockée
  // en UTC ne doit pas « reculer » d'un jour en heure de Paris). Cohérent avec
  // l'adaptateur salarié (slice(0,10)).
  function dateDe(iso) {
    return String(iso).slice(0, 10);
  }
  // Date « YYYY-MM-DD » en heure LOCALE : pour un évènement AVEC heure, la date
  // affichée doit suivre l'heure de Paris (ex. match à 00h30 le 27 stocké en UTC
  // le 26 -> on veut bien le 27).
  function dateLocaleDe(iso) {
    const d = new Date(iso);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  // ---- Mapping évènement (ligne RPC) -> item(s) du module ----
  // Retourne un TABLEAU d'items : un évènement sur plusieurs jours (tournoi
  // 27->28) donne une puce « journée entière » par jour couvert (id suffixé
  // par la date pour la dédup). Un évènement d'un seul jour -> un seul item,
  // qui conserve son heure et sa durée dérivée.
  function evMapRows(ev) {
    const type = normType(ev.type_evenement);
    let libelle = ev.libelle || typeLib(type);
    if (type === 'competition' && ev.adversaire_nom) libelle += ' — ' + ev.adversaire_nom;
    const etat = ev.etat || 'prevu';

    const dDeb = dateDe(ev.date_debut);
    const dFin = ev.date_fin ? dateDe(ev.date_fin) : dDeb;

    // Un seul jour : item unique avec heure + durée dérivée.
    if (!dFin || dFin <= dDeb) {
      const heure = heureDe(ev.date_debut);
      // Avec heure -> la date suit l'heure LOCALE (cohérent avec l'heure
      // affichée, gère le cas limite après-minuit). Sans heure -> date ISO brute.
      const dJour = heure ? dateLocaleDe(ev.date_debut) : dDeb;
      return [{
        id: ev.id, date: dJour, heure: heure, duree_min: dureeDe(ev, heure),
        type: type, libelle: libelle, etat: etat, meta: ev
      }];
    }

    // Plusieurs jours : une puce « journée entière » (untimed) par jour de la
    // plage [date_debut, date_fin] inclusive. Garde-fou sur l'étendue (365 j).
    const out = [];
    let cur = parseDate(dDeb);
    const fin = parseDate(dFin);
    let garde = 0;
    while (cur <= fin && garde < 366) {
      const iso = cur.getFullYear() + '-' + String(cur.getMonth() + 1).padStart(2, '0') + '-' + String(cur.getDate()).padStart(2, '0');
      out.push({
        id: ev.id + '#' + iso, date: iso, heure: null, duree_min: null,
        type: type, libelle: libelle, etat: etat, meta: ev
      });
      cur.setDate(cur.getDate() + 1);
      garde++;
    }
    return out;
  }
  function evDetailRows(it) {
    if (it.meta && it.meta.src === 'repere') {
      const rp = it.meta.repere || {};
      const rrows = [{ lbl: 'Nature', val: it.type === 'ferie' ? 'Jour férié (Alsace-Moselle)' : 'Vacances scolaires (zone B — académie de Strasbourg)' }];
      if (rp.debut && rp.fin) rrows.push({ lbl: 'Période', val: rp.debut + ' → ' + rp.fin });
      else rrows.push({ lbl: 'Date', val: it.date });
      rrows.push({ lbl: 'Info', val: 'Repère informatif.' });
      return rrows;
    }
    const ev = it.meta;
    const d = parseDate(it.date);
    const when = JOURS[(d.getDay() + 6) % 7] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()]
      + (it.heure ? ' · ' + it.heure : ' · toute la journée');
    const rows = [
      { lbl: 'Type', val: typeLib(it.type) },
      { lbl: 'Date · horaire', val: when }
    ];
    if (ev.adversaire_nom) rows.push({ lbl: 'Adversaire', val: ev.adversaire_nom });
    if (ev.site_libelle_court) rows.push({ lbl: 'Lieu', val: ev.site_libelle_court });
    else if (ev.rdv_lieu) rows.push({ lbl: 'Lieu', val: ev.rdv_lieu });
    return rows;
  }

  // ---- Résolution des équipes d'une catégorie (avec cache) ----
  async function equipesDe(catId) {
    if (equipesParCat[catId]) return equipesParCat[catId];
    let ids = [];
    try {
      const eqs = await SupabaseHub.listEquipes(catId);
      ids = Array.isArray(eqs) ? eqs.map(function (e) { return e && e.id; }).filter(Boolean) : [];
    } catch (e) { ids = []; }
    equipesParCat[catId] = ids;
    return ids;
  }

  // ---- fetchWindow du module : [debutISO, finISO] -> item[] ----
  // Les RPC prennent un NOMBRE DE JOURS autour d'aujourd'hui (pas de bornes) :
  // on convertit la fenêtre en jours passés / à venir (avec marge), on interroge
  // par ÉQUIPE (union des équipes de toutes les catégories cochées), on fusionne
  // et DÉDOUBLONNE PAR id d'évènement, puis on filtre client sur [debut, fin].
  async function fetchWindow(debutISO, finISO) {
    // Repères vacances/fériés GLOBAUX : présents même sans catégorie cochée.
    const reperes = reperesFenetre(debutISO, finISO);
    if (catsCochees.size === 0) return reperes;

    // Bornes -> nombre de jours (borné à >= 0), marge de sécurité.
    const auj = new Date(); auj.setHours(0, 0, 0, 0);
    const debut = parseDate(debutISO);
    const fin = parseDate(finISO);
    const MS = 86400000;
    const joursPasses = Math.max(0, Math.ceil((auj - debut) / MS)) + MARGE_JOURS;
    const joursAVenir = Math.max(0, Math.ceil((fin - auj) / MS)) + MARGE_JOURS;

    // EVT-RATTACHEMENT-CATEGORIE : chargement PAR CATÉGORIE cochée. Capte à
    // la fois les entraînements/stages (equipe_id null, rattachés catégorie)
    // ET les compétitions de la catégorie. L'ancien chargement par équipe
    // ratait les entraînements sans équipe.
    const appels = [];
    Array.from(catsCochees).forEach(function (catId) {
      appels.push(SupabaseHub.getEvenementsPasses(null, joursPasses, 500, catId));
      appels.push(SupabaseHub.getEvenementsAVenir(null, joursAVenir, catId));
    });
    const listes = await Promise.all(appels);

    // Fusion + dédup par id d'évènement.
    const vus = new Set();
    const items = [];
    listes.forEach(function (liste) {
      (Array.isArray(liste) ? liste : []).forEach(function (ev) {
        if (!ev || !ev.id || vus.has(ev.id) || !ev.date_debut) return;
        // On affiche les RACINES, MAIS on garde les occurrences d'entraînement
        // récurrent (enfant de type entrainement/stage = une séance à part
        // entière). Les enfants de tournoi (compétition) restent masqués :
        // le détail des matchs reste consultable dans la fiche du tournoi.
        const estOccurrenceEntrainement = !!ev.evenement_parent_id
          && (ev.type_evenement === 'entrainement' || ev.type_evenement === 'stage');
        if (ev.evenement_parent_id && !estOccurrenceEntrainement) return;
        vus.add(ev.id);
        // evMapRows peut retourner PLUSIEURS items (tournoi multi-jours).
        evMapRows(ev).forEach(function (it) {
          // Filtre client sur la fenêtre demandée (bornes inclusives).
          if (it.date >= debutISO && it.date <= finISO) items.push(it);
        });
      });
    });
    return items.concat(reperes);
  }

  function agCreate() {
    agenda = HubAgenda.create($('agRoot'), {
      titre: 'Agenda des évènements',
      libelleVide: 'Aucun évènement cette semaine.',
      fetchWindow: fetchWindow,
      types: TYPES.concat([TYPE_DIVERS])
        .concat([{ code: 'ferie', lib: 'Férié' }, { code: 'vacances', lib: 'Vacances scolaires' }])
        .map(function (t) { return { code: t.code, lib: t.lib }; }),
      detail: { titre: function (it) { return it.libelle || typeLib(it.type); }, rows: evDetailRows },
      capacites: { pleinEcran: true, caseAnnulees: false },
      plageFixe: [8, 22],          // AGENDA-MODULE-V1.1 P2 : grille stable 08-22 (modèle unique)
      untimedEnRangee: true,       // AGENDA-MODULE-V1.1 R1 : évènements sans heure en rangée journée entière
      estAnnulee: function (it) { return it.etat === 'annule'; },
      etatMark: function () { return ''; },
      onError: function (e) { flash('Agenda : ' + errMsg(e), 'err'); }
    });
  }

  // ---- Sélecteur de catégories (cases groupées par pôle) ----
  function renderPicker() {
    const cats = perimetre.categories || [];
    if (cats.length === 0) { $('eaPicker').style.display = 'none'; return; }
    // Mono-catégorie : pas de sélecteur (UX inchangée), la seule catégorie est cochée.
    if (cats.length === 1) { $('eaPicker').style.display = 'none'; return; }

    // Groupement par pôle, dans l'ordre d'apparition des catégories (déjà triées
    // par ordre_tri). Pôle inconnu -> groupe « Autres ».
    const groupes = [];        // [{ poleId, titre, cats: [] }]
    const idxByPole = {};
    cats.forEach(function (c) {
      const pid = c.pole_id || '__autres__';
      if (idxByPole[pid] === undefined) {
        const pole = polesById[c.pole_id];
        idxByPole[pid] = groupes.length;
        groupes.push({ poleId: pid, titre: pole ? (pole.libelle_court || pole.libelle_long || pole.code) : 'Autres', cats: [] });
      }
      groupes[idxByPole[pid]].cats.push(c);
    });

    const esc = function (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (ch) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[ch]; }); };
    let html = '';
    groupes.forEach(function (g) {
      html += '<div class="ea-pole"><p class="ea-pole-title">' + esc(g.titre) + '</p>';
      g.cats.forEach(function (c) {
        const checked = catsCochees.has(c.id) ? ' checked' : '';
        const lbl = c.libelle_court || c.code || c.id;
        html += '<label class="ea-cat"><input type="checkbox" data-cat="' + esc(c.id) + '"' + checked + '> ' + esc(lbl) + '</label>';
      });
      html += '</div>';
    });
    $('eaPoles').innerHTML = html;
    $('eaPicker').style.display = '';
    $('eaActions').style.display = '';   // les boutons Tout cocher/décocher vivent dans le corps replié

    // Câblage des cases (délégué au conteneur).
    $('eaPoles').querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
      cb.addEventListener('change', function () {
        const id = cb.getAttribute('data-cat');
        if (cb.checked) catsCochees.add(id); else catsCochees.delete(id);
        majResume();
        rafraichirAgenda();
      });
    });
    majResume();
  }

  // Libellé court d'une catégorie (depuis le périmètre / référentiel).
  function libCat(id) {
    const c = (perimetre.categories || []).find(function (x) { return x.id === id; });
    return c ? (c.libelle_court || c.code || id) : id;
  }

  // Résumé compact de la sélection dans le bandeau (replié).
  function majResume() {
    const el = $('eaSummary');
    if (!el) return;
    const ids = Array.from(catsCochees);
    if (ids.length === 0) { el.textContent = ' — aucune'; return; }
    // Ordonne selon l'ordre d'affichage du périmètre.
    const ordre = (perimetre.categories || []).map(function (c) { return c.id; });
    ids.sort(function (a, b) { return ordre.indexOf(a) - ordre.indexOf(b); });
    const labels = ids.map(libCat);
    let txt;
    if (labels.length <= 3) txt = labels.join(', ');
    else txt = labels.slice(0, 3).join(', ') + ' +' + (labels.length - 3);
    el.textContent = ' : ' + txt;
  }

  // Repli / dépli du corps du sélecteur.
  function toggleBody(force) {
    const body = $('eaBody');
    const btn = $('eaToggle');
    const ouvert = force != null ? force : (body.style.display === 'none');
    body.style.display = ouvert ? '' : 'none';
    btn.setAttribute('aria-expanded', ouvert ? 'true' : 'false');
  }

  function cocherTout(val) {
    const cats = perimetre.categories || [];
    catsCochees = new Set(val ? cats.map(function (c) { return c.id; }) : []);
    $('eaPoles').querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
      cb.checked = catsCochees.has(cb.getAttribute('data-cat'));
    });
    majResume();
    rafraichirAgenda();
  }

  async function rafraichirAgenda() {
    if (!agenda) return;
    try { await agenda.refresh(); } catch (e) { flash('Agenda : ' + errMsg(e), 'err'); }
  }

  // ---- Boot ----
  const so = $('btn-signout');
  if (so) so.addEventListener('click', async function () { try { await SupabaseHub.signOut(); } catch (e) {} window.location.replace('login.html'); });

  const session = await SupabaseHub.getSession();
  if (!session) { window.location.replace('login.html'); return; }

  saisonActive = await SupabaseHub.getSaisonActive();

  // Périmètre catégories (garde de contenu : vide -> rien à afficher).
  perimetre = await SupabaseHub.resoudrePerimetreCategories();

  document.body.classList.remove('auth-pending');

  if ($('season-pill') && saisonActive && saisonActive.libelle) {
    $('season-pill').textContent = String(saisonActive.libelle).toUpperCase();
  }

  if (!perimetre || perimetre.vide || !Array.isArray(perimetre.categories) || perimetre.categories.length === 0) {
    flash('Aucune catégorie accessible pour votre profil — agenda indisponible.', 'err');
    return;
  }

  // Référentiels pour les libellés (catégories + pôles).
  try {
    const [cats, poles] = await Promise.all([SupabaseHub.getCategories(), SupabaseHub.getPoles()]);
    (cats || []).forEach(function (c) { categoriesById[c.id] = c; });
    (poles || []).forEach(function (p) { polesById[p.id] = p; });
  } catch (e) { /* les libellés du périmètre suffisent en repli */ }

  // Enrichit le périmètre avec pole_id / ordre_tri du référentiel (resoudre…
  // renvoie déjà les catégories du référentiel, mais on sécurise le pole_id).
  perimetre.categories.forEach(function (c) {
    const ref = categoriesById[c.id];
    if (ref) { if (c.pole_id == null) c.pole_id = ref.pole_id; if (c.libelle_court == null) c.libelle_court = ref.libelle_court; }
  });

  // Sélection initiale : catégorie active mémorisée si dans le périmètre, sinon
  // la 1re. L'utilisateur ajoute/enlève ensuite (multi).
  const active = perimetre.active && perimetre.categories.some(function (c) { return c.id === perimetre.active; })
    ? perimetre.active
    : perimetre.categories[0].id;
  catsCochees = new Set([active]);

  // Boutons tout cocher / décocher.
  $('eaSelAll').addEventListener('click', function () { cocherTout(true); });
  $('eaSelNone').addEventListener('click', function () { cocherTout(false); });
  $('eaToggle').addEventListener('click', function () { toggleBody(); });

  renderPicker();
  await chargerReperes(); // fail-soft interne : ne jette jamais
  agCreate();
  try { await agenda.init(); } catch (e) { flash('Agenda : ' + errMsg(e), 'err'); }
})();
</script>
</body>
